<template id="card-moneyness-template">

  <!-- MOBILE -->
  <div v-if="isMobile"
    class="w-full rounded-[var(--radius-xl)] pt-6 px-6 pb-8 flex flex-col h-full relative overflow-hidden"
    style="background: var(--surface-base); border: 1px solid var(--border-subtle); box-shadow: var(--shadow-sm);">

    <div class="absolute bottom-0 left-0 w-full h-6 flex z-20"
         style="font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 700; color: white;">
      <div :style="{ width: (percentOtmGlobal || 0) + '%' }" class="h-full transition-all duration-1000 flex items-center justify-center overflow-hidden" style="background: var(--brand-emerald);">
        <span v-if="percentOtmGlobal > 0">{{ percentOtmGlobal }}%</span>
      </div>
      <div :style="{ width: (percentAtmGlobal || 0) + '%' }" class="h-full transition-all duration-1000 flex items-center justify-center overflow-hidden" style="background: var(--brand-amber);">
        <span v-if="percentAtmGlobal > 0" style="color: var(--brand-amber-dark, #78350f);">{{ percentAtmGlobal }}%</span>
      </div>
      <div :style="{ width: (percentItmGlobal || 0) + '%' }" class="h-full transition-all duration-1000 flex items-center justify-center overflow-hidden" style="background: var(--brand-rose);">
        <span v-if="percentItmGlobal > 0">{{ percentItmGlobal }}%</span>
      </div>
    </div>

    <div class="flex flex-col h-full relative z-10">
      <div class="flex flex-col mb-2">
        <h3 style="font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; color: var(--text-primary); letter-spacing: -0.02em; text-transform: uppercase;">Moneyness</h3>
        <span style="font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.16em; margin-top: 6px;">Por Tipo de Ativo</span>
      </div>

      <div v-if="isLoading" class="flex-1 flex flex-col justify-center gap-3 mt-2 animate-pulse">
        <div v-for="i in 2" :key="i" class="rounded-[var(--radius-lg)] p-3 flex flex-col gap-2" style="background: var(--surface-sunken); border: 1px solid var(--border-subtle);">
          <div class="flex justify-between mb-1">
            <div class="h-5 rounded w-16" style="background: var(--surface-overlay);"></div>
            <div class="h-5 rounded w-10" style="background: var(--surface-overlay);"></div>
          </div>
          <div class="flex gap-2">
            <div v-for="j in 3" :key="j" class="h-10 rounded-[var(--radius-md)] flex-1" style="background: var(--surface-overlay);"></div>
          </div>
        </div>
      </div>

      <template v-else>
        <div class="flex flex-col flex-1 justify-center gap-4 mt-2 px-1">
          <!-- CALL -->
          <div class="flex items-center justify-between w-full pb-3" style="border-bottom: 1px solid var(--border-subtle);">
            <div class="w-1/5">
              <span style="font-size: 20px; font-weight: 700; text-transform: uppercase; letter-spacing: -0.02em; color: var(--brand-indigo);">CALL</span>
            </div>
            <div class="flex flex-1 justify-between px-3">
              <div v-for="m in ['ITM', 'ATM', 'OTM']" :key="'call-'+m" class="flex flex-col items-center">
                <span style="font-size: 9px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 5px;">{{ m }}</span>
                <span style="font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 700; line-height: 1;" :style="getMoneynessColorStyle(m, callStats[m.toLowerCase()])">{{ callStats[m.toLowerCase()] || 0 }}</span>
              </div>
            </div>
            <div class="w-1/5 text-right">
              <span style="font-size: 9px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; display: block; margin-bottom: 5px;">Total</span>
              <span style="font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 700; color: var(--brand-indigo);">{{ callStats.total || 0 }}</span>
            </div>
          </div>
          <!-- PUT -->
          <div class="flex items-center justify-between w-full pb-2">
            <div class="w-1/5">
              <span style="font-size: 20px; font-weight: 700; text-transform: uppercase; letter-spacing: -0.02em; color: var(--brand-amber);">PUT</span>
            </div>
            <div class="flex flex-1 justify-between px-3">
              <div v-for="m in ['ITM', 'ATM', 'OTM']" :key="'put-'+m" class="flex flex-col items-center">
                <span style="font-size: 9px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 5px;">{{ m }}</span>
                <span style="font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 700; line-height: 1;" :style="getMoneynessColorStyle(m, putStats[m.toLowerCase()])">{{ putStats[m.toLowerCase()] || 0 }}</span>
              </div>
            </div>
            <div class="w-1/5 text-right">
              <span style="font-size: 9px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; display: block; margin-bottom: 5px;">Total</span>
              <span style="font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 700; color: var(--brand-amber);">{{ putStats.total || 0 }}</span>
            </div>
          </div>
        </div>
      </template>
    </div>
  </div>

  <!-- DESKTOP -->
  <div v-else
    class="w-full rounded-[var(--radius-xl)] p-5 flex flex-col h-full transition-all duration-[var(--duration-std)]"
    style="background: var(--surface-base); border: 1px solid var(--border-subtle); box-shadow: var(--shadow-sm);"
    onmouseover="this.style.boxShadow='var(--shadow-md)'"
    onmouseout="this.style.boxShadow='var(--shadow-sm)'">

    <div class="flex justify-between items-center mb-6">
      <div>
        <h3 class="t-subtitle" style="color: var(--text-primary);">Moneyness</h3>
        <p class="t-label mt-1" style="color: var(--text-muted);">Por Tipo de Ativo</p>
      </div>
    </div>

    <div v-if="isLoading" class="grid grid-cols-2 gap-3 flex-1 animate-pulse">
      <div v-for="i in 2" :key="i" class="rounded-[var(--radius-xl)] h-44" style="background: var(--surface-sunken); border: 1px solid var(--border-subtle);"></div>
    </div>

    <div v-else class="grid grid-cols-2 gap-3 flex-1">
      <!-- CALL -->
      <div class="rounded-[var(--radius-xl)] p-4 flex flex-col justify-between"
           style="background: var(--brand-indigo-light); border: 1px solid var(--brand-indigo-muted);">
        <div class="flex items-center justify-between mb-3">
          <span style="font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--brand-indigo);">CALL (Alta)</span>
        </div>
        <div class="flex-1 flex flex-col justify-center gap-1">
          <div v-for="m in ['ITM', 'ATM', 'OTM']" :key="m" class="flex justify-between items-center h-7">
            <span style="font-size: 9px; font-weight: 600; text-transform: uppercase; color: var(--text-muted);">{{ m }}</span>
            <span class="w-7 h-5 flex items-center justify-center rounded-[var(--radius-sm)]"
                  style="font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 700; border: 1px solid;"
                  :style="getBadgeStyle(m, callStats[m.toLowerCase()])">
              {{ callStats[m.toLowerCase()] || 0 }}
            </span>
          </div>
        </div>
        <div class="pt-3 flex justify-between items-center mt-2" style="border-top: 1px solid var(--brand-indigo-muted);">
          <span style="font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--brand-indigo); opacity: 0.7;">Total</span>
          <span style="font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 700; color: var(--brand-indigo);">{{ callStats.total || 0 }}</span>
        </div>
      </div>

      <!-- PUT -->
      <div class="rounded-[var(--radius-xl)] p-4 flex flex-col justify-between"
           style="background: var(--brand-amber-light); border: 1px solid var(--brand-amber-muted);">
        <div class="flex items-center justify-between mb-3">
          <span style="font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--brand-amber);">PUT (Baixa)</span>
        </div>
        <div class="flex-1 flex flex-col justify-center gap-1">
          <div v-for="m in ['ITM', 'ATM', 'OTM']" :key="m" class="flex justify-between items-center h-7">
            <span style="font-size: 9px; font-weight: 600; text-transform: uppercase; color: var(--text-muted);">{{ m }}</span>
            <span class="w-7 h-5 flex items-center justify-center rounded-[var(--radius-sm)]"
                  style="font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 700; border: 1px solid;"
                  :style="getBadgeStyle(m, putStats[m.toLowerCase()])">
              {{ putStats[m.toLowerCase()] || 0 }}
            </span>
          </div>
        </div>
        <div class="pt-3 flex justify-between items-center mt-2" style="border-top: 1px solid var(--brand-amber-muted);">
          <span style="font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--brand-amber); opacity: 0.7;">Total</span>
          <span style="font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 700; color: var(--brand-amber);">{{ putStats.total || 0 }}</span>
        </div>
      </div>
    </div>
  </div>
</template>

<script>
window.CardMoneyness = {
  props: { isMobile: Boolean, isLoading: Boolean, statsPreCalculados: Object },
  template: '#card-moneyness-template',
  computed: {
    stats() {
      const padrao = { itm: 0, atm: 0, otm: 0, total: 0 };
      if (!this.statsPreCalculados?.moneynessPorTipo) return { call: padrao, put: padrao, totalOps: 0 };
      return this.statsPreCalculados.moneynessPorTipo;
    },
    totalOperacoes() { return this.stats.totalOps || 0; },
    callStats() { return this.stats.call || { itm: 0, atm: 0, otm: 0, total: 0 }; },
    putStats()  { return this.stats.put  || { itm: 0, atm: 0, otm: 0, total: 0 }; },
    percentOtmGlobal() { return this.totalOperacoes === 0 ? 0 : Math.round(((this.callStats.otm + this.putStats.otm) / this.totalOperacoes) * 100); },
    percentAtmGlobal() { return this.totalOperacoes === 0 ? 0 : Math.round(((this.callStats.atm + this.putStats.atm) / this.totalOperacoes) * 100); },
    percentItmGlobal() { return this.totalOperacoes === 0 ? 0 : Math.round(((this.callStats.itm + this.putStats.itm) / this.totalOperacoes) * 100); }
  },
  methods: {
    getMoneynessColorStyle(m, val) {
      if (!val || val === 0) return 'color: var(--border-default);';
      if (m === 'ITM') return 'color: var(--brand-rose);';
      if (m === 'ATM') return 'color: var(--brand-amber);';
      return 'color: var(--brand-emerald);';
    },
    getBadgeStyle(m, val) {
      if (!val || val === 0) return 'color: var(--border-default); background: transparent; border-color: var(--border-subtle);';
      if (m === 'ITM') return 'color: var(--brand-rose);   background: var(--brand-rose-light);   border-color: var(--brand-rose-muted);';
      if (m === 'ATM') return 'color: var(--brand-amber); background: var(--brand-amber-light); border-color: var(--brand-amber-muted);';
      return                  'color: var(--brand-emerald); background: var(--brand-emerald-light); border-color: var(--brand-emerald-muted);';
    }
  }
};
</script>
