<template id="card-summary-template">
  <div
    :class="isMobile ? 'px-0' : 'p-5 md:p-7'"
    class="w-full rounded-[var(--radius-xl)] transition-all"
    :style="isMobile ? 'background: transparent; border: none;' :
            'background: var(--surface-base); border: 1px solid var(--border-subtle); box-shadow: var(--shadow-sm);'"
  >

    <!-- Cabeçalho -->
    <div class="flex justify-between items-center mb-6" :class="isMobile ? 'px-5' : ''">
      <div>
        <h3 class="t-title" style="color: var(--text-primary);">Sumário</h3>
        <p class="t-label mt-1" style="color: var(--text-muted);">Portfólio Ativo</p>
      </div>
      <div
        v-if="!isLoading"
        class="px-3 py-1 rounded-[var(--radius-full)]"
        style="background: var(--brand-indigo-light); color: var(--brand-indigo);
               border: 1px solid var(--brand-indigo-muted);
               font-size: 8px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;"
      >
        {{ totalActiveOps }} Ativos
      </div>
    </div>

    <!-- Grid de cards / carrossel mobile -->
    <div
      :class="isMobile
        ? 'flex overflow-x-auto gap-4 px-5 pb-6 hide-scrollbar snap-x snap-mandatory'
        : 'grid gap-3 md:gap-4'"
      :style="!isMobile ? gridColsStyle : {}"
    >

      <!-- Skeleton -->
      <template v-if="isLoading">
        <div
          v-for="n in 4"
          :key="'skel-sum-'+n"
          class="min-w-[260px] snap-center h-32 rounded-[var(--radius-lg)] border animate-pulse flex flex-col justify-between p-5"
          style="background: var(--surface-overlay); border-color: var(--border-subtle);"
        >
          <div class="h-2.5 rounded-full w-24" style="background: var(--border-default);"></div>
          <div class="flex flex-col gap-2">
            <div class="h-9 rounded-[var(--radius-sm)] w-3/4" style="background: var(--border-default);"></div>
            <div class="h-2 rounded-full w-1/2" style="background: var(--border-subtle);"></div>
          </div>
        </div>
      </template>

      <!-- Cards reais -->
      <template v-else>
        <div
          v-for="field in activeFields"
          :key="field.key + '-' + field.order"
          :class="isMobile ? 'min-w-[260px] flex-shrink-0 snap-center py-5 px-6' : 'p-5 hover:scale-[1.01]'"
          class="rounded-[var(--radius-lg)] border transition-all duration-[var(--duration-std)] h-32 flex flex-col justify-between"
          :style="getPodStyle(field).style"
        >
          <!-- Label -->
          <span class="t-label" :style="getPodStyle(field).labelStyle">
            {{ field.label }}
          </span>

          <!-- Valor + contexto -->
          <div class="flex flex-col">
            <span
              :style="[
                getPodStyle(field).valueStyle,
                isMobile ? 'font-size: 26px' : 'font-size: 20px'
              ]"
              style="font-family: 'JetBrains Mono', monospace; font-weight: 700;
                     letter-spacing: -0.03em; line-height: 1; margin-bottom: 4px;"
            >
              {{ formatValue(field.value, field.type) }}
            </span>
            <span class="t-label-sm" :style="getPodStyle(field).contextStyle">
              {{ getPodStyle(field).context }}
            </span>
          </div>
        </div>
      </template>

    </div>
  </div>
</template>

<script>
const summaryCurrencyFmt = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' });
const summaryNumberFmt   = new Intl.NumberFormat('pt-BR', { maximumFractionDigits: 4 });

window.CardSummary = {
  props: {
    statsPreCalculados: Object,
    isMobile:           Boolean,
    isLoading:          Boolean
  },
  template: '#card-summary-template',

  data() {
    return {
      // ================================================================
      // PAINEL DE CONTROLE — chaves alinhadas ao resumoGlobal do Agregador
      // Campos disponíveis no resumoGlobal:
      //   totalOps, nocional, plTotalValor, plTotalUnitario,
      //   ganhoMaximo, perdaMaxima, premioMedio, premioAtual,
      //   delta, gamma, vega, theta, rho, plTotalPct
      // ================================================================
      configCampos: [
        // --- Financeiro (ativos por padrão) ---
        { key: 'premioMedio',      label: 'Prêmio Médio',   type: 'currency',   active: true,  order: 1 },
        { key: 'premioAtual',      label: 'Prêmio Atual',   type: 'currency',   active: true,  order: 2 },
        { key: 'ganhoMaximo',      label: 'Ganho Máx.',     type: 'currency',   active: true,  order: 3 },
        { key: 'nocional',         label: 'Nocional',       type: 'currency',   active: true,  order: 4 },
        { key: 'plTotalPct',       label: 'Rentabilidade',  type: 'percentage', active: true,  order: 5 },
        { key: 'plTotalValor',     label: 'P/L Aberto',     type: 'currency',   active: true,  order: 6 },
        { key: 'perdaMaxima',      label: 'Risco Máx.',     type: 'currency',   active: false, order: 7 },
        { key: 'plTotalUnitario',  label: 'P/L Unitário',   type: 'currency',   active: false, order: 8 },

        // --- Gregas (chaves corretas: sem sufixo "Total") ---
        { key: 'delta',            label: 'Delta Net',      type: 'number',     active: false, order: 10 },
        { key: 'gamma',            label: 'Gamma Net',      type: 'number',     active: false, order: 11 },
        { key: 'vega',             label: 'Vega Net',       type: 'number',     active: false, order: 12 },
        { key: 'theta',            label: 'Theta Diário',   type: 'currency',   active: false, order: 13 },
        { key: 'rho',              label: 'Rho',            type: 'number',     active: false, order: 14 }
      ]
    };
  },

  computed: {
    totalActiveOps() {
      return this.statsPreCalculados?.resumoGlobal?.totalOps || 0;
    },

    activeFields() {
      const stats = this.statsPreCalculados?.resumoGlobal || {};
      return this.configCampos
        .filter(c => c.active)
        .sort((a, b) => a.order - b.order)
        .map(c => ({ ...c, value: stats[c.key] !== undefined ? stats[c.key] : 0 }));
    },

    gridColsStyle() {
      const total = this.activeFields.length || 4;
      const width = window.innerWidth;
      let cols = 1;
      if (width >= 640  && width < 1024) cols = 2;
      if (width >= 1024) cols = Math.min(total, 8);
      return { gridTemplateColumns: `repeat(${cols}, minmax(0, 1fr))` };
    }
  },

  methods: {
    formatValue(val, type) {
      if (val === undefined || val === null) return '---';
      if (type === 'currency')   return summaryCurrencyFmt.format(val);
      if (type === 'percentage') return (val).toFixed(2).replace('.', ',') + '%';
      return summaryNumberFmt.format(val);
    },

    getPodStyle(field) {
      const key = field.key.toUpperCase();
      const val = parseFloat(field.value) || 0;

      // Gregas — azul
      if (['DELTA','GAMMA','VEGA','THETA','RHO'].some(g => key.includes(g))) {
        return {
          style:        'background: var(--brand-indigo-light); border-color: var(--brand-indigo-muted);',
          labelStyle:   'color: var(--brand-indigo); opacity: 0.8;',
          valueStyle:   'color: var(--brand-indigo);',
          contextStyle: 'color: var(--brand-indigo); opacity: 0.55;',
          context:      'Exposição'
        };
      }

      // Risco / Perda — vermelho
      if (key.includes('PERDA') || key.includes('RISCO') ||
          (key.includes('PL') && val < 0)) {
        return {
          style:        'background: var(--brand-rose-light); border-color: var(--brand-rose-muted);',
          labelStyle:   'color: var(--brand-rose); opacity: 0.8;',
          valueStyle:   'color: var(--brand-rose);',
          contextStyle: 'color: var(--brand-rose); opacity: 0.55;',
          context:      'Risco Ativo'
        };
      }

      // Resultado positivo / financeiro — verde
      if (key.includes('PL') || key.includes('GANHO') || key.includes('NOCIONAL') ||
          key.includes('PREMIO') || key.includes('RENTABILIDADE')) {
        const isPositive = val >= 0;
        return {
          style:        isPositive
            ? 'background: var(--brand-emerald-light); border-color: var(--brand-emerald-muted);'
            : 'background: var(--brand-rose-light); border-color: var(--brand-rose-muted);',
          labelStyle:   `color: var(--${isPositive ? 'brand-emerald' : 'brand-rose'}); opacity: 0.8;`,
          valueStyle:   `color: var(--${isPositive ? 'brand-emerald' : 'brand-rose'});`,
          contextStyle: `color: var(--${isPositive ? 'brand-emerald' : 'brand-rose'}); opacity: 0.55;`,
          context:      'Resultado'
        };
      }

      // Default — neutro
      return {
        style:        'background: var(--surface-overlay); border-color: var(--border-subtle);',
        labelStyle:   'color: var(--text-muted);',
        valueStyle:   'color: var(--text-primary);',
        contextStyle: 'color: var(--text-muted);',
        context:      'Dados'
      };
    }
  }
};
</script>
