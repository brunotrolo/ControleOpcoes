<template id="card-resultado-template">

  <!-- ══════════════════════════════════════════
       MOBILE
       ══════════════════════════════════════════ -->
  <div v-if="isMobile"
    class="w-full rounded-[var(--radius-xl)] pt-6 px-6 pb-8 flex flex-col h-full relative overflow-hidden"
    style="background: var(--surface-base); border: 1px solid var(--border-subtle); box-shadow: var(--shadow-sm);">

    <!-- Barra inferior de resultado -->
    <div class="absolute bottom-0 left-0 w-full h-6 flex z-20"
         style="font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 700; color: white;">
      <div :style="{ width: (stats.pctLucro || 0) + '%' }"
           class="h-full transition-all duration-1000 flex items-center justify-center overflow-hidden"
           style="background: var(--brand-emerald);">
        <span v-if="stats.pctLucro > 0">{{ stats.pctLucro }}%</span>
      </div>
      <div :style="{ width: (stats.pctBreakeven || 0) + '%' }"
           class="h-full transition-all duration-1000 flex items-center justify-center overflow-hidden"
           style="background: var(--text-muted);">
        <span v-if="stats.pctBreakeven > 0" style="color: var(--surface-base);">{{ stats.pctBreakeven }}%</span>
      </div>
      <div :style="{ width: (stats.pctPrejuizo || 0) + '%' }"
           class="h-full transition-all duration-1000 flex items-center justify-center overflow-hidden"
           style="background: var(--brand-rose);">
        <span v-if="stats.pctPrejuizo > 0">{{ stats.pctPrejuizo }}%</span>
      </div>
    </div>

    <div class="flex flex-col h-full relative z-10">
      <div class="flex flex-col mb-4">
        <h3 style="font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800;
                   color: var(--text-primary); letter-spacing: -0.02em; text-transform: uppercase;">Resultado</h3>
        <div class="flex items-center mt-2 gap-2">
          <span style="font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.16em;">Performance Total</span>
          <template v-if="!isLoading && stats.total > 0">
            <span class="w-2 h-2 rounded-full" :style="statusPerformance.dotStyle"></span>
            <span style="font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;"
                  :style="statusPerformance.textStyle">{{ statusPerformance.labelClean }}</span>
          </template>
        </div>
      </div>

      <!-- Skeleton -->
      <div v-if="isLoading" class="flex-1 flex flex-col justify-center gap-5 animate-pulse mt-2">
        <div class="flex justify-around items-end w-full">
          <div v-for="i in 3" :key="i" class="flex flex-col items-center gap-3">
            <div class="h-4 rounded w-12" style="background: var(--surface-overlay);"></div>
            <div class="h-16 rounded-[var(--radius-md)] w-16" style="background: var(--surface-sunken);"></div>
          </div>
        </div>
      </div>

      <!-- Dados: 3 números grandes -->
      <template v-else>
        <div class="flex flex-col flex-1 justify-center">
          <div class="flex justify-between px-1 mb-4"
               style="font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;">
            <span style="color: var(--brand-emerald);">Lucro</span>
            <span style="color: var(--brand-rose);">Prejuízo</span>
          </div>
          <div v-if="stats.total > 0" class="flex items-center justify-around px-1 mt-2">
            <div class="flex flex-col items-center w-1/3">
              <span style="font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 4px;">Lucro</span>
              <span style="font-family: 'JetBrains Mono', monospace; font-size: 64px; font-weight: 700; letter-spacing: -0.05em; line-height: 1; color: var(--brand-emerald);">{{ stats.lucro }}</span>
            </div>
            <div class="flex flex-col items-center w-1/3">
              <span style="font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 4px;">Empate</span>
              <span style="font-family: 'JetBrains Mono', monospace; font-size: 52px; font-weight: 700; letter-spacing: -0.05em; line-height: 1; color: var(--text-muted);">{{ stats.breakeven }}</span>
            </div>
            <div class="flex flex-col items-center w-1/3">
              <span style="font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 4px;">Prejuízo</span>
              <span style="font-family: 'JetBrains Mono', monospace; font-size: 64px; font-weight: 700; letter-spacing: -0.05em; line-height: 1; color: var(--brand-rose);">{{ stats.prejuizo }}</span>
            </div>
          </div>
          <!-- Fallback: sem dados de P/L individuais, mostra resultado global -->
          <div v-else class="flex flex-col items-center justify-center flex-1 gap-2">
            <span style="font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.12em;">Resultado Global</span>
            <span style="font-family: 'JetBrains Mono', monospace; font-size: 42px; font-weight: 700; letter-spacing: -0.04em; line-height: 1;"
                  :style="plGlobal >= 0 ? 'color: var(--brand-emerald);' : 'color: var(--brand-rose);'">
              {{ formatCurrency(plGlobal) }}
            </span>
            <span style="font-size: 11px; font-weight: 600; color: var(--text-muted);">{{ totalOps }} operações ativas</span>
          </div>
        </div>
      </template>
    </div>
  </div>

  <!-- ══════════════════════════════════════════
       DESKTOP
       ══════════════════════════════════════════ -->
  <div v-else
    class="w-full rounded-[var(--radius-xl)] p-5 flex flex-col transition-all duration-[var(--duration-std)] h-full"
    style="background: var(--surface-base); border: 1px solid var(--border-subtle); box-shadow: var(--shadow-sm);"
    onmouseover="this.style.boxShadow='var(--shadow-md)'"
    onmouseout="this.style.boxShadow='var(--shadow-sm)'">

    <div class="flex justify-between items-start mb-6">
      <div>
        <h3 class="t-subtitle" style="color: var(--text-primary);">Resultado</h3>
        <p class="t-label mt-1" style="color: var(--text-muted);">Por Lucro | Prejuízo</p>
      </div>
    </div>

    <!-- Skeleton -->
    <div v-if="isLoading" class="animate-pulse space-y-5">
      <div class="h-5 rounded-[var(--radius-full)] w-full" style="background: var(--surface-overlay);"></div>
      <div class="flex gap-2">
        <div v-for="i in 3" :key="i" class="h-4 rounded w-full" style="background: var(--surface-sunken);"></div>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div v-for="i in 2" :key="i" class="h-20 rounded-[var(--radius-lg)]" style="background: var(--surface-sunken); border: 1px solid var(--border-subtle);"></div>
      </div>
    </div>

    <!-- Dados com P/L por operação disponíveis -->
    <template v-else-if="stats.total > 0">
      <div class="relative mb-4">
        <div class="flex justify-between items-end mb-2 px-1"
             style="font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em;">
          <span style="color: var(--text-secondary);">Performance</span>
          <span class="px-2 py-0.5 rounded-[var(--radius-sm)]"
                style="color: var(--brand-emerald); background: var(--brand-emerald-light); border: 1px solid var(--brand-emerald-muted);">
            {{ stats.pctLucro }}% NO LUCRO
          </span>
        </div>

        <!-- Barra de progresso -->
        <div class="w-full h-5 rounded-[var(--radius-full)] overflow-hidden flex p-1"
             style="background: var(--surface-sunken); border: 1px solid var(--border-subtle);">
          <div :style="{ width: stats.pctLucro + '%' }" class="h-full rounded-l-full transition-all duration-1000" style="background: var(--brand-emerald);"></div>
          <div :style="{ width: stats.pctBreakeven + '%' }" class="h-full transition-all duration-1000" style="background: var(--text-muted);"></div>
          <div :style="{ width: stats.pctPrejuizo + '%' }" class="h-full rounded-r-full transition-all duration-1000" style="background: var(--brand-rose);"></div>
        </div>

        <!-- Contadores inline -->
        <div class="flex justify-between gap-1 mt-2"
             style="font-size: 8px; font-weight: 700; text-transform: uppercase;">
          <div class="flex-1 flex justify-center items-center gap-1 py-1 rounded-[var(--radius-sm)]"
               style="color: var(--brand-emerald); background: var(--brand-emerald-light); border: 1px solid var(--brand-emerald-muted);">
            <span class="w-1.5 h-1.5 rounded-full" style="background: var(--brand-emerald);"></span>
            {{ stats.lucro }} GANHANDO
          </div>
          <div class="flex-1 flex justify-center items-center gap-1 py-1 rounded-[var(--radius-sm)]"
               style="color: var(--text-secondary); background: var(--surface-overlay); border: 1px solid var(--border-subtle);">
            <span class="w-1.5 h-1.5 rounded-full" style="background: var(--text-muted);"></span>
            {{ stats.breakeven }} EMPATE
          </div>
          <div class="flex-1 flex justify-center items-center gap-1 py-1 rounded-[var(--radius-sm)]"
               style="color: var(--brand-rose); background: var(--brand-rose-light); border: 1px solid var(--brand-rose-muted);">
            <span class="w-1.5 h-1.5 rounded-full" style="background: var(--brand-rose);"></span>
            {{ stats.prejuizo }} PERDENDO
          </div>
        </div>
      </div>

      <!-- Cards de % -->
      <div class="grid grid-cols-2 gap-3 mt-auto">
        <div class="p-3 rounded-[var(--radius-lg)] flex flex-col items-center"
             style="background: var(--brand-emerald-light); border: 1px solid var(--brand-emerald-muted);">
          <span style="font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em;
                       color: var(--brand-emerald); opacity: 0.8; margin-bottom: 3px;">Lucro</span>
          <div class="flex items-baseline gap-1">
            <span style="font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 700; color: var(--brand-emerald);">{{ stats.pctLucro }}</span>
            <span style="font-size: 10px; font-weight: 600; color: var(--brand-emerald);">%</span>
          </div>
        </div>
        <div class="p-3 rounded-[var(--radius-lg)] flex flex-col items-center"
             style="background: var(--brand-rose-light); border: 1px solid var(--brand-rose-muted);">
          <span style="font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em;
                       color: var(--brand-rose); opacity: 0.8; margin-bottom: 3px;">Prejuízo</span>
          <div class="flex items-baseline gap-1">
            <span style="font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 700; color: var(--brand-rose);">{{ stats.pctPrejuizo }}</span>
            <span style="font-size: 10px; font-weight: 600; color: var(--brand-rose);">%</span>
          </div>
        </div>
      </div>
    </template>

    <!-- Fallback: P/L individual indisponível (plTotalValor = 0 em todos) — exibe resultado global -->
    <template v-else>
      <div class="flex-1 flex flex-col justify-center gap-4">

        <!-- P/L total global -->
        <div class="p-4 rounded-[var(--radius-lg)] flex flex-col items-center gap-1"
             :style="plGlobal >= 0
               ? 'background: var(--brand-emerald-light); border: 1px solid var(--brand-emerald-muted);'
               : 'background: var(--brand-rose-light);   border: 1px solid var(--brand-rose-muted);'">
          <span style="font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.7; margin-bottom: 2px;"
                :style="plGlobal >= 0 ? 'color: var(--brand-emerald);' : 'color: var(--brand-rose);'">
            Resultado Aberto
          </span>
          <span style="font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 700; letter-spacing: -0.03em;"
                :style="plGlobal >= 0 ? 'color: var(--brand-emerald);' : 'color: var(--brand-rose);'">
            {{ formatCurrency(plGlobal) }}
          </span>
          <span style="font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600; color: var(--text-muted);"
                v-if="plPct !== null">
            {{ plPct >= 0 ? '+' : '' }}{{ plPct.toFixed(2).replace('.', ',') }}%
          </span>
        </div>

        <!-- Total de operações + nocional -->
        <div class="grid grid-cols-2 gap-2">
          <div class="p-3 rounded-[var(--radius-lg)] flex flex-col items-center"
               style="background: var(--surface-overlay); border: 1px solid var(--border-subtle);">
            <span style="font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 2px;">Operações</span>
            <span style="font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 700; color: var(--text-primary);">{{ totalOps }}</span>
          </div>
          <div class="p-3 rounded-[var(--radius-lg)] flex flex-col items-center"
               style="background: var(--surface-overlay); border: 1px solid var(--border-subtle);">
            <span style="font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 2px;">Nocional</span>
            <span style="font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 700; color: var(--text-secondary);">{{ formatCurrency(nocional) }}</span>
          </div>
        </div>

      </div>
    </template>

  </div>
</template>

<script>
const resultadoCurrencyFmt = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL', maximumFractionDigits: 0 });

window.CardResultado = {
  props: {
    isMobile:           { type: Boolean, default: false },
    statsPreCalculados: Object,
    isLoading:          { type: Boolean, default: false }
  },
  template: '#card-resultado-template',

  computed: {
    stats() {
      if (!this.statsPreCalculados?.resultadoStats)
        return { lucro: 0, breakeven: 0, prejuizo: 0, total: 0, pctLucro: 0, pctBreakeven: 0, pctPrejuizo: 0 };
      return this.statsPreCalculados.resultadoStats;
    },

    // Dados do resumoGlobal — usados no fallback quando plTotalValor = 0 em todos
    plGlobal() {
      return Number(this.statsPreCalculados?.resumoGlobal?.plTotalValor) || 0;
    },
    plPct() {
      const pct = this.statsPreCalculados?.resumoGlobal?.plTotalPct;
      return pct != null ? Number(pct) : null;
    },
    nocional() {
      return Number(this.statsPreCalculados?.resumoGlobal?.nocional) || 0;
    },
    totalOps() {
      return this.statsPreCalculados?.resumoGlobal?.totalOps || this.statsPreCalculados?.listaAtivas?.length || 0;
    },

    statusPerformance() {
      if (this.stats.total === 0) return {
        labelClean: 'Aguardando',
        dotStyle:  'background: var(--text-muted);',
        textStyle: 'color: var(--text-muted);'
      };
      if (this.stats.pctLucro >= 50) return {
        labelClean: 'Positivo',
        dotStyle:  'background: var(--brand-emerald);',
        textStyle: 'color: var(--brand-emerald);'
      };
      return {
        labelClean: 'Atenção',
        dotStyle:  'background: var(--brand-rose);',
        textStyle: 'color: var(--brand-rose);'
      };
    }
  },

  methods: {
    formatCurrency(val) {
      return resultadoCurrencyFmt.format(val || 0);
    }
  }
};
</script>
