<template id="oplab-explorer-view-template">
  <div style="max-width: 95%; margin: 1.5rem auto 4rem; display: flex; flex-direction: column; gap: 1.5rem;"
       :style="isMobile ? 'max-width: 100%; margin: 0.75rem auto 4rem; padding: 0 0.5rem;' : ''">

    <div class="premium-card" style="padding: 1.5rem 2rem; display: flex; align-items: center; justify-content: space-between;">
      <div style="display: flex; align-items: center; gap: 1.25rem;">
        <div style="padding: 0.75rem; background: var(--brand-indigo-light); color: var(--brand-indigo); border-radius: var(--radius-lg); border: 1px solid var(--brand-indigo-muted);">
          <i data-lucide="terminal" style="width: 1.5rem; height: 1.5rem;"></i>
        </div>
        <div>
          <h2 class="t-title" style="color: var(--text-primary);">OpLab API Explorer</h2>
          <p class="t-label-sm" style="color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.15em; margin-top: 0.25rem;">
            v3 · {{ endpoints.length }} GET endpoints
          </p>
        </div>
      </div>
      <div style="display: flex; align-items: center; gap: 0.5rem; padding: 0.375rem 0.75rem; background: var(--brand-emerald-light); border: 1px solid var(--brand-emerald-muted); border-radius: var(--radius-full);">
        <span style="width: 6px; height: 6px; border-radius: 50%; background: var(--brand-emerald); box-shadow: 0 0 6px var(--brand-emerald);"></span>
        <span class="t-label-sm" style="color: var(--brand-emerald); font-weight: 700;">Token Ativo</span>
      </div>
    </div>

    <div style="display: flex; gap: 1.5rem; align-items: flex-start;"
         :style="isMobile ? 'flex-direction: column-reverse;' : 'flex-direction: row;'">
  
      <div style="flex: 1; display: flex; flex-direction: column; gap: 1.5rem; min-width: 0;">
        
        <div class="premium-card" style="min-height: 400px; display: flex; flex-direction: column;">
          <div v-if="!selectedEp" style="display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; opacity: 0.5; min-height: 300px;">
            <i data-lucide="zap" style="width: 48px; height: 48px; color: var(--text-muted); margin-bottom: 1rem;"></i>
            <p class="t-body" style="color: var(--text-secondary); text-align: center;">Selecione um endpoint no menu lateral<br>para explorar a API da OpLab.</p>
          </div>

          <div v-else style="padding: 1.5rem; display: flex; flex-direction: column; gap: 1.5rem;">
            <div>
              <div style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.75rem;">
                <span style="font-size: 0.65rem; font-weight: 800; padding: 0.2rem 0.5rem; border-radius: var(--radius-sm); background: var(--brand-emerald-light); color: var(--brand-emerald); font-family: 'JetBrains Mono', monospace;">GET</span>
                <span v-for="tag in selectedEp.tags" :key="tag" class="t-label-sm" style="border: 1px solid var(--border-default); padding: 0.2rem 0.5rem; border-radius: var(--radius-sm); color: var(--text-tertiary);">{{ tag }}</span>
              </div>
              <h3 style="font-family: 'JetBrains Mono', monospace; font-size: 1.25rem; font-weight: 700; color: var(--text-primary); letter-spacing: -0.02em;">{{ selectedEp.path }}</h3>
              <p class="t-body" style="color: var(--text-secondary); margin-top: 0.25rem;">{{ selectedEp.summary }}</p>
            </div>

            <div style="padding: 0.75rem 1rem; background: var(--surface-sunken); border: 1px solid var(--border-default); border-radius: var(--radius-md); font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--text-tertiary); word-break: break-all;">
              <span style="opacity: 0.5;">→</span> <span style="color: var(--brand-indigo); font-weight: 600;">{{ urlPreview }}</span>
            </div>

            <div v-if="selectedEp.parameters.length > 0">
              <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <span class="t-label" style="color: var(--text-primary);">Parâmetros</span>
                <button @click="fillSuggested" class="btn-action btn-action-ghost" style="padding: 0.3rem 0.75rem; min-height: 24px;">✦ Sugestões</button>
              </div>
              <div style="display: flex; flex-direction: column; gap: 0.75rem;">
                <div v-for="p in selectedEp.parameters" :key="p.name" 
                     style="display: flex; align-items: center; gap: 1rem; background: var(--surface-overlay); border: 1px solid var(--border-default); padding: 0.75rem 1rem; border-radius: var(--radius-md);"
                     :style="isMobile ? 'flex-direction: column; align-items: flex-start;' : ''">
                  <div style="min-width: 140px;">
                    <span style="font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; font-weight: 700; color: var(--text-primary);">{{ p.name }}</span>
                    <span v-if="p.required" style="font-size: 0.6rem; font-weight: 800; color: var(--brand-rose); margin-left: 4px;">REQ</span>
                  </div>
                  <input v-model="paramValues[p.name]" type="text" :placeholder="p.example || ''" class="input-base" style="flex: 1; width: 100%;">
                </div>
              </div>
            </div>

            <button @click="executeRequest" :disabled="hasMissingParams || isLoadingRequest" 
                    class="btn-action" 
                    :class="(hasMissingParams || isLoadingRequest) ? 'btn-action-ghost' : 'btn-action-primary'"
                    style="width: 100%; padding: 1rem; border-radius: var(--radius-md);">
              <i v-if="isLoadingRequest" data-lucide="loader-2" class="animate-spin" style="width: 1rem; height: 1rem; margin-right: 8px;"></i>
              {{ isLoadingRequest ? 'Processando...' : 'Executar GET Request' }}
            </button>
          </div>
        </div>

        <div class="premium-card" style="background: #0D0F14; border-color: #1F2937; overflow: hidden; display: flex; flex-direction: column;">
          <div style="padding: 0.75rem 1rem; background: #161A23; border-bottom: 1px solid #1F2937; display: flex; justify-content: space-between; align-items: center;">
            <div style="display: flex; align-items: center; gap: 8px;">
              <div style="display: flex; gap: 5px;">
                <div style="width: 10px; height: 10px; border-radius: 50%; background: #EF4444;"></div>
                <div style="width: 10px; height: 10px; border-radius: 50%; background: #F59E0B;"></div>
                <div style="width: 10px; height: 10px; border-radius: 50%; background: #10B981;"></div>
              </div>
              <span style="font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; color: #9CA3AF; margin-left: 8px;">Response Terminal</span>
            </div>
            <div v-if="lastResponse" style="display: flex; align-items: center; gap: 10px;">
              <span style="font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; font-weight: 700;" :style="lastResponse.status === 200 ? 'color: #10B981;' : 'color: #EF4444;'">
                HTTP {{ lastResponse.status }}
              </span>
              <button @click="copyResponse" class="btn-action btn-action-ghost" style="font-size: 10px; padding: 2px 8px; min-height: 24px;">
                {{ isCopied ? 'Copiado!' : 'Copiar JSON' }}
              </button>
            </div>
          </div>
          
          <div class="log-scrollbar" style="padding: 1.5rem; min-height: 250px; max-height: 600px; overflow-y: auto;">
             <div v-if="isLoadingRequest" key="loading" style="color: #818CF8; font-family: monospace; display: flex; align-items: center; gap: 10px;">
                <i data-lucide="loader-2" class="animate-spin" style="width: 14px; height: 14px;"></i> Consultando API da OpLab...
             </div>
             
             <div v-else-if="!lastResponse" key="empty" style="color: #4B5563; font-family: monospace; font-size: 0.8rem; text-align: center; margin-top: 2rem;">
                Aguardando execução...
             </div>
             
             <div v-else key="result" style="width: 100%;">
                <pre v-if="lastResponse.status === 'ERR'" style="margin: 0; font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; color: #EF4444; white-space: pre-wrap;">{{ lastResponse.data }}</pre>
                <pre v-else class="json-code" v-html="highlightedJson" style="margin:0; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; line-height: 1.6; white-space: pre-wrap; color: #D1D5DB;"></pre>
             </div>
          </div>
        </div>

        <div v-if="history.length > 0" class="premium-card" style="padding: 1rem;">
          <h4 class="t-label" style="margin-bottom: 0.75rem; color: var(--text-tertiary);">Histórico Recente</h4>
          <div style="display: flex; flex-direction: column; gap: 4px;">
            <div v-for="(h, i) in history" :key="i" @click="replayHistory(h.path)"
                 style="padding: 0.6rem 1rem; border-radius: 4px; background: var(--surface-overlay); cursor: pointer; font-size: 11px; font-family: monospace; display: flex; align-items: center; gap: 15px; border: 1px solid var(--border-subtle); transition: 0.2s;"
                 onmouseover="this.style.background='var(--surface-sunken)'"
                 onmouseout="this.style.background='var(--surface-overlay)'">
              <span style="color: var(--text-muted); width: 70px;">{{ h.time }}</span>
              <span style="color: var(--brand-indigo); font-weight: 700; flex: 1;">{{ h.path }}</span>
              <span style="width: 40px; font-weight: 800;" :style="h.status === 200 ? 'color: var(--brand-emerald)' : 'color: var(--brand-rose)'">{{ h.status }}</span>
              <span style="color: var(--text-muted); width: 50px; text-align: right;">{{ h.ms }}ms</span>
            </div>
          </div>
        </div>

      </div>

      <div class="premium-card" 
           style="display: flex; flex-direction: column; overflow: hidden;"
           :style="isMobile ? 'width: 100%; height: 500px;' : 'width: 320px; min-width: 320px; height: calc(100vh - 180px); position: sticky; top: 2rem;'">
        
        <div style="padding: 1rem; border-bottom: 1px solid var(--border-subtle); background: var(--surface-overlay);">
          <input v-model="searchQuery" type="text" placeholder="Buscar endpoint..." class="input-base" style="width: 100%;">
        </div>

        <div class="log-scrollbar" style="padding: 0.75rem 1rem; border-bottom: 1px solid var(--border-subtle); display: flex; overflow-x: auto; gap: 0.5rem; background: var(--surface-base);">
          <button @click="selectedTag = null" 
                  class="t-label-sm" 
                  style="padding: 0.3rem 0.6rem; border-radius: var(--radius-sm); border: 1px solid var(--border-default); cursor: pointer; white-space: nowrap; transition: all 0.2s;"
                  :style="!selectedTag ? 'background: var(--brand-indigo-light); color: var(--brand-indigo); border-color: var(--brand-indigo-muted);' : 'background: transparent; color: var(--text-tertiary);'">
            Todos
          </button>
          <button v-for="tag in availableTags" :key="tag" @click="selectedTag = tag"
                  class="t-label-sm" 
                  style="padding: 0.3rem 0.6rem; border-radius: var(--radius-sm); border: 1px solid var(--border-default); cursor: pointer; white-space: nowrap; transition: all 0.2s;"
                  :style="selectedTag === tag ? 'background: var(--brand-indigo-light); color: var(--brand-indigo); border-color: var(--brand-indigo-muted);' : 'background: transparent; color: var(--text-tertiary);'">
            {{ tag }}
          </button>
        </div>

        <div class="log-scrollbar" style="flex: 1; overflow-y: auto; padding: 0.5rem; background: var(--surface-base);">
          <div v-if="filteredEndpoints.length === 0" style="padding: 1rem; text-align: center; color: var(--text-muted);" class="t-body">Nenhum resultado</div>
          <button v-for="ep in filteredEndpoints" :key="ep.path" 
                  @click="selectEndpoint(ep)"
                  style="width: 100%; text-align: left; padding: 0.75rem; border-radius: var(--radius-md); border: 1px solid transparent; cursor: pointer; transition: all 0.2s; display: flex; flex-direction: column; gap: 0.25rem;"
                  :style="selectedEp && selectedEp.path === ep.path ? 'background: var(--brand-indigo-light); border-color: var(--brand-indigo-muted);' : 'background: transparent;'"
                  onmouseover="if(this.style.background === 'transparent') this.style.background='var(--surface-overlay)'"
                  onmouseout="if(this.style.background === 'var(--surface-overlay)') this.style.background='transparent'">
            <div style="display: flex; align-items: center; gap: 0.5rem; overflow: hidden;">
              <span style="font-family: 'JetBrains Mono', monospace; font-size: 0.55rem; font-weight: 800; padding: 0.15rem 0.3rem; border-radius: 2px; background: var(--brand-emerald-light); color: var(--brand-emerald);">GET</span>
              <span style="font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--text-primary); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;"
                    :style="selectedEp && selectedEp.path === ep.path ? 'color: var(--brand-indigo);' : ''">{{ ep.path }}</span>
            </div>
            <span style="font-size: 0.7rem; color: var(--text-tertiary); padding-left: 2.2rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">{{ ep.summary }}</span>
          </button>
        </div>

      </div>

    </div>
  </div>
</template>

<style>
  @keyframes comp-spin { to { transform: rotate(360deg); } }
  
  .json-code .hl-key { color: #818CF8; font-weight: 600; }   
  .json-code .hl-str { color: #10B981; }   
  .json-code .hl-num { color: #FBBF24; }   
  .json-code .hl-bool { color: #EC4899; font-weight: 600; }  
  .json-code .hl-null { color: #6B7280; font-style: italic; } 
  
  .copy-btn {
    background: rgba(255,255,255,0.05);
    border: 1px solid #374151;
    color: #D1D5DB;
    padding: 2px 8px;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    transition: all 0.2s;
  }
  .copy-btn:hover { background: rgba(255,255,255,0.1); border-color: #4B5563; }
</style>

<script>
window.OpLabExplorerView = {
  template: '#oplab-explorer-view-template',
  props: ['isMobile'],
  data() {
    return {
      // ═══════════════════════════════════════════════════════════
      //  CATÁLOGO DE ENDPOINTS - LOTE 1 (Instrumentos e Opções)
      // ═══════════════════════════════════════════════════════════
    endpoints: [
        {
          path: "/market/quote",
          summary: "Consultar cotações de instrumentos",
          tags: ["Instrumentos"],
          parameters: [
            { name: "tickers", in: "query", required: true, type: "string", description: "Códigos separados por vírgula", example: "PETR4,VALE3" }
          ]
        },
        {
          path: "/market/instruments/search",
          summary: "Buscar instrumentos",
          tags: ["Instrumentos"],
          parameters: [
            { name: "search", in: "query", required: true, type: "string", description: "Termo de busca" }
          ]
        },
        {
          path: "/market/instruments/{symbol}",
          summary: "Consultar um instrumento",
          tags: ["Instrumentos"],
          parameters: [
            { name: "symbol", in: "path", required: true, type: "string", description: "Código do instrumento", example: "PETR4" }
          ]
        },
        {
          path: "/market/instruments",
          summary: "Listar instrumentos",
          tags: ["Instrumentos"],
          parameters: []
        },
        {
          path: "/market/instruments/series/{symbol}",
          summary: "Séries de um instrumento",
          tags: ["Instrumentos"],
          parameters: [
            { name: "symbol", in: "path", required: true, type: "string", description: "Código do instrumento", example: "PETR4" }
          ]
        },
        {
          path: "/market/status",
          summary: "Status do mercado",
          tags: ["Mercado"],
          parameters: []
        },
        {
          path: "/market/companies",
          summary: "Listar empresas",
          tags: ["Mercado"],
          parameters: []
        },
        {
          path: "/market/options/{symbol}",
          summary: "Listar opções de um ativo",
          tags: ["Opções"],
          parameters: [
            { name: "symbol", in: "path", required: true, type: "string", description: "Código da ação", example: "PETR4" }
          ]
        },
        {
          path: "/market/options/details/{symbol}",
          summary: "Detalhes de uma opção",
          tags: ["Opções"],
          parameters: [
            { name: "symbol", in: "path", required: true, type: "string", description: "Código da opção", example: "PETRA260" }
          ]
        },
        {
          path: "/market/options/strategies/covered",
          summary: "Opções cobertas",
          tags: ["Opções"],
          parameters: [
            { name: "symbol", in: "query", required: true, type: "string", description: "Código da ação", example: "PETR4" }
          ]
        },
        {
          path: "/market/options/bs",
          summary: "Black-Scholes",
          tags: ["Opções"],
          parameters: [
            { name: "symbol", in: "query", required: true, type: "string", description: "Código da opção" },
            { name: "spot", in: "query", required: false, type: "number", description: "Preço spot" },
            { name: "volatility", in: "query", required: false, type: "number", description: "Volatilidade" }
          ]
        },
        {
          path: "/market/options/powders",
          summary: "Pó de opções",
          tags: ["Opções"],
          parameters: []
        },
        {
          path: "/market/stocks",
          summary: "Listar ações",
          tags: ["Ações"],
          parameters: []
        },
        {
          path: "/market/stocks/all",
          summary: "Todas as ações (com detalhes)",
          tags: ["Ações"],
          parameters: []
        },
        {
          path: "/market/stocks/{symbol}",
          summary: "Consultar uma ação",
          tags: ["Ações"],
          parameters: [
            { name: "symbol", in: "path", required: true, type: "string", description: "Código do ativo", example: "PETR4" },
            { name: "with_financials", in: "query", required: false, type: "string", description: "Atributos extras" }
          ]
        },
        {
          path: "/market/historical/{symbol}/{resolution}",
          summary: "Dados históricos de um instrumento",
          tags: ["Dados Históricos"],
          parameters: [
            { name: "symbol", in: "path", required: true, type: "string", example: "PETR4" },
            { name: "resolution", in: "path", required: true, type: "string", example: "1d" },
            { name: "from", in: "query", required: true, type: "string", format: "date-time", example: "2024-01-01T00:00:00Z" },
            { name: "to", in: "query", required: true, type: "string", format: "date-time", example: "2025-03-12T23:59:59Z" },
            { name: "amount", in: "query", required: false, type: "integer" },
            { name: "raw", in: "query", required: false, type: "boolean", default: "false" },
            { name: "smooth", in: "query", required: false, type: "boolean", default: "false" },
            { name: "df", in: "query", required: false, type: "string" }
          ]
        },
        {
          path: "/market/historical/options/{spot}/{from}/{to}",
          summary: "Histórico de opções",
          tags: ["Dados Históricos"],
          parameters: [
            { name: "spot", in: "path", required: true, type: "string", example: "PETR4" },
            { name: "from", in: "path", required: true, type: "string", example: "2024-01-01" },
            { name: "to", in: "path", required: true, type: "string", example: "2025-03-12" }
          ]
        },
        {
          path: "/market/historical/instruments",
          summary: "Instrumentos com histórico",
          tags: ["Dados Históricos"],
          parameters: []
        },
        {
          path: "/market/interest_rates",
          summary: "Listar taxas de juros",
          tags: ["Taxas de Juros"],
          parameters: []
        },
        {
          path: "/market/interest_rates/{id}",
          summary: "Consultar taxa de juros",
          tags: ["Taxas de Juros"],
          parameters: [
            { name: "id", in: "path", required: true, type: "string", description: "ID da taxa" }
          ]
        },
        {
          path: "/market/statistics/realtime/highest_options_volume",
          summary: "Maior volume de opções",
          tags: ["Rankings"],
          parameters: []
        },
        {
          path: "/market/statistics/realtime/best_covered_options_rates/{type}",
          summary: "Melhores taxas opções cobertas",
          tags: ["Rankings"],
          parameters: [
            { name: "type", in: "path", required: true, type: "string", example: "put" }
          ]
        },
        {
          path: "/market/statistics/realtime/highest_options_variation/{type}",
          summary: "Maior variação de opções",
          tags: ["Rankings"],
          parameters: [
            { name: "type", in: "path", required: true, type: "string", example: "put" }
          ]
        },
        {
          path: "/market/statistics/ranking/m9_m21",
          summary: "Ranking M9/M21",
          tags: ["Rankings"],
          parameters: []
        },
        {
          path: "/market/statistics/ranking/correl_ibov",
          summary: "Correlação com IBOV",
          tags: ["Rankings"],
          parameters: []
        },
        {
          path: "/market/statistics/ranking/{attribute}",
          summary: "Ranking por atributo",
          tags: ["Rankings"],
          parameters: [
            { name: "attribute", in: "path", required: true, type: "string" }
          ]
        },
        {
          path: "/market/statistics/ranking/oplab_score",
          summary: "Ranking OpLab Score",
          tags: ["Rankings"],
          parameters: []
        },
        {
          path: "/market/exchanges",
          summary: "Listar bolsas de valores",
          tags: ["Bolsas de Valores"],
          parameters: []
        },
        {
          path: "/market/exchanges/{uid}",
          summary: "Consultar uma bolsa",
          tags: ["Bolsas de Valores"],
          parameters: [
            { name: "uid", in: "path", required: true, type: "string" }
          ]
        },
        {
          path: "/domain/portfolios",
          summary: "Listar portfólios",
          tags: ["Portfólios"],
          parameters: []
        },
        {
          path: "/domain/portfolios/{id}",
          summary: "Consultar portfólio",
          tags: ["Portfólios"],
          parameters: [
            { name: "id", in: "path", required: true, type: "string" }
          ]
        },
        {
          path: "/domain/portfolios/{id}/returns",
          summary: "Retornos do portfólio",
          tags: ["Portfólios"],
          parameters: [
            { name: "id", in: "path", required: true, type: "string" }
          ]
        },
        {
          path: "/domain/portfolios/{id}/tags",
          summary: "Tags do portfólio",
          tags: ["Portfólios"],
          parameters: [
            { name: "id", in: "path", required: true, type: "string" }
          ]
        },
        {
          path: "/domain/portfolios/{portfolio_id}/positions",
          summary: "Listar posições",
          tags: ["Posições"],
          parameters: [
            { name: "portfolio_id", in: "path", required: true, type: "string" }
          ]
        },
        {
          path: "/domain/portfolios/{portfolio_id}/positions/{id}",
          summary: "Consultar posição",
          tags: ["Posições"],
          parameters: [
            { name: "portfolio_id", in: "path", required: true, type: "string" },
            { name: "id", in: "path", required: true, type: "string" }
          ]
        },
        {
          path: "/domain/portfolios/{portfolio_id}/orders",
          summary: "Listar ordens",
          tags: ["Ordens"],
          parameters: [
            { name: "portfolio_id", in: "path", required: true, type: "string" }
          ]
        },
        {
          path: "/domain/portfolios/{portfolio_id}/orders/pending",
          summary: "Ordens pendentes",
          tags: ["Ordens"],
          parameters: [
            { name: "portfolio_id", in: "path", required: true, type: "string" }
          ]

  computed: {
    // Organiza as categorias de API automaticamente
    availableTags() {
      const used = new Set();
      this.endpoints.forEach(e => e.tags.forEach(t => used.add(t)));
      return Array.from(used).sort();
    },

    // Filtro de busca em tempo real
    filteredEndpoints() {
      let eps = this.endpoints;
      if (this.selectedTag) eps = eps.filter(e => e.tags.includes(this.selectedTag));
      if (this.searchQuery) {
        const sq = this.searchQuery.toLowerCase();
        eps = eps.filter(e => e.path.toLowerCase().includes(sq) || e.summary.toLowerCase().includes(sq));
      }
      return eps;
    },

    // Gera a URL visual enquanto você digita os parâmetros
    urlPreview() {
      if (!this.selectedEp) return '';
      let path = this.selectedEp.path;
      const qp = [];
      this.selectedEp.parameters.forEach(p => {
        const v = this.paramValues[p.name];
        if (p.in === 'path' && v) path = path.replace('{' + p.name + '}', encodeURIComponent(v));
        else if (p.in === 'query' && v) qp.push(p.name + '=' + encodeURIComponent(v));
      });
      return 'https://api.oplab.com.br/v3' + path + (qp.length ? '?' + qp.join('&') : '');
    },

    // Trava de segurança do botão de execução
    hasMissingParams() {
      if (!this.selectedEp) return true;
      return this.selectedEp.parameters.some(p => p.required && !this.paramValues[p.name]);
    },

    // 🛡️ FORMATADOR DE JSON (Transforma objeto em HTML colorido)
    highlightedJson() {
      if (!this.lastResponse || !this.lastResponse.data) return '';
      
      let data = this.lastResponse.data;
      // Garante que temos um objeto para dar stringify
      if (typeof data === 'string') {
        try { data = JSON.parse(data); } catch (e) { return data; }
      }
      
      const json = JSON.stringify(data, null, 2);
      
      // Escapa HTML para segurança e aplica as classes de cor do CSS (Parte 2)
      return json
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/("(\\u[\da-fA-F]{4}|\\[^u]|[^\\"])*")\s*:/g, '<span class="hl-key">$1</span>:')
        .replace(/("(\\u[\da-fA-F]{4}|\\[^u]|[^\\"])*")/g, (match) => {
          if (/:$/.test(match)) return match;
          return '<span class="hl-str">' + match + '</span>';
        })
        .replace(/\b(-?\d+\.?\d*([eE][+-]?\d+)?)\b/g, '<span class="hl-num">$1</span>')
        .replace(/\b(true|false)\b/g, '<span class="hl-bool">$1</span>')
        .replace(/\bnull\b/g, '<span class="hl-null">null</span>');
    }
  },

  mounted() {
    this.$nextTick(() => { if (window.lucide) lucide.createIcons(); });
  },

  methods: {
    // Seleciona o endpoint e limpa o terminal
    selectEndpoint(ep) {
      this.selectedEp = ep;
      this.paramValues = {};
      this.lastResponse = null;
      // Preenche com exemplos da POC se existirem
      ep.parameters.forEach(p => {
        this.paramValues[p.name] = p.example || '';
      });
      this.$nextTick(() => { if (window.lucide) lucide.createIcons(); });
    },

    // Atalho para preencher campos chatos (como datas ISO)
    fillSuggested() {
      if (!this.selectedEp) return;
      this.selectedEp.parameters.forEach(p => {
        if (p.example) this.paramValues[p.name] = String(p.example);
        else if (p.type === 'string' && p.name.includes('from')) this.paramValues[p.name] = '2024-01-01';
      });
    },

    // 🚀 EXECUÇÃO MESTRE: CONEXÃO COM O BACKEND
    executeRequest() {
      if (this.hasMissingParams) return;
      
      this.isLoadingRequest = true;
      this.lastResponse = null;

      let path = this.selectedEp.path;
      const queryParams = {};
      
      this.selectedEp.parameters.forEach(p => {
        const v = this.paramValues[p.name];
        if (p.in === 'path' && v) path = path.replace('{' + p.name + '}', v);
        else if (p.in === 'query' && v) queryParams[p.name] = v;
      });

      // Chama a função callOpLabAPI do arquivo OpLabExplorer_API.gs
      google.script.run
        .withSuccessHandler((res) => {
          this.lastResponse = res;
          this.isLoadingRequest = false;
          
          // Adiciona ao histórico de navegação
          this.history.unshift({
            path: this.selectedEp.path,
            status: res.status,
            ms: res.elapsed || 0,
            time: new Date().toLocaleTimeString('pt-BR')
          });
          if (this.history.length > 15) this.history.pop();
          
          this.$nextTick(() => { if (window.lucide) lucide.createIcons(); });
        })
        .withFailureHandler((err) => {
          this.lastResponse = { status: 'ERR', data: "Falha na comunicação com o Google Script: " + String(err) };
          this.isLoadingRequest = false;
        })
        .callOpLabAPI(path, queryParams);
    },

    // Copia o JSON bruto para o seu clipboard
    copyResponse() {
      if (!this.lastResponse) return;
      const text = JSON.stringify(this.lastResponse.data, null, 2);
      const el = document.createElement('textarea');
      el.value = text;
      document.body.appendChild(el);
      el.select();
      document.execCommand('copy');
      document.body.removeChild(el);
      
      this.isCopied = true;
      setTimeout(() => { this.isCopied = false; }, 2000);
    },

    // Repete uma consulta do histórico
    replayHistory(path) {
      const ep = this.endpoints.find(e => e.path === path);
      if (ep) {
        this.selectEndpoint(ep);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    }
  }
};
