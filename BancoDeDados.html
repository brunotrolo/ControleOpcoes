<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/handsontable/dist/handsontable.full.min.css">
<script src="https://cdn.jsdelivr.net/npm/handsontable/dist/handsontable.full.min.js"></script>

<template id="page-bancodedados">
  <div style="max-width:95%;margin:0 auto;display:flex;flex-direction:column;height:100%;overflow:hidden;gap:1.5rem;padding-top:1.5rem;">

    <!-- HEADER -->
    <div class="premium-card" style="padding:1.5rem 2rem;display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:1.5rem;flex-shrink:0;z-index:30;position:relative;">

      <div style="display:flex;align-items:center;gap:1.25rem;">
        <div style="padding:0.75rem;background:var(--brand-indigo-light);color:var(--brand-indigo);border-radius:var(--radius-lg);border:1px solid var(--brand-indigo-muted);flex-shrink:0;">
          <i data-lucide="database" style="width:24px;height:24px;display:block;"></i>
        </div>
        <div>
          <h2 class="t-title" style="color:var(--text-primary);">Universal Data Bridge</h2>
          <div style="display:flex;align-items:center;gap:0.5rem;margin-top:0.25rem;">
            <span style="display:flex;width:8px;height:8px;border-radius:50%;background:var(--brand-emerald);flex-shrink:0;"></span>
            <p class="t-label-sm" style="color:var(--text-muted);text-transform:uppercase;letter-spacing:0.2em;">Base de Dados - Controle de Opções</p>
          </div>
        </div>
      </div>

      <!-- Toolbar -->
      <div style="display:flex;align-items:center;gap:0.75rem;background:var(--surface-overlay);padding:0.375rem;border-radius:var(--radius-lg);border:1px solid var(--border-subtle);">
        <label class="t-label-sm" style="color:var(--text-muted);text-transform:uppercase;letter-spacing:0.2em;margin-left:0.5rem;">Dataset:</label>

        <select v-model="abaAtiva" @change="switchAba"
          style="background:var(--surface-base);color:var(--text-primary);font-size:0.78rem;font-weight:700;border:1px solid var(--border-default);border-radius:var(--radius-md);padding:0.6rem 1rem;outline:none;min-width:14rem;cursor:pointer;">
          <option v-for="nome in listaAbas" :key="nome" :value="nome">📊 {{ nome }}</option>
        </select>

        <div style="width:1px;height:1.5rem;background:var(--border-default);margin:0 0.25rem;"></div>

        <div style="display:flex;align-items:center;gap:0.5rem;">
          <!-- Sync -->
          <button @click="sincronizarBanco"
            style="background:var(--surface-base);border:1px solid var(--border-default);color:var(--brand-indigo);padding:0.6rem;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;cursor:pointer;"
            title="Sincronizar">
            <span :style="syncBusy ? 'animation:bdb-spin 0.7s linear infinite;' : ''"
              style="display:flex;align-items:center;justify-content:center;transform-origin:center;">
              <i data-lucide="refresh-cw" style="width:16px;height:16px;display:block;"></i>
            </span>
          </button>

          <!-- Novo -->
          <button @click="abrirModalAdd" class="btn-action btn-action-primary" style="padding:0.6rem 1.25rem;display:inline-flex;align-items:center;gap:0.375rem;">
            <i data-lucide="plus" style="width:16px;height:16px;display:block;"></i>
            <span>Novo</span>
          </button>

          <!-- Excluir selecionados -->
          <button @click="excluirSelecionados" v-if="temSelecao"
            style="background:var(--brand-rose-light);color:var(--brand-rose);border:1px solid var(--brand-rose-muted);padding:0.6rem 1.25rem;border-radius:var(--radius-md);font-size:0.78rem;font-weight:700;display:inline-flex;align-items:center;gap:0.375rem;cursor:pointer;transition:background var(--duration-fast);">
            <i data-lucide="trash-2" style="width:16px;height:16px;display:block;"></i>
            <span>Excluir ({{ qtdSelecionada }})</span>
          </button>
        </div>
      </div>
    </div>

    <!-- CORPO DA GRID -->
    <div style="flex:1;position:relative;padding:1.5rem;overflow:hidden;">

      <!-- Loading overlay -->
      <transition name="bdb-fade">
        <div v-if="syncBusy"
          style="position:absolute;inset:0;background:rgba(var(--surface-base-rgb,255,255,255),0.7);backdrop-filter:blur(8px);z-index:40;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:1.5rem;border-radius:var(--radius-xl);">
          <div style="position:relative;width:4rem;height:4rem;">
            <div style="position:absolute;inset:0;border:4px solid var(--brand-indigo-light);border-radius:50%;"></div>
            <div style="position:absolute;inset:0;border:4px solid var(--brand-indigo);border-top-color:transparent;border-radius:50%;animation:bdb-spin 0.8s linear infinite;"></div>
          </div>
          <p class="t-label-sm" style="margin-top:1rem;color:var(--brand-indigo);text-transform:uppercase;letter-spacing:0.3em;">Mapeando Matriz...</p>
        </div>
      </transition>

      <!-- Stats seleção flutuante -->
      <transition name="bdb-fade">
        <div v-if="statsSelecao.conta > 1"
          style="position:absolute;bottom:2.5rem;right:2.5rem;z-index:50;background:var(--surface-base);backdrop-filter:blur(8px);border:1px solid var(--border-default);border-radius:var(--radius-lg);padding:1rem 1.25rem;box-shadow:0 8px 30px rgba(0,0,0,0.12);display:flex;align-items:center;gap:1.5rem;">
          <div style="display:flex;flex-direction:column;">
            <span class="t-label-sm" style="color:var(--brand-indigo);text-transform:uppercase;letter-spacing:0.18em;">Soma Seleção</span>
            <span class="font-mono-data" style="font-size:0.85rem;font-weight:700;color:var(--text-primary);">{{ formatarNumero(statsSelecao.soma) }}</span>
          </div>
          <div style="width:1px;height:2rem;background:var(--border-default);"></div>
          <div style="display:flex;flex-direction:column;">
            <span class="t-label-sm" style="color:var(--text-muted);text-transform:uppercase;letter-spacing:0.18em;">Média</span>
            <span class="font-mono-data" style="font-size:0.85rem;font-weight:700;color:var(--text-secondary);">{{ formatarNumero(statsSelecao.media) }}</span>
          </div>
          <div style="background:var(--brand-indigo-light);border:1px solid var(--brand-indigo-muted);color:var(--brand-indigo);font-size:0.65rem;font-weight:700;padding:0.375rem 0.75rem;border-radius:var(--radius-md);letter-spacing:0.18em;">
            {{ statsSelecao.conta }} ITENS
          </div>
        </div>
      </transition>

      <div id="hot-engine" style="width:100%;background:var(--surface-base);border-radius:var(--radius-xl);border:1px solid var(--border-default);box-shadow:0 4px 24px rgba(0,0,0,0.08);overflow:hidden;"></div>
    </div>

    <!-- MODAL EXCLUIR -->
    <transition name="bdb-fade">
      <div v-if="modalExcluir.visivel"
        style="position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;padding:1rem;background:rgba(0,0,0,0.4);backdrop-filter:blur(4px);">
        <div style="background:var(--surface-base);border-radius:var(--radius-xl);border:1px solid var(--border-default);width:100%;max-width:22rem;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,0.2);">
          <div style="padding:2rem;text-align:center;">
            <div style="width:4rem;height:4rem;background:var(--brand-rose-light);color:var(--brand-rose);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;border:4px solid var(--brand-rose-muted);">
              <i data-lucide="alert-triangle" style="width:2rem;height:2rem;display:block;"></i>
            </div>
            <h3 class="t-subtitle" style="color:var(--text-primary);margin-bottom:0.5rem;">Confirmar Exclusão?</h3>
            <p style="font-size:0.85rem;color:var(--text-secondary);line-height:1.6;">
              {{ modalExcluir.mensagem }}
            </p>
            <span style="display:inline-block;margin-top:0.75rem;font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.2em;color:var(--brand-rose);background:var(--brand-rose-light);padding:0.375rem 1rem;border-radius:var(--radius-md);">Ação irreversível</span>
          </div>
          <div style="display:flex;gap:0.75rem;padding:1rem 1.25rem;background:var(--surface-overlay);border-top:1px solid var(--border-subtle);">
            <button @click="fecharModalExcluir" class="btn-action" style="flex:1;background:var(--surface-base);border:1px solid var(--border-default);color:var(--text-tertiary);">Cancelar</button>
            <button @click="confirmarExclusao" class="btn-action" style="flex:1;background:var(--brand-rose);color:#fff;border:none;">Sim, Excluir</button>
          </div>
        </div>
      </div>
    </transition>

    <!-- MODAL ADICIONAR -->
    <transition name="bdb-fade">
      <div v-if="modalAdd.visivel"
        style="position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;padding:1rem;background:rgba(0,0,0,0.4);backdrop-filter:blur(4px);">
        <div style="background:var(--surface-base);border-radius:var(--radius-xl);border:1px solid var(--border-default);width:100%;max-width:36rem;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,0.2);">

          <!-- Header modal -->
          <div style="background:var(--brand-indigo);padding:1.25rem 1.5rem;display:flex;justify-content:space-between;align-items:center;">
            <div style="display:flex;align-items:center;gap:0.75rem;color:#fff;">
              <i data-lucide="plus-circle" style="width:1.5rem;height:1.5rem;display:block;opacity:0.8;"></i>
              <h3 style="font-size:1rem;font-weight:700;text-transform:uppercase;letter-spacing:0.18em;">Novo: {{ abaAtiva }}</h3>
            </div>
            <button @click="fecharModalAdd"
              style="background:none;border:none;color:rgba(255,255,255,0.7);cursor:pointer;padding:0.25rem;display:flex;align-items:center;transition:transform var(--duration-fast);"
              onmouseover="this.style.transform='rotate(90deg)'" onmouseout="this.style.transform='rotate(0deg)'">
              <i data-lucide="x" style="width:1.5rem;height:1.5rem;display:block;"></i>
            </button>
          </div>

          <!-- Formulário -->
          <div style="padding:2rem;max-height:60vh;overflow-y:auto;display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;background:var(--surface-overlay);">
            <div v-for="(valor, coluna) in modalAdd.form" :key="coluna" style="display:flex;flex-direction:column;gap:0.375rem;">
              <label class="t-label-sm" style="color:var(--text-muted);font-weight:700;text-transform:uppercase;letter-spacing:0.18em;margin-left:0.25rem;">{{ coluna }}</label>
              <input v-model="modalAdd.form[coluna]" type="text"
                style="background:var(--surface-base);border:1px solid var(--border-default);border-radius:var(--radius-md);padding:0.6rem 1rem;font-size:0.8rem;font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--text-primary);outline:none;transition:border-color var(--duration-fast);"
                onfocus="this.style.borderColor='var(--brand-indigo)'"
                onblur="this.style.borderColor='var(--border-default)'">
            </div>
          </div>

          <!-- Footer modal -->
          <div style="padding:1.25rem;background:var(--surface-base);border-top:1px solid var(--border-subtle);display:flex;gap:0.75rem;">
            <button @click="fecharModalAdd" class="btn-action" style="flex:1;background:var(--surface-base);border:1px solid var(--border-default);color:var(--text-tertiary);">Cancelar</button>
            <button @click="confirmarAdicao" class="btn-action btn-action-primary" style="flex:2;">Salvar no Banco</button>
          </div>
        </div>
      </div>
    </transition>

  </div>
</template>

<style>
  @keyframes bdb-spin { to { transform: rotate(360deg); } }
  .bdb-fade-enter-active, .bdb-fade-leave-active { transition: opacity 0.3s ease; }
  .bdb-fade-enter-from, .bdb-fade-leave-to { opacity: 0; }

  #hot-engine {
    width: 100%;
    height: calc(100vh - 180px) !important;
    min-height: 400px;
    display: block;
    overflow: hidden;
  }

  .handsontable { font-size: 11px !important; }

  /* Modo claro */
  .custom-grid-style { font-family: 'JetBrains Mono', monospace !important; font-size: 11px !important; color: #334155 !important; background: #ffffff !important; }
  .custom-grid-style td { background-color: #ffffff !important; color: #334155 !important; border-color: #e2e8f0 !important; }
  .custom-grid-style tbody tr:nth-child(even) td { background-color: #f8fafc !important; }
  .custom-grid-style th { background: #f1f5f9 !important; color: #475569 !important; font-weight: 800 !important; border-bottom: 2px solid #cbd5e1 !important; border-color: #cbd5e1 !important; }
  .custom-grid-style .htCore thead th { background: #f1f5f9 !important; color: #475569 !important; }
  .custom-grid-style .htCore td.current { background-color: #eff6ff !important; }
  .custom-grid-style .htCore td.area { background-color: #dbeafe !important; }

  /* Modo escuro */
  .dark .custom-grid-style { color: #cbd5e1 !important; background: #1e293b !important; }
  .dark .custom-grid-style td { background-color: #1e293b !important; color: #cbd5e1 !important; border-color: #334155 !important; }
  .dark .custom-grid-style tbody tr:nth-child(even) td { background-color: #263244 !important; }
  .dark .custom-grid-style th { background: #0f172a !important; color: #94a3b8 !important; border-color: #334155 !important; }
  .dark .custom-grid-style .htCore thead th { background: #0f172a !important; color: #94a3b8 !important; }
  .dark .custom-grid-style .htCore td.current { background-color: #1e3a5f !important; }
  .dark .custom-grid-style .htCore td.area { background-color: #1e3a5f !important; }
  .dark .handsontable .wtBorder { background-color: #6366f1 !important; }
  .dark .handsontable .changeType { background: #1e293b !important; }
  .dark .handsontable .htDropdownMenu, .dark .handsontable .htContextMenu { background: #1e293b !important; color: #cbd5e1 !important; border-color: #334155 !important; }
  .dark .handsontable .htDropdownMenu td, .dark .handsontable .htContextMenu td { background: #1e293b !important; color: #cbd5e1 !important; }
</style>

<script>
window.BancoDeDadosView = {
  template: '#page-bancodedados',
  props: ['dbRaw', 'isLoading'],
  data() {
    return {
      abaAtiva: 'Cockpit',
      listaAbas: [],
      selecaoAtual: [], 
      hot: null,
      syncBusy: false,
      statsSelecao: { soma: 0, conta: 0, media: 0 },
      stats: { totalOps: 0, qtdTotal: 0, plTotal: 0, nocionalTotal: 0 },
      modalExcluir: { visivel: false, mensagem: '', callback: null },
      modalAdd: { visivel: false, form: {} }
    };
  },
  
  watch: {
    dbRaw: {
      handler(novoDB) {
        if (novoDB && Object.keys(novoDB).length > 0) {
          this.listaAbas = Object.keys(novoDB).filter(k => k !== 'resumoGerencial');
          if (!this.hot) this.switchAba();
        }
      },
      immediate: true,
      deep: true
    },
    isLoading(newVal) {
      this.syncBusy = newVal;
    }
  },

  computed: {
    temSelecao() {
      return this.selecaoAtual && this.selecaoAtual.length > 0 && this.selecaoAtual[0] !== null;
    },
    qtdSelecionada() {
      if (!this.temSelecao) return 0;
      let total = 0;
      this.selecaoAtual.forEach(sel => {
        if (sel) {
          const [r1, c1, r2, c2] = sel;
          total += Math.abs(r2 - r1) + 1;
        }
      });
      return total;
    }
  },

  mounted() {
    if (this.dbRaw && Object.keys(this.dbRaw).length > 0) {
      this.switchAba();
    }
  },

  methods: {
    sincronizarBanco() {
      this.syncBusy = true;
      this.switchAba();
      setTimeout(() => { this.syncBusy = false; }, 500);
    },

    switchAba() {
      this.selecaoAtual = [];
      if (!this.dbRaw) return;

      const nomeReal = Object.keys(this.dbRaw).find(k => k.toUpperCase() === this.abaAtiva.toUpperCase());
      let matriz = this.dbRaw[nomeReal];

      if (!matriz || matriz.length < 2) {
         if (this.hot) { this.hot.destroy(); this.hot = null; }
         return;
      }

      let cabecalhoIndex = 0;
      if (this.abaAtiva.toUpperCase() === 'COCKPIT') {
        cabecalhoIndex = 9;
      }

      const headers = matriz[cabecalhoIndex];
      const dadosSaneados = [];

      for (let i = cabecalhoIndex + 1; i < matriz.length; i++) {
         const row = matriz[i];
         const celulaA = String(row[0] || '').trim();
         
         if (celulaA === "" || celulaA.includes("SUBTOTAL")) continue;

         let obj = {};
         obj.linhaRealExcel = i + 1; 

         headers.forEach((h, index) => {
           if (h && h.trim() !== "") {
              obj[h.trim()] = row[index] !== undefined ? row[index] : "";
           }
         });
         dadosSaneados.push(obj);
      }

      this.renderGrade(dadosSaneados);
    },

    renderGrade(dados) {
      this.$nextTick(() => {
        const container = document.getElementById('hot-engine');
        if (!container || !dados || dados.length === 0) return;
        if (this.hot) { this.hot.destroy(); this.hot = null; }

        try {
          const nomesColunas = Object.keys(dados[0]).filter(key => key.trim() !== "" && key !== "linhaRealExcel");
          const configColunas = this.definirConfiguracaoColunas(nomesColunas);

          this.hot = new Handsontable(container, {
            data: dados,
            colHeaders: nomesColunas,
            columns: configColunas,
            rowHeaders: true,
            width: '100%',
            height: '100%', 
            stretchH: 'all',
            renderAllRows: false, 
            viewportRowRenderingOffset: 10, 
            viewportColumnRenderingOffset: 5,
            minSpareRows: 0,
            fillHandle: false, 
            manualColumnResize: true,
            columnSorting: true,
            filters: true,
            dropdownMenu: true,
            outsideClickDeselects: false,
            licenseKey: 'non-commercial-and-evaluation',
            className: 'htCenter htMiddle custom-grid-style',
            afterSelectionEnd: (r, c, r2, c2) => { 
              if (this.hot) {
                this.selecaoAtual = this.hot.getSelected();
                this.calcularSomaSelecao();
              }
            },
            afterDeselect: () => { 
              this.selecaoAtual = []; 
              this.statsSelecao = { soma: 0, conta: 0, media: 0 }; 
            },
            afterChange: (changes, source) => { 
              if (source === 'edit' && changes) this.processarEdicao(changes); 
            }
          });
        } catch (err) { console.error("Erro Handsontable:", err); }
      });
    },

    atualizarSumario() {},

    processarEdicao(changes) {
      changes.forEach(([row, prop, oldValue, newValue]) => {
        if (oldValue === newValue || !this.hot) return;
        const rowData = this.hot.getSourceDataAtRow(row);
        const linhaReal = rowData.linhaRealExcel;
        const colIndex = this.hot.propToCol(prop) + 1; 
        if (typeof google !== 'undefined') {
          google.script.run.apiSetCellValue(this.abaAtiva, linhaReal, colIndex, newValue);
        }
      });
    },

    definirConfiguracaoColunas(nomesColunas) {
      const namespace = this.abaAtiva.toUpperCase();
      const dicionarioAba = (window.Tradutor && window.Tradutor.DICIONARIO) ? window.Tradutor.DICIONARIO[namespace] : null;

      const configs = nomesColunas.map(col => {
        const config = { data: col };
        const mapping = (dicionarioAba && dicionarioAba.map) ? dicionarioAba.map[col] : null;
        const type = mapping ? mapping.type : '';

        if (type === 'moeda' || col.includes('R$') || col.includes('P/L')) {
          config.type = 'numeric';
          config.numericFormat = { pattern: 'R$ 0,00', culture: 'pt-BR' };
        } 
        else if (type === 'percentual' || col.includes('%')) {
          config.type = 'numeric';
          config.numericFormat = { pattern: '0,00%', culture: 'pt-BR' };
        }
        else if (type === 'numero') {
          config.type = 'numeric';
        }

        if (col.toUpperCase().includes('P/L')) {
          config.renderer = (instance, td, row, colIndex, prop, value, cellProperties) => {
            Handsontable.renderers.NumericRenderer.apply(this, [instance, td, row, colIndex, prop, value, cellProperties]);
            const num = parseFloat(String(value).replace(/[R$\s.%]/g, '').replace(',', '.')) || 0;
            td.style.color = num >= 0 ? '#10b981' : '#f43f5e';
            td.style.fontWeight = '900';
            td.style.background = num >= 0 ? '#f0fdf4' : '#fff1f2';
          };
        }
        
        return config;
      });

      configs.push({
        data: 'acao_excluir', header: 'AÇÕES', readOnly: true, width: 50,
        renderer: (instance, td, row, col, prop, value, cellProperties) => {
          td.innerHTML = '<div style="cursor:pointer; color: #f43f5e; display: flex; justify-content: center;">🗑️</div>';
          td.onclick = (e) => { e.stopPropagation(); this.solicitarExclusao(row); };
        }
      });

      return configs;
    },

    solicitarExclusao(rowIndex) {
      const rowData = this.hot.getSourceDataAtRow(rowIndex);
      const linhaReal = rowData.linhaRealExcel;
      const primeiraColuna = this.hot.getColHeader(0);
      const valorA = rowData[primeiraColuna] || 'Registro';

      this.modalExcluir.mensagem = `Deseja excluir [${valorA}] (Linha ${linhaReal})?`;
      this.modalExcluir.visivel = true;
      this.modalExcluir.callback = () => this.executarExclusaoUnica(rowIndex, linhaReal, valorA);
      this.$nextTick(() => { if(window.lucide) lucide.createIcons(); });
    },

    excluirSelecionados() {
      const sel = this.hot.getSelected();
      if (!sel) return;
      const linhasGrelha = [];
      
      sel.forEach(([r1, c1, r2, c2]) => {
        for (let i = Math.min(r1, r2); i <= Math.max(r1, r2); i++) {
          if (!linhasGrelha.includes(i)) linhasGrelha.push(i);
        }
      });

      const linhasReais = linhasGrelha.map(idx => this.hot.getSourceDataAtRow(idx).linhaRealExcel);

      this.modalExcluir.mensagem = `Excluir ${linhasReais.length} registos selecionados?`;
      this.modalExcluir.visivel = true;
      this.modalExcluir.callback = () => this.executarExclusaoLote(linhasGrelha, linhasReais);
      this.$nextTick(() => { if(window.lucide) lucide.createIcons(); });
    },

    confirmarExclusao() { if (this.modalExcluir.callback) this.modalExcluir.callback(); this.fecharModalExcluir(); },
    fecharModalExcluir() { this.modalExcluir.visivel = false; this.modalExcluir.callback = null; },

    executarExclusaoUnica(rowIndex, linhaReal, valorA) {
      this.syncBusy = true;
      if (typeof google !== 'undefined') {
        google.script.run
          .withSuccessHandler((res) => { 
            this.syncBusy = false; 
            if(res.success) { 
               this.hot.alter('remove_row', rowIndex); 
               this.atualizarSumario(); 
               this.$emit('refresh');
            }
            else alert("Erro: " + res.error);
          })
          .withFailureHandler((err) => { this.syncBusy = false; alert("Erro no servidor."); })
          .apiExcluirLinhaSegura(this.abaAtiva, linhaReal, valorA);
      } else { this.syncBusy = false; }
    },

    executarExclusaoLote(linhasGrelha, linhasReais) {
      this.syncBusy = true;
      if (typeof google !== 'undefined') {
        google.script.run
          .withSuccessHandler((res) => { 
            this.syncBusy = false; 
            if(res.success) {
              linhasGrelha.sort((a,b) => b-a).forEach(idx => this.hot.alter('remove_row', idx));
              this.selecaoAtual = [];
              this.$nextTick(() => this.atualizarSumario());
              this.$emit('refresh');
            } else alert("Erro: " + res.error);
          })
          .withFailureHandler((err) => { this.syncBusy = false; alert("Erro no servidor."); })
          .apiExcluirLinhasEmLote(this.abaAtiva, linhasReais);
      } else { this.syncBusy = false; }
    },

    abrirModalAdd() {
      if (!this.hot) return;
      const colunas = this.hot.getColHeader();
      const novoForm = {};
      colunas.forEach(col => { if (col !== 'AÇÕES') novoForm[col] = ""; });
      this.modalAdd.form = novoForm;
      this.modalAdd.visivel = true;
      this.$nextTick(() => { if(window.lucide) lucide.createIcons(); });
    },

    fecharModalAdd() { this.modalAdd.visivel = false; this.modalAdd.form = {}; },

    confirmarAdicao() {
      const chaves = Object.keys(this.modalAdd.form);
      const valores = chaves.map(k => this.modalAdd.form[k]);
      const dados = [valores];
      
      this.syncBusy = true;
      this.fecharModalAdd();
      
      if (typeof google !== 'undefined') {
        google.script.run
          .withSuccessHandler((res) => {
            if (res.success) {
               this.$emit('refresh');
            }
            else { alert("Erro ao salvar: " + res.error); this.syncBusy = false; }
          })
          .withFailureHandler((err) => {
            alert("Falha de comunicação com o servidor.");
            console.error(err);
            this.syncBusy = false;
          })
          .apiAdicionarLinhas(this.abaAtiva, dados);
      } else {
        this.syncBusy = false;
      }
    },

    calcularSomaSelecao() {
      if (!this.hot) return;
      const selection = this.hot.getSelected();
      let soma = 0;
      let conta = 0;

      const namespace = this.abaAtiva.toUpperCase();
      const dicionarioAba = (window.Tradutor && window.Tradutor.DICIONARIO) ? window.Tradutor.DICIONARIO[namespace] : null;

      const isColunaNumerica = (nome) => {
         const n = String(nome).toUpperCase();
         if (dicionarioAba && dicionarioAba.map && dicionarioAba.map[nome]) {
            const type = dicionarioAba.map[nome].type;
            return ['moeda', 'numero', 'percentual'].includes(type);
         }
         return n.includes('QTD') || n.includes('R$') || n.includes('PREÇO') || 
                n.includes('SPOT') || n.includes('VALOR') || n.includes('CUSTO') || 
                n.includes('PRÊMIO') || n.includes('P/L') || n.includes('NOCIONAL') ||
                n.includes('TOTAL') || n.includes('SALDO') || n.includes('RESULTADO') ||
                n.includes('THETA') || n.includes('DELTA') || n.includes('VEGA') || n.includes('GAMMA');
      };

      const limparNum = (val) => {
        if (typeof val === 'number') return val;
        if (!val || val === "-" || val === "---") return 0;
        const limpo = String(val).replace(/[R$\s.%]/g, '').replace(',', '.');
        return parseFloat(limpo) || 0;
      };

      if (selection) {
        selection.forEach(([r1, c1, r2, c2]) => {
          const startRow = Math.min(r1, r2);
          const endRow = Math.max(r1, r2);
          const startCol = Math.min(c1, c2);
          const endCol = Math.max(c1, c2);

          for (let r = startRow; r <= endRow; r++) {
            for (let c = startCol; c <= endCol; c++) {
              const val = this.hot.getDataAtCell(r, c);
              const header = this.hot.getColHeader(c);
              if (isColunaNumerica(header)) {
                 const num = limparNum(val);
                 if (typeof num === 'number' && !isNaN(num) && val !== "" && val !== null) {
                   soma += num;
                   conta++;
                 }
              }
            }
          }
        });
      }
      this.statsSelecao = { soma, conta, media: conta > 0 ? soma / conta : 0 };
    },

    formatarNumero(val) {
      if (!val) return "0,00";
      return new Intl.NumberFormat('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(val);
    },

    formatarBRL(val) { return (typeof Tradutor !== 'undefined') ? Tradutor.formatarMoeda(val) : val; }
  }
};
</script>
