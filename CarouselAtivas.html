<script>
// ── Formatadores compartilhados ────────────────────────────────────────────
const carouselCurrencyFmt = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' });
const carouselNumberFmt   = new Intl.NumberFormat('pt-BR');

function carouselFormatVal(val, type) {
  if (!val && val !== 0) return '--';
  if (type === 'date') {
    return val instanceof Date ? val.toLocaleDateString('pt-BR') : String(val).split(' ')[0];
  }
  const num = Number(val);
  if (isNaN(num)) return String(val);
  if (type === 'currency') return carouselCurrencyFmt.format(num);
  if (type === 'number')   return carouselNumberFmt.format(num);
  if (type === 'pct')      return (num * 100).toFixed(2).replace('.', ',') + '%';
  if (type === 'delta')    return num.toFixed(4).replace('.', ',');
  return String(val);
}

// ── Helpers de estilo (dark-mode safe, retornam style strings) ─────────────
function getContextStyles(op) {
  const m   = String(op.moneynessCode || '').toUpperCase();
  const pct = Number(op.plTotalPct) || 0;

  if (m.includes('ITM') && pct < 0) return {
    cardStyle:   'border-color: var(--brand-rose-muted);   background: var(--brand-rose-light);',
    badgeStyle:  'color: white; background: var(--brand-rose); border-color: var(--brand-rose);',
    footerStyle: 'background: var(--brand-rose-light); border-color: var(--brand-rose-muted); color: var(--brand-rose);',
    icon: '🚨'
  };
  if (m.includes('ITM') || m.includes('ATM')) return {
    cardStyle:   'border-color: var(--brand-amber-muted); background: var(--brand-amber-light);',
    badgeStyle:  'color: var(--brand-amber); background: var(--brand-amber-light); border-color: var(--brand-amber-muted);',
    footerStyle: 'background: var(--brand-amber-light); border-color: var(--brand-amber-muted); color: var(--brand-amber);',
    icon: '⚠️'
  };
  return {
    cardStyle:   'border-color: var(--brand-emerald-muted); background: var(--brand-emerald-light);',
    badgeStyle:  'color: var(--brand-emerald); background: var(--brand-emerald-light); border-color: var(--brand-emerald-muted);',
    footerStyle: 'background: var(--brand-emerald-light); border-color: var(--brand-emerald-muted); color: var(--brand-emerald);',
    icon: '✅'
  };
}

function getTipoBadgeStyleFn(op) {
  const t = String(op.tipoOpcao    || '').toUpperCase();
  const d = String(op.direcaoTrade || '').toUpperCase();
  if (d.includes('VENDA')  && t.includes('PUT'))  return 'color: var(--brand-indigo); background: var(--brand-indigo-light); border-color: var(--brand-indigo-muted);';
  if (d.includes('VENDA')  && t.includes('CALL')) return 'color: var(--brand-amber);  background: var(--brand-amber-light);  border-color: var(--brand-amber-muted);';
  if (d.includes('COMPRA') && t.includes('PUT'))  return 'color: var(--brand-rose);    background: var(--brand-rose-light);    border-color: var(--brand-rose-muted);';
  if (d.includes('COMPRA') && t.includes('CALL')) return 'color: var(--brand-emerald);  background: var(--brand-emerald-light);  border-color: var(--brand-emerald-muted);';
  return 'color: var(--text-muted); background: var(--surface-overlay); border-color: var(--border-subtle);';
}

function buildMetricas(op) {
  const pl = Number(op.plTotalPct) || 0;
  return [
    { label: 'Prêmio Médio', value: carouselFormatVal(op.premioMedio, 'currency'),         style: 'color: var(--text-secondary);' },
    { label: 'Prêmio Atual', value: carouselFormatVal(op.premioAtual, 'currency'),         style: 'color: var(--text-secondary);' },
    { label: 'Break-Even',   value: carouselFormatVal(op.breakEven || 0, 'currency'),      style: 'color: var(--text-secondary);' },
    { label: 'Ganho Máx.',   value: carouselFormatVal(op.ganhoMaximo, 'currency'),         style: 'color: var(--brand-emerald);' },
    { label: 'P/L %',        value: carouselFormatVal(op.plTotalPct, 'pct'),               style: pl >= 0 ? 'color: var(--brand-emerald);' : 'color: var(--brand-rose);' },
    { label: 'Lucro Máx.',   value: carouselFormatVal(op.potencialLucroPct || 0, 'pct'),  style: 'color: var(--text-secondary);' },
    { label: 'Delta Δ',      value: carouselFormatVal(op.delta, 'delta'),                  style: 'color: var(--brand-indigo);' },
    { label: 'POE',          value: carouselFormatVal(op.poe, 'pct'),                      style: 'color: var(--text-secondary);' },
    { label: 'Nocional',     value: carouselFormatVal(op.nocional, 'currency'),            style: 'color: var(--text-primary);' },
  ];
}

// ── CardOperacao ───────────────────────────────────────────────────────────
const CardOperacao = {
  props: { op: { type: Object, required: true } },
  template: '#card-operacao-template',
  computed: {
    distanciaSpot() {
      const strike = Number(this.op.strike) || 0;
      const spot   = Number(this.op.spotPrice) || 0;
      return (strike === 0 || spot === 0) ? 0 : ((spot / strike) - 1) * 100;
    },
    tipoBadgeStyle() { return getTipoBadgeStyleFn(this.op); },
    styleContext()   { return getContextStyles(this.op); },
    metricas()       { return buildMetricas(this.op); }
  },
  methods: {
    formatVal: carouselFormatVal
  }
};

// ── CarouselAtivas ─────────────────────────────────────────────────────────
window.CarouselAtivas = {
  components: { 'card-operacao': CardOperacao },
  props: {
    isMobile:           { type: Boolean, default: false },
    isLoading:          { type: Boolean, default: false },
    statsPreCalculados: Object
  },
  template: '#carousel-ativas-template',

  computed: {
    activeTrades() {
      const lista = this.statsPreCalculados?.listaAtivas || [];
      return [...lista].sort((a, b) => (a.dteCorridos || 999) - (b.dteCorridos || 999));
    },
    operacoesPorVencimento() {
      if (!this.activeTrades.length) return {};
      return this.activeTrades.reduce((acc, op) => {
        const venc = carouselFormatVal(op.dataVencimento, 'date');
        if (!acc[venc]) acc[venc] = [];
        acc[venc].push(op);
        return acc;
      }, {});
    },
    opsOTM() { return this.activeTrades.filter(op => String(op.moneynessCode).toUpperCase().includes('OTM')).length; },
    opsITM() { return this.activeTrades.filter(op => String(op.moneynessCode).toUpperCase().includes('ITM')).length; }
  },

  methods: {
    formatVal:          carouselFormatVal,
    getStyleContext:    getContextStyles,
    getTipoBadgeStyle:  getTipoBadgeStyleFn,
    getMobileMetricas:  buildMetricas,
    getDistanciaSpot(op) {
      const strike = Number(op.strike) || 0;
      const spot   = Number(op.spotPrice) || 0;
      return (strike === 0 || spot === 0) ? 0 : ((spot / strike) - 1) * 100;
    }
  }
};
</script>

</div>
