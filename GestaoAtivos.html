<template id="gestao-ativos-template">
  <div style="max-width: 95%; margin: 1.5rem auto 6rem; display: flex; flex-direction: column; gap: 1.5rem;">

    <!-- HEADER -->
    <div class="premium-card"
         style="padding: 1.5rem 2rem; display: flex; flex-wrap: wrap; justify-content: space-between;
                align-items: center; gap: 1.5rem; position: relative; z-index: 10;">

      <div style="display: flex; align-items: center; gap: 1.25rem;">
        <div style="padding: 0.75rem; background: var(--brand-indigo-light); color: var(--brand-indigo);
                    border-radius: var(--radius-lg); border: 1px solid var(--brand-indigo-muted);">
          <i data-lucide="layers" style="width: 1.5rem; height: 1.5rem;"></i>
        </div>
        <div>
          <h2 class="t-title" style="color: var(--text-primary); text-transform: uppercase; letter-spacing: -0.02em;">Gestão de Ativos</h2>
          <p class="t-label-sm" style="color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.25em; margin-top: 0.2rem;">Livermore Intelligence Hub</p>
        </div>
      </div>

      <div style="display: flex; flex-wrap: wrap; align-items: center; gap: 1rem; justify-content: flex-end;">

        <!-- Input novo ticker -->
        <div style="display: flex; align-items: center; gap: 0.5rem;">
          <div style="position: relative;">
            <i data-lucide="plus-circle"
               style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%);
                      width: 1rem; height: 1rem; color: var(--text-muted); pointer-events: none;"></i>
            <input
              v-model="novoTicker"
              @keyup.enter="adicionarAtivo"
              placeholder="Novo Ticker (Ex: PETR4)"
              style="background: var(--surface-sunken); border: 1px solid var(--border-default);
                     border-radius: var(--radius-full); padding: 0.5rem 1rem 0.5rem 2.75rem;
                     font-size: 13px; font-weight: 700; color: var(--text-primary);
                     font-family: 'DM Sans', sans-serif; width: 14rem; outline: none;
                     transition: border-color 0.2s, box-shadow 0.2s;"
              onfocus="this.style.borderColor='var(--brand-indigo)'; this.style.boxShadow='0 0 0 3px var(--brand-indigo-muted)'"
              onblur="this.style.borderColor='var(--border-default)'; this.style.boxShadow='none'"
            >
          </div>
          <button @click="adicionarAtivo" :disabled="!novoTicker || isSaving"
                  class="btn-action btn-action-primary"
                  style="padding: 0.5rem 1.5rem; height: 2.5rem; white-space: nowrap; border-radius: var(--radius-full);">
            <span v-if="!isSaving">Monitorar</span>
            <div v-else style="width: 1rem; height: 1rem; border-radius: 50%;
                               border: 2px solid rgba(255,255,255,0.3); border-top-color: white;
                               animation: gestao-spin 0.7s linear infinite;"></div>
          </button>
        </div>

        <div style="width: 1px; height: 2rem; background: var(--border-subtle);"></div>

        <!-- Horizonte + Recalcular -->
        <div style="display: flex; align-items: center; gap: 0.5rem; background: var(--surface-overlay);
                    padding: 0.25rem; border-radius: var(--radius-full); border: 1px solid var(--border-subtle);">
          <div style="display: flex; align-items: center; background: var(--surface-base);
                      border-radius: var(--radius-full); padding: 0.125rem;
                      border: 1px solid var(--border-subtle); box-shadow: var(--shadow-sm);">
            <button @click="alterarDias(-1)"
                    style="width: 2rem; height: 2rem; display: flex; align-items: center; justify-content: center;
                           border-radius: var(--radius-full); border: none; background: transparent;
                           color: var(--text-muted); cursor: pointer;"
                    onmouseover="this.style.background='var(--surface-overlay)'; this.style.color='var(--brand-indigo)'"
                    onmouseout="this.style.background='transparent'; this.style.color='var(--text-muted)'">
              <i data-lucide="minus" style="width: 1rem; height: 1rem;"></i>
            </button>
            <div style="padding: 0 0.5rem; text-align: center; min-width: 3rem;">
              <span style="font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 700;
                           color: var(--brand-indigo);">{{ diasHorizonte }}d</span>
            </div>
            <button @click="alterarDias(1)"
                    style="width: 2rem; height: 2rem; display: flex; align-items: center; justify-content: center;
                           border-radius: var(--radius-full); border: none; background: transparent;
                           color: var(--text-muted); cursor: pointer;"
                    onmouseover="this.style.background='var(--surface-overlay)'; this.style.color='var(--brand-indigo)'"
                    onmouseout="this.style.background='transparent'; this.style.color='var(--text-muted)'">
              <i data-lucide="plus" style="width: 1rem; height: 1rem;"></i>
            </button>
          </div>

          <button @click="recalcularIA" :disabled="loadingIA"
                  style="display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
                         background: var(--surface-base); border: 1px solid var(--border-default);
                         color: var(--text-secondary); border-radius: var(--radius-full);
                         padding: 0 1.25rem; height: 2.25rem; font-size: 9px; font-weight: 700;
                         text-transform: uppercase; letter-spacing: 0.12em; cursor: pointer;
                         margin-right: 0.25rem; white-space: nowrap;"
                  onmouseover="this.style.borderColor='var(--brand-indigo)'; this.style.color='var(--brand-indigo)'; this.style.background='var(--brand-indigo-light)'"
                  onmouseout="this.style.borderColor='var(--border-default)'; this.style.color='var(--text-secondary)'; this.style.background='var(--surface-base)'">
            <span v-if="!loadingIA">Recalcular Range</span>
            <div v-else style="width: 1rem; height: 1rem; border-radius: 50%;
                               border: 2px solid var(--brand-indigo-muted); border-top-color: var(--brand-indigo);
                               animation: gestao-spin 0.7s linear infinite;"></div>
          </button>
        </div>

      </div>
    </div>

    <!-- SKELETON -->
    <div v-if="showSkeleton"
         style="display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1.5rem;">
      <div v-for="n in 8" :key="'skel-'+n" class="premium-card"
           style="padding: 1.25rem; height: 250px; animation: gestao-pulse 1.5s ease-in-out infinite;
                  display: flex; flex-direction: column; justify-content: space-between;">
        <div style="display: flex; justify-content: space-between; padding-right: 2.5rem; margin-bottom: 1rem;">
          <div style="display: flex; flex-direction: column; gap: 0.75rem; width: 66%;">
            <div style="height: 1.5rem; border-radius: var(--radius-sm); background: var(--surface-overlay); width: 5rem;"></div>
            <div style="height: 0.5rem; border-radius: var(--radius-sm); background: var(--surface-overlay); width: 8rem;"></div>
          </div>
          <div style="height: 2rem; border-radius: var(--radius-sm); background: var(--surface-overlay); width: 3rem;"></div>
        </div>
        <div style="height: 4rem; border-radius: var(--radius-lg); background: var(--surface-overlay); margin-bottom: 1rem;"></div>
        <div style="display: flex; flex-direction: column; gap: 0.5rem;">
          <div style="height: 0.5rem; border-radius: var(--radius-sm); background: var(--surface-overlay);"></div>
          <div style="height: 0.375rem; border-radius: var(--radius-full); background: var(--surface-sunken);"></div>
        </div>
      </div>
    </div>

    <!-- EMPTY STATE -->
    <div v-else-if="ativosProcessados.length === 0"
         style="padding: 5rem 1rem; text-align: center; background: var(--surface-base);
                border-radius: var(--radius-xl); border: 1px solid var(--border-default); box-shadow: var(--shadow-sm);">
      <div style="width: 4rem; height: 4rem; background: var(--surface-overlay); border-radius: 50%;
                  display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem;
                  border: 1px solid var(--border-subtle);">
        <i data-lucide="search" style="width: 2rem; height: 2rem; color: var(--text-muted);"></i>
      </div>
      <p class="t-label" style="color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.2em;">Nenhum ativo sendo monitorado</p>
    </div>

    <!-- GRID DE CARDS -->
    <div v-else
         style="display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1.5rem;">

      <div v-for="ativo in ativosProcessados" :key="ativo.tickerAtivo"
           @click="selecionarAtivo(ativo)"
           class="premium-card gestao-ativo-card"
           style="padding: 1.25rem; cursor: pointer; position: relative; overflow: hidden;
                  display: flex; flex-direction: column; justify-content: space-between;">

        <button @click.stop="confirmarExclusao(ativo)"
                class="gestao-delete-btn"
                style="position: absolute; top: 1rem; right: 1rem; padding: 0.5rem;
                       background: var(--brand-rose-light); color: var(--brand-rose);
                       border-radius: var(--radius-md); border: none; cursor: pointer;
                       opacity: 0; transition: opacity 0.2s; z-index: 20;"
                onmouseover="this.style.background='var(--brand-rose)'; this.style.color='#fff'"
                onmouseout="this.style.background='var(--brand-rose-light)'; this.style.color='var(--brand-rose)'">
          <i data-lucide="trash-2" style="width: 1rem; height: 1rem;"></i>
        </button>

        <!-- Ticker / empresa / setor -->
        <div style="padding-right: 2.5rem; margin-bottom: 1rem;">
          <span style="font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 800;
                       color: var(--text-primary); letter-spacing: -0.03em; display: block; line-height: 1;">
            {{ ativo.tickerAtivo }}
          </span>
          <span class="t-label-sm" style="color: var(--text-muted); text-transform: uppercase;
                                          letter-spacing: 0.12em; display: block; margin-top: 0.4rem;
                                          white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
            {{ ativo.nomeEmpresa || '---' }}
          </span>
          <span style="font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em;
                       padding: 0.15rem 0.5rem; border-radius: var(--radius-sm); margin-top: 0.3rem;
                       display: inline-block; background: var(--surface-overlay);
                       color: var(--text-muted); border: 1px solid var(--border-subtle);">
            {{ ativo.setor || 'N/A' }}
          </span>
        </div>

        <!-- Mini tabela -->
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.25rem; margin-bottom: 1.25rem;
                    padding: 0.625rem; background: var(--surface-overlay); border-radius: var(--radius-lg);
                    border: 1px solid var(--border-subtle);">
          <div style="text-align: center;">
            <span style="display: block; font-size: 8px; color: var(--text-muted); font-weight: 700;
                         text-transform: uppercase; margin-bottom: 0.2rem;">Spot</span>
            <span class="font-mono-data" style="font-size: 11px; font-weight: 700; color: var(--text-primary);">
              {{ Tradutor.formatarMoeda(ativo.spotPrice) }}
            </span>
          </div>
          <div style="text-align: center; border-left: 1px solid var(--border-subtle);
                      border-right: 1px solid var(--border-subtle); padding: 0 0.25rem;">
            <span style="display: block; font-size: 8px; color: var(--text-muted); font-weight: 700;
                         text-transform: uppercase; margin-bottom: 0.2rem;">Variação</span>
            <span class="font-mono-data" style="font-size: 11px; font-weight: 700;"
                  :style="ativo.variacao >= 0 ? 'color: var(--brand-emerald)' : 'color: var(--brand-rose)'">
              {{ ativo.variacao > 0 ? '+' : '' }}{{ (ativo.variacao * 100).toFixed(2) }}%
            </span>
          </div>
          <div style="text-align: center;">
            <span style="display: block; font-size: 8px; color: var(--text-muted); font-weight: 700;
                         text-transform: uppercase; margin-bottom: 0.2rem;">IV Rank</span>
            <span class="font-mono-data" style="font-size: 11px; font-weight: 700; color: var(--brand-indigo);">
              {{ (ativo.ivRank * 100).toFixed(1) }}%
            </span>
          </div>
        </div>

        <!-- Score preditivo -->
        <div v-if="ativo.probAlta !== undefined" style="margin-top: auto;">
          <div style="display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 0.3rem;">
            <div style="display: flex; gap: 0.75rem; font-size: 9px; font-weight: 700;
                        text-transform: uppercase; letter-spacing: 0.1em;">
              <span style="color: var(--brand-indigo);">Alta: {{ (ativo.probAlta * 100).toFixed(0) }}%</span>
              <span style="color: var(--text-muted);">Baixa: {{ (ativo.probBaixa * 100).toFixed(0) }}%</span>
            </div>
            <span class="font-mono-data" style="font-size: 1.25rem; font-weight: 700; line-height: 1;"
                  :style="getScoreStyle(ativo.score)">
              {{ ativo.score ? ativo.score.toFixed(2) : '0.00' }}
            </span>
          </div>
          <div style="height: 0.375rem; width: 100%; background: var(--surface-sunken);
                      border-radius: var(--radius-full); overflow: hidden; display: flex;">
            <div style="height: 100%; background: var(--brand-indigo); transition: width 0.5s ease;"
                 :style="{ width: (ativo.probAlta * 100) + '%' }"></div>
            <div style="height: 100%; background: var(--surface-overlay); transition: width 0.5s ease;"
                 :style="{ width: (ativo.probBaixa * 100) + '%' }"></div>
          </div>
        </div>

        <!-- Aguardando recálculo -->
        <div v-else style="margin-top: auto; padding: 0.5rem; background: var(--brand-amber-light);
                            border-radius: var(--radius-lg); border: 1px solid var(--brand-amber-muted);
                            text-align: center;">
          <span style="font-size: 9px; font-weight: 700; color: var(--brand-amber);
                       text-transform: uppercase; letter-spacing: 0.12em;">Aguardando Recálculo</span>
        </div>

      </div>
    </div>

    <!-- MODAL -->
    <transition name="gestao-fade">
      <div v-if="modal.isOpen"
           style="position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center;
                  justify-content: center; padding: 1rem; background: rgba(0,0,0,0.45); backdrop-filter: blur(4px);">
        <div style="background: var(--surface-base); border-radius: var(--radius-xl); box-shadow: var(--shadow-xl);
                    border: 1px solid var(--border-default); width: 100%; max-width: 22rem;
                    overflow: hidden; text-align: center;">
          <div style="padding: 2rem;">
            <h3 class="t-subtitle" style="color: var(--text-primary); margin-bottom: 0.5rem;">Remover Ativo?</h3>
            <p class="t-body" style="color: var(--text-muted);">
              Parar de monitorar <strong style="color: var(--brand-indigo);">{{ modal.ticker }}</strong>?
            </p>
          </div>
          <div style="display: flex; gap: 0.75rem; padding: 1rem; border-top: 1px solid var(--border-subtle);
                      background: var(--surface-overlay);">
            <button @click="fecharModal" class="btn-action btn-action-ghost" style="flex: 1;">Cancelar</button>
            <button @click="executarExclusao"
                    style="flex: 1; display: inline-flex; align-items: center; justify-content: center;
                           background: var(--brand-rose); color: #fff; border: none;
                           border-radius: var(--radius-md); padding: 0.625rem 1rem;
                           font-size: 13px; font-weight: 700; cursor: pointer;"
                    onmouseover="this.style.opacity='0.85'"
                    onmouseout="this.style.opacity='1'">
              Sim, Remover
            </button>
          </div>
        </div>
      </div>
    </transition>

    <gestao-ativos-sidebar
      :is-open="sidebar.isOpen"
      :ativo="sidebar.ativo"
      :dias="diasHorizonte"
      @close="sidebar.isOpen = false">
    </gestao-ativos-sidebar>

  </div>
</template>

<style>
  .gestao-ativo-card:hover { border-color: var(--brand-indigo) !important; }
  .gestao-ativo-card:hover .gestao-delete-btn { opacity: 1 !important; }

  @keyframes gestao-spin  { to { transform: rotate(360deg); } }
  @keyframes gestao-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

  .gestao-fade-enter-active, .gestao-fade-leave-active { transition: opacity 0.25s ease; }
  .gestao-fade-enter-from,  .gestao-fade-leave-to     { opacity: 0; }
</style>

<script>
window.GestaoAtivos = {
  template: '#gestao-ativos-template',
  props: {
    ativos:    { type: Array,  default: () => [] },
    db:        { type: Object, default: () => ({ configGlobal: {}, analisePreditiva: [], dadosTendencia: [] }) },
    isLoading: Boolean
  },
  data() {
    return {
      Tradutor: window.Tradutor,
      novoTicker: '',
      isSaving:   false,
      loadingIA:  false,
      isSyncingBackground: true,
      modal:   { isOpen: false, ticker: '', linhaReal: null },
      sidebar: { isOpen: false, ativo: {} }
    };
  },

  computed: {
    diasHorizonte() {
      return this.db.configGlobal?.horizontePreditivo || 45;
    },
    showSkeleton() {
      return this.isLoading || (this.isSyncingBackground && this.ativos.length === 0);
    },
    ativosProcessados() {
      const predicoes   = this.db?.analisePreditiva       || [];
      const tendencia   = this.db?.dadosTendencia         || [];
      const fundamentos = this.db?.analiseFundamentalista || [];

      return this.ativos.map((ativo, index) => {
        const ticker = ativo.tickerAtivo;
        const pred = predicoes.find(p  => p.tickerAtivo  === ticker) || {};
        const tend = tendencia.find(t  => t.tickerAtivo  === ticker) || {};
        const fund = fundamentos.find(f => f.tickerAtivo === ticker) || {};
        return { ...tend, ...pred, ...fund, ...ativo, linhaReal: index + 2 };
      });
    }
  },

  watch: {
    ativos: {
      immediate: true,
      handler(val) { if (val?.length > 0) this.isSyncingBackground = false; }
    }
  },

  methods: {
    selecionarAtivo(ativo) { this.sidebar.ativo = ativo; this.sidebar.isOpen = true; },

    getScoreStyle(score) {
      if (!score)     return 'color: var(--text-muted);';
      if (score >= 7) return 'color: var(--brand-emerald);';
      if (score >= 5) return 'color: var(--brand-amber);';
      return 'color: var(--brand-rose);';
    },

    alterarDias(delta) {
      const novo = this.diasHorizonte + delta;
      if (novo >= 1 && novo <= 45) {
        google.script.run
          .withSuccessHandler(() => this.$emit('refresh'))
          .apiSetCellValue('Config_Global', 21, 2, novo);
      }
    },

    adicionarAtivo() {
      if (!this.novoTicker || this.isSaving) return;
      this.isSaving = true;
      google.script.run
        .withSuccessHandler((res) => {
          this.novoTicker = ''; this.isSaving = false;
          if (res.success) this.$emit('refresh');
          else alert('Erro ao salvar: ' + res.error);
        })
        .apiAdicionarLinhas('Dados_Ativos', [[this.novoTicker.toUpperCase().trim(), new Date().toLocaleString('pt-BR')]]);
    },

    confirmarExclusao(ativo) { this.modal = { isOpen: true, ticker: ativo.tickerAtivo, linhaReal: ativo.linhaReal }; },
    fecharModal()             { this.modal = { isOpen: false, ticker: '', linhaReal: null }; },
    executarExclusao() {
      const { linhaReal, ticker } = this.modal;
      this.fecharModal(); this.isSaving = true;
      google.script.run
        .withSuccessHandler(() => { this.isSaving = false; this.$emit('refresh'); })
        .apiExcluirLinhaSegura('Dados_Ativos', linhaReal, ticker);
    },

    recalcularIA() {
      this.loadingIA = true;
      google.script.run
        .withSuccessHandler((res) => {
          this.loadingIA = false;
          if (res.success) this.$emit('refresh');
          else alert('Erro na simulação: ' + res.error);
        })
        .apiSimularHorizontePreditivo(this.diasHorizonte);
    }
  },

  mounted()  { setTimeout(() => { this.isSyncingBackground = false; }, 8000); if (typeof lucide !== 'undefined') lucide.createIcons(); },
  updated()  { if (typeof lucide !== 'undefined') lucide.createIcons(); }
};
</script>
