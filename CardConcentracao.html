<template id="card-concentracao-template">

  <!-- MOBILE -->
  <div v-if="isMobile"
    class="w-full rounded-[var(--radius-xl)] pt-6 px-6 pb-8 flex flex-col h-full relative overflow-hidden"
    style="background: var(--surface-base); border: 1px solid var(--border-subtle); box-shadow: var(--shadow-sm);">

    <!-- Barra inferior (cores únicas por ticker via hsl) -->
    <div class="absolute bottom-0 left-0 w-full h-6 flex z-20"
         style="font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700; color: white;">
      <div v-for="(item, idx) in barItems" :key="'bar-'+idx"
           :style="{ width: (item.pct || 0) + '%', backgroundColor: item.uniqueColor }"
           class="h-full transition-all duration-1000 flex items-center justify-center overflow-hidden"
           style="border-right: 1px solid rgba(255,255,255,0.15);">
        <span v-if="item.pct > 4">{{ item.pct }}%</span>
      </div>
      <div v-if="restoPercentual > 0" :style="{ width: restoPercentual + '%' }"
           class="h-full flex-1 transition-all"
           style="background: var(--surface-overlay);"></div>
    </div>

    <div class="flex flex-col h-full relative z-10">
      <div class="flex flex-col mb-4">
        <h3 style="font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; color: var(--text-primary); letter-spacing: -0.02em; text-transform: uppercase;">Concentração</h3>
        <span style="font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.16em; margin-top: 6px;">Por Ativo</span>
      </div>

      <div v-if="isLoading" class="flex-1 space-y-4 animate-pulse mt-2">
        <div v-for="i in 3" :key="i" class="flex justify-between items-center pb-3" style="border-bottom: 1px solid var(--surface-sunken);">
          <div class="h-6 rounded w-1/4" style="background: var(--surface-overlay);"></div>
          <div class="h-8 rounded w-1/4" style="background: var(--surface-overlay);"></div>
        </div>
      </div>

      <template v-else>
        <div class="flex-1 overflow-y-auto pr-1 space-y-1 mt-0" style="-ms-overflow-style: none; scrollbar-width: none;">
          <div v-for="(item, idx) in concentracao" :key="idx"
               class="flex items-center justify-between w-full pb-2 pt-1 last:border-0"
               style="border-bottom: 1px solid var(--border-subtle);">
            <div class="w-[35%] flex flex-col">
              <span style="font-size: 20px; font-weight: 700; text-transform: uppercase; letter-spacing: -0.02em; line-height: 1;"
                    :style="{ color: item.uniqueColor }">{{ item.ticker }}</span>
              <span style="font-size: 9px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 2px;">Ticker</span>
            </div>
            <div class="flex flex-col items-center flex-1">
              <span style="font-size: 8px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 2px;">Nocional</span>
              <span style="font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 700; color: var(--text-primary);">{{ formatMoeda(item.count) }}</span>
            </div>
            <div class="w-[25%] flex flex-col items-end">
              <span style="font-size: 8px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 2px;">Peso</span>
              <span style="font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 700;"
                    :style="{ color: item.uniqueColor }">{{ item.pct || 0 }}%</span>
            </div>
          </div>
        </div>
      </template>
    </div>
  </div>

  <!-- DESKTOP -->
  <div v-else
    class="w-full rounded-[var(--radius-xl)] p-5 h-full flex flex-col transition-all duration-[var(--duration-std)]"
    style="background: var(--surface-base); border: 1px solid var(--border-subtle); box-shadow: var(--shadow-sm);"
    onmouseover="this.style.boxShadow='var(--shadow-md)'"
    onmouseout="this.style.boxShadow='var(--shadow-sm)'">

    <div class="flex justify-between items-center mb-6">
      <div>
        <h3 class="t-subtitle" style="color: var(--text-primary);">Concentração</h3>
        <p class="t-label mt-1" style="color: var(--text-muted);">Exposição por Ativo</p>
      </div>
    </div>

    <div v-if="isLoading" class="flex-1 space-y-3 animate-pulse">
      <div v-for="i in 4" :key="i" class="h-14 rounded-[var(--radius-lg)]" style="background: var(--surface-sunken); border: 1px solid var(--border-subtle);"></div>
    </div>

    <div v-else class="flex-1 overflow-y-auto custom-scrollbar pr-1 space-y-2" style="max-height: 300px;">
      <div v-for="(item, idx) in concentracao" :key="idx"
           class="p-3 rounded-[var(--radius-lg)] flex flex-col transition-all duration-[var(--duration-fast)]"
           style="border: 1px solid; background: var(--surface-overlay);"
           :style="{ borderColor: item.uniqueColor + '33' }"
           onmouseover="this.style.boxShadow='var(--shadow-sm)'"
           onmouseout="this.style.boxShadow='none'">

        <div class="flex justify-between items-end mb-2">
          <div class="flex items-center gap-2">
            <span style="font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;"
                  :style="{ color: item.uniqueColor }">{{ item.ticker }}</span>
            <span style="font-size: 8px; font-weight: 600; color: var(--text-muted);">{{ formatMoeda(item.count) }} Nocional</span>
          </div>
          <span style="font-size: 13px; font-weight: 700; font-family: 'JetBrains Mono', monospace;"
                :style="{ color: item.uniqueColor }">{{ item.pct || 0 }}%</span>
        </div>

        <div class="w-full h-2 rounded-[var(--radius-full)] overflow-hidden" style="background: var(--surface-base); border: 1px solid rgba(0,0,0,0.05);">
          <div :style="{ width: (item.pct || 0) + '%', backgroundColor: item.uniqueColor }"
               class="h-full transition-all duration-1000"></div>
        </div>

      </div>
    </div>
  </div>
</template>

<script>
const concentracaoCurrencyFmt = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL', maximumFractionDigits: 0 });

window.CardConcentracao = {
  props: { isMobile: Boolean, isLoading: Boolean, statsPreCalculados: Object },
  template: '#card-concentracao-template',
  computed: {
    concentracao() {
      if (!this.statsPreCalculados?.concentracaoRisco?.length) return [];
      return this.statsPreCalculados.concentracaoRisco.map(item => {
        const p = item.pesoPct || 0;
        // Cor única por ticker — gerada por hash, dark-mode friendly (hsl 70% sat, 45% lum)
        let hash = 0;
        for (let i = 0; i < item.ativo.length; i++) hash = item.ativo.charCodeAt(i) + ((hash << 5) - hash);
        const uniqueColor = `hsl(${Math.abs(hash) % 360}, 65%, 45%)`;
        return { ticker: item.ativo, count: item.nocional || 0, pct: p, uniqueColor };
      });
    },
    barItems()       { return this.concentracao.filter(i => i.pct >= 5); },
    restoPercentual(){ return Math.max(0, 100 - this.barItems.reduce((a, i) => a + i.pct, 0)); }
  },
  methods: {
    formatMoeda(valor) {
      if (!valor && valor !== 0) return 'R$ 0';
      return concentracaoCurrencyFmt.format(valor);
    }
  }
};
</script>
