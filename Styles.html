<style>
  /* =========================================================
     🔤 FONTES
     Plus Jakarta Sans: display + corpo — moderna, humanista, premium
     Plus Jakarta Sans: corpo — legível, refinada, não genérica
     JetBrains Mono: dados financeiros — precisão e clareza
     ========================================================= */
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap');


  /* =========================================================
     🎨 CAMADA 1 — DESIGN TOKENS UNIFICADOS
     Fonte única de verdade para todo o sistema visual.
     Sem conflito entre --m3-primary e --brand-indigo.
     ========================================================= */
  :root {

    /* --- CORES DE MARCA (Sistema único, sem duplicatas) --- */
    --brand-indigo:        #4F46E5;   /* Primária — ação, CTA, destaque */
    --brand-indigo-hover:  #4338CA;   /* Estado hover da primária */
    --brand-indigo-light:  #EEF2FF;   /* Container leve — fundos, badges */
    --brand-indigo-muted:  rgba(79, 70, 229, 0.12); /* State layer */

    --brand-emerald:       #059669;   /* Sucesso, lucro, positivo */
    --brand-emerald-light: #ECFDF5;
    --brand-emerald-muted: rgba(5, 150, 105, 0.10);

    --brand-rose:          #E11D48;   /* Erro, risco, negativo */
    --brand-rose-light:    #FFF1F2;
    --brand-rose-muted:    rgba(225, 29, 72, 0.10);

    --brand-amber:         #D97706;   /* Atenção, ATM, aviso */
    --brand-amber-light:   #FFFBEB;
    --brand-amber-muted:   rgba(217, 119, 6, 0.10);

    /* --- SUPERFÍCIES — LIGHT MODE (padrão) --- */
    --surface-bg:          #F4F6FF;   /* Fundo da página */
    --surface-base:        #FFFFFF;   /* Cards, modais */
    --surface-raised:      #FFFFFF;   /* Cards com elevação */
    --surface-overlay:     #F8FAFC;   /* Fundos internos de cards */
    --surface-sunken:      #F1F4F9;   /* Inputs, áreas internas */

    /* --- BORDAS --- */
    --border-subtle:       #E8EAF4;   /* Divisores leves */
    --border-default:      #D8DAEA;   /* Bordas de cards */
    --border-strong:       #B8BDD4;   /* Bordas de inputs focus-off */

    /* --- TIPOGRAFIA --- */
    --text-primary:        #0F1117;   /* Títulos, valores principais */
    --text-secondary:      #374151;   /* Corpo, valores secundários */
    --text-tertiary:       #6B7280;   /* Labels, descrições */
    --text-muted:          #9CA3AF;   /* Placeholders, desabilitados */
    --text-inverted:       #FFFFFF;   /* Texto sobre fundos escuros */

    /* --- SOMBRAS --- */
    --shadow-sm:  0 1px 3px rgba(79, 70, 229, 0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md:  0 4px 12px rgba(79, 70, 229, 0.08), 0 2px 6px rgba(0,0,0,0.05);
    --shadow-lg:  0 8px 24px rgba(79, 70, 229, 0.10), 0 4px 12px rgba(0,0,0,0.06);
    --shadow-xl:  0 16px 40px rgba(79, 70, 229, 0.12), 0 8px 20px rgba(0,0,0,0.07);

    /* --- SHAPE SCALE (MD3 completo) --- */
    --radius-xs:   6px;    /* Badges, chips */
    --radius-sm:   10px;   /* Inputs, botões compactos */
    --radius-md:   14px;   /* Botões principais */
    --radius-lg:   20px;   /* Cards internos, dropdowns */
    --radius-xl:   28px;   /* Cards premium, modais */
    --radius-full: 9999px; /* Pills, avatares */

    /* --- MOTION --- */
    --ease-standard:  cubic-bezier(0.2, 0, 0, 1);    /* MD3 Standard */
    --ease-decelerate: cubic-bezier(0, 0, 0.2, 1);   /* Entrar na tela */
    --ease-accelerate: cubic-bezier(0.3, 0, 1, 1);   /* Sair da tela */
    --duration-fast:   150ms;
    --duration-std:    250ms;
    --duration-slow:   350ms;

    /* --- ÁREA SEGURA MOBILE --- */
    --safe-bottom: env(safe-area-inset-bottom, 20px);
    --safe-top:    env(safe-area-inset-top, 0px);

    /* Legado: mantidos para compatibilidade com componentes antigos */
    --app-bg:                var(--surface-bg);
    --app-surface:           var(--surface-base);
    --app-border:            var(--border-default);
    --m3-primary:            var(--brand-indigo);
    --m3-on-surface:         var(--text-primary);
    --m3-on-surface-variant: var(--text-tertiary);
    --shadow-color:          79, 70, 229;

    color-scheme: light;
  }


  /* =========================================================
     🌑 CAMADA 2 — DARK MODE
     Ativado via [data-theme="dark"] no <html>.
     Nenhum componente precisa de lógica extra.
     ========================================================= */
  [data-theme="dark"] {

    /* Superfícies escuras com profundidade sutil */
    --surface-bg:      #0D0F14;
    --surface-base:    #161A23;
    --surface-raised:  #1C2130;
    --surface-overlay: #1E2438;
    --surface-sunken:  #111520;

    /* Bordas */
    --border-subtle:   #1F2535;
    --border-default:  #263045;
    --border-strong:   #354060;

    /* Tipografia invertida */
    --text-primary:    #F0F2FF;
    --text-secondary:  #C8CCDE;
    --text-tertiary:   #8890AA;
    --text-muted:      #555F78;
    --text-inverted:   #0F1117;

    /* Cores de marca: ligeiramente mais brilhantes no escuro */
    --brand-indigo:        #6366F1;
    --brand-indigo-hover:  #818CF8;
    --brand-indigo-light:  #1E2240;
    --brand-indigo-muted:  rgba(99, 102, 241, 0.15);

    --brand-emerald:       #10B981;
    --brand-emerald-light: #0D2A20;
    --brand-emerald-muted: rgba(16, 185, 129, 0.12);

    --brand-rose:          #FB7185;
    --brand-rose-light:    #2A0E18;
    --brand-rose-muted:    rgba(251, 113, 133, 0.12);

    --brand-amber:         #FBBF24;
    --brand-amber-light:   #251C08;
    --brand-amber-muted:   rgba(251, 191, 36, 0.12);

    /* Sombras escuras */
    --shadow-sm:  0 1px 3px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2);
    --shadow-md:  0 4px 12px rgba(0,0,0,0.35), 0 2px 6px rgba(0,0,0,0.25);
    --shadow-lg:  0 8px 24px rgba(0,0,0,0.40), 0 4px 12px rgba(0,0,0,0.30);
    --shadow-xl:  0 16px 40px rgba(0,0,0,0.50), 0 8px 20px rgba(0,0,0,0.35);

    --shadow-color: 0, 0, 0;

    color-scheme: dark;

    /* Legado */
    --app-bg:                var(--surface-bg);
    --app-surface:           var(--surface-base);
    --app-border:            var(--border-default);
    --m3-on-surface:         var(--text-primary);
    --m3-on-surface-variant: var(--text-tertiary);
  }


  /* =========================================================
     🔤 CAMADA 3 — SISTEMA TIPOGRÁFICO
     Hierarquia intencional: Plus Jakarta Sans para títulos de impacto,
     Plus Jakarta Sans para corpo e interface, JetBrains Mono para dados.
     ========================================================= */

  /* Reset base */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { font-size: 16px; }

  body {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    font-size: 0.875rem;       /* 14px — base para interface densa */
    font-weight: 400;
    line-height: 1.5;
    color: var(--text-primary);
    background-color: var(--surface-bg);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }

  /* --- Escala tipográfica de TÍTULOS (Plus Jakarta Sans — impacto) --- */
  .t-display {                 /* Títulos principais de página */
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.75rem;        /* 28px */
    font-weight: 800;
    line-height: 1.15;
    letter-spacing: -0.03em;
    color: var(--text-primary);
  }
  .t-title {                   /* Títulos de card/seção */
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.125rem;       /* 18px */
    font-weight: 700;
    line-height: 1.25;
    letter-spacing: -0.02em;
    color: var(--text-primary);
  }
  .t-subtitle {                /* Subtítulos de card */
    font-size: 0.8125rem;      /* 13px */
    font-weight: 600;
    line-height: 1.3;
    letter-spacing: 0.01em;
    color: var(--text-secondary);
  }

  /* --- Escala tipográfica de CORPO (Plus Jakarta Sans) --- */
  .t-body {                    /* Texto descritivo */
    font-size: 0.875rem;       /* 14px */
    font-weight: 400;
    line-height: 1.6;
    color: var(--text-secondary);
  }
  .t-body-strong {             /* Texto em destaque */
    font-size: 0.875rem;
    font-weight: 600;
    color: var(--text-primary);
  }

  /* --- Escala tipográfica de LABELS --- */
  .t-label {                   /* Labels de campo, cabeçalhos de tabela */
    font-size: 0.6875rem;      /* 11px */
    font-weight: 700;
    line-height: 1;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-tertiary);
  }
  .t-label-sm {                /* Labels menores, badges */
    font-size: 0.625rem;       /* 10px */
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  /* --- Escala tipográfica de DADOS (JetBrains Mono) --- */
  .t-value-xl {                /* Valor principal de card KPI */
    font-family: 'JetBrains Mono', monospace;
    font-size: 2rem;           /* 32px */
    font-weight: 700;
    line-height: 1;
    letter-spacing: -0.03em;
    color: var(--text-primary);
  }
  .t-value-lg {                /* Valor secundário de destaque */
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.375rem;       /* 22px */
    font-weight: 700;
    line-height: 1;
    letter-spacing: -0.02em;
    color: var(--text-primary);
  }
  .t-value {                   /* Valores em tabelas e listas */
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8125rem;      /* 13px */
    font-weight: 500;
    letter-spacing: -0.01em;
    color: var(--text-primary);
  }
  .t-value-sm {                /* Valores compactos, gregas */
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6875rem;      /* 11px */
    font-weight: 500;
    color: var(--text-secondary);
  }

  /* Alias de compatibilidade com código existente */
  .font-mono-data {
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: -0.02em;
  }


  /* =========================================================
     🧱 COMPONENTES BASE
     ========================================================= */

  /* --- Cards --- */
  .premium-card {
    background-color: var(--surface-base);
    border-radius: var(--radius-xl);
    border: 1px solid var(--border-default);
    box-shadow: var(--shadow-sm);
    transition: box-shadow var(--duration-std) var(--ease-standard),
                border-color var(--duration-std) var(--ease-standard);
  }
  .premium-card:hover {
    box-shadow: var(--shadow-md);
    border-color: var(--border-strong);
  }

  .card-inner {                /* Cards internos dentro de premium-card */
    background-color: var(--surface-overlay);
    border-radius: var(--radius-lg);
    border: 1px solid var(--border-subtle);
  }

  /* --- Botões --- */
  .btn-action {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    padding: 0.5rem 1.25rem;
    border-radius: var(--radius-full);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.6875rem;      /* 11px */
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    transition: all var(--duration-fast) var(--ease-standard);
    cursor: pointer;
    border: none;
    white-space: nowrap;
    min-height: 36px;          /* Área de toque mínima */
  }

  .btn-action-primary {
    background-color: var(--brand-indigo);
    color: var(--text-inverted);
  }
  .btn-action-primary:hover {
    background-color: var(--brand-indigo-hover);
    transform: translateY(-1px);
    box-shadow: 0 4px 14px var(--brand-indigo-muted);
  }
  .btn-action-primary:active { transform: translateY(0); box-shadow: none; }

  .btn-action-ghost {
    background-color: transparent;
    color: var(--text-tertiary);
    border: 1px solid var(--border-default);
    background-color: var(--surface-base);
  }
  .btn-action-ghost:hover {
    color: var(--brand-indigo);
    border-color: var(--brand-indigo);
    background-color: var(--brand-indigo-light);
  }

  /* Área de toque mobile mínima (44px) */
  @media (max-width: 850px) {
    .btn-action { min-height: 44px; padding: 0.625rem 1.25rem; }
  }

  /* --- Inputs --- */
  .input-base {
    width: 100%;
    background-color: var(--surface-sunken);
    border: 1px solid var(--border-default);
    border-radius: var(--radius-sm);
    padding: 0.625rem 1rem;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.875rem;
    font-weight: 500;
    color: var(--text-primary);
    transition: border-color var(--duration-fast) var(--ease-standard),
                box-shadow var(--duration-fast) var(--ease-standard),
                background-color var(--duration-fast) var(--ease-standard);
    outline: none;
  }
  .input-base::placeholder { color: var(--text-muted); }
  .input-base:focus {
    border-color: var(--brand-indigo);
    background-color: var(--surface-base);
    box-shadow: 0 0 0 3px var(--brand-indigo-muted);
  }

  /* --- Badges / Status Pills --- */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 0.25rem;
    padding: 0.2rem 0.625rem;
    border-radius: var(--radius-full);
    font-size: 0.625rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border: 1px solid transparent;
  }
  .badge-indigo  { background: var(--brand-indigo-light); color: var(--brand-indigo); border-color: var(--border-subtle); }
  .badge-emerald { background: var(--brand-emerald-light); color: var(--brand-emerald); }
  .badge-rose    { background: var(--brand-rose-light); color: var(--brand-rose); }
  .badge-amber   { background: var(--brand-amber-light); color: var(--brand-amber); }

  /* --- Divisores --- */
  .divider {
    height: 1px;
    background-color: var(--border-subtle);
    border: none;
    margin: 0;
  }


  /* =========================================================
     🎨 STATUS SEMÂNTICO DE OPÇÕES (preservado + refinado)
     ========================================================= */
  .border-l-itm {
    border-left: 4px solid var(--brand-rose) !important;
    background: linear-gradient(to right, var(--brand-rose-muted), transparent);
  }
  .border-l-atm {
    border-left: 4px solid var(--brand-amber) !important;
    background: linear-gradient(to right, var(--brand-amber-muted), transparent);
  }
  .border-l-otm {
    border-left: 4px solid var(--brand-emerald) !important;
    background: linear-gradient(to right, var(--brand-emerald-muted), transparent);
  }
  .border-l-call {
    border-left: 4px solid #0EA5E9 !important;
    background: linear-gradient(to right, rgba(14,165,233,0.06), transparent);
  }
  .border-l-put {
    border-left: 4px solid var(--brand-amber) !important;
    background: linear-gradient(to right, var(--brand-amber-muted), transparent);
  }


  /* =========================================================
     📜 SCROLLBARS
     ========================================================= */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb {
    background: var(--border-strong);
    border-radius: var(--radius-full);
  }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
  * { scrollbar-width: thin; scrollbar-color: var(--border-strong) transparent; }

  /* Scrollbar invisível com reveal no hover */
  .log-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
  .log-scrollbar::-webkit-scrollbar-thumb { background: transparent; }
  .log-scrollbar:hover::-webkit-scrollbar-thumb { background: var(--border-strong); }

  /* Carrossel */
  .carousel-container {
    display: flex;
    overflow-x: auto;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
    gap: 1.25rem;
    padding: 0.5rem 0.25rem 1.25rem 0.25rem;
    scroll-snap-type: x mandatory;
  }
  .carousel-container::-webkit-scrollbar { height: 4px; }
  .carousel-container::-webkit-scrollbar-thumb { background: var(--border-default); border: none; }

  .carousel-item {
    flex: 0 0 auto;
    width: 320px;
    scroll-snap-align: start;
    transition: transform var(--duration-std) var(--ease-standard),
                box-shadow var(--duration-std) var(--ease-standard);
    background-color: var(--surface-base);
    border-radius: var(--radius-xl);
    border: 1px solid var(--border-default);
    box-shadow: var(--shadow-sm);
  }
  .carousel-item:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow-lg);
    border-color: var(--border-strong);
  }

  .custom-scrollbar-mobile {
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
  }


  /* =========================================================
     ⚙️ AUTOMAÇÃO (preservado)
     ========================================================= */
  .automation-btn {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    padding: 0.875rem 1.25rem;
    background-color: var(--surface-base);
    border: 1px solid var(--border-default);
    border-radius: var(--radius-md);
    color: var(--text-secondary);
    font-size: 0.6875rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    transition: all var(--duration-fast) var(--ease-standard);
    cursor: pointer;
  }
  .automation-btn:hover {
    background-color: var(--brand-indigo);
    border-color: var(--brand-indigo);
    color: var(--text-inverted);
    transform: translateY(-2px);
    box-shadow: 0 6px 16px var(--brand-indigo-muted);
  }
  .automation-btn:active { transform: translateY(0); box-shadow: none; }


  /* =========================================================
     📱 LAYOUT RESPONSIVO
     Breakpoint único: 850px (alinhado com media queries do HTML)
     ========================================================= */

  /* Utilitários de área segura */
  .pb-safe { padding-bottom: var(--safe-bottom) !important; }
  .pt-safe { padding-top: var(--safe-top) !important; }

  .bg-app-bg      { background-color: var(--surface-bg); }
  .bg-app-surface { background-color: var(--surface-base); }

  @media screen and (max-width: 850px) {
    /* Sidebar desktop oculta */
    .desktop-sidebar { display: none !important; }

    /* Bottom bar visível */
    .mobile-bottom-bar {
      display: flex !important;
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      z-index: 9999;
      min-height: 120px;
      padding-bottom: env(safe-area-inset-bottom, var(--safe-bottom));
      background-color: var(--surface-base);
      border-top: 1px solid var(--border-subtle);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    /* Container principal */
    .main-chassi {
      padding: 12px 12px 100px 12px !important;
      margin: 0 !important;
      width: 100% !important;
      max-width: 100% !important;
    }

    /* Scrollbars invisíveis no mobile */
    ::-webkit-scrollbar { width: 0; height: 0; display: none; }
    * { scrollbar-width: none; -ms-overflow-style: none; }
  }

  @media screen and (min-width: 851px) {
    .desktop-sidebar  { display: flex !important; }
    .mobile-bottom-bar { display: none !important; }
    .main-chassi { padding: 32px !important; }
  }


  /* =========================================================
     🎬 ANIMAÇÕES
     ========================================================= */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideInBottom {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.6; transform: scale(0.85); }
  }

  .animate-fade-in {
    animation: fadeIn var(--duration-slow) var(--ease-decelerate) both;
  }
  .animate-slide-in {
    animation: slideInBottom var(--duration-slow) var(--ease-decelerate) both;
  }

  /* Stagger helper: aplique --delay nos filhos via JS ou inline style */
  .stagger-children > * { animation: fadeIn var(--duration-slow) var(--ease-decelerate) both; }
  .stagger-children > *:nth-child(1) { animation-delay: 0ms; }
  .stagger-children > *:nth-child(2) { animation-delay: 60ms; }
  .stagger-children > *:nth-child(3) { animation-delay: 120ms; }
  .stagger-children > *:nth-child(4) { animation-delay: 180ms; }
  .stagger-children > *:nth-child(5) { animation-delay: 240ms; }
  .stagger-children > *:nth-child(6) { animation-delay: 300ms; }

  /* Transições de view */
  .fade-enter-active { transition: opacity var(--duration-std) var(--ease-decelerate); }
  .fade-leave-active { transition: opacity var(--duration-fast) var(--ease-accelerate); }
  .fade-enter-from, .fade-leave-to { opacity: 0; }

  [v-cloak] { display: none; }


  /* =========================================================
     🔧 HANDSONTABLE (preservado)
     ========================================================= */
  thead.sticky { position: sticky !important; top: 0 !important; z-index: 40 !important; }
  tbody tr { position: static !important; }
  .handsontable .ht_master,
  .handsontable .ht_clone_top,
  .handsontable .ht_clone_left,
  .handsontable .ht_clone_top_left_corner,
  .handsontable .ht_clone_bottom_left_corner,
  .handsontable .ht_clone_bottom { z-index: 10 !important; }
  .htDropdownMenu { z-index: 50 !important; }

</style>


<script>
  /* =========================================================
     🎨 TAILWIND CONFIG — sincronizado com os tokens CSS
     ========================================================= */
  window.tailwind.config = {
    darkMode: ['attribute', '[data-theme="dark"]'],  /* Dark mode via atributo, não via prefers-color-scheme */
    theme: {
      extend: {
        colors: {
          /* Superfícies */
          app: {
            bg:      'var(--surface-bg)',
            surface: 'var(--surface-base)',
            raised:  'var(--surface-raised)',
            overlay: 'var(--surface-overlay)',
            sunken:  'var(--surface-sunken)',

          },
          /* Marca */
          brand: {
            indigo:  'var(--brand-indigo)',
            emerald: 'var(--brand-emerald)',
            rose:    'var(--brand-rose)',
            amber:   'var(--brand-amber)',
          },
          /* Texto */
          content: {
            primary:   'var(--text-primary)',
            secondary: 'var(--text-secondary)',
            tertiary:  'var(--text-tertiary)',
            muted:     'var(--text-muted)',
          },
          /* Legado (compatibilidade) */
          status: {
            otm: 'var(--brand-emerald)',
            atm: 'var(--brand-amber)',
            itm: 'var(--brand-rose)',
          },
        },
        fontFamily: {
          sans:    ['Plus Jakarta Sans', 'system-ui', 'sans-serif'],
          display: ['Plus Jakarta Sans', 'sans-serif'],
          mono:    ['JetBrains Mono', 'monospace'],
        },
        borderRadius: {
          'xs':   'var(--radius-xs)',
          'sm':   'var(--radius-sm)',
          'md':   'var(--radius-md)',
          'lg':   'var(--radius-lg)',
          'xl':   'var(--radius-xl)',
          'm3':   'var(--radius-xl)',   /* Alias legado */
          'full': 'var(--radius-full)',
          /* Tailwind defaults preservados */
          DEFAULT: '0.25rem',
          '2xl':  '1rem',
          '3xl':  '1.5rem',
        },
        transitionTimingFunction: {
          'standard':   'var(--ease-standard)',
          'decelerate': 'var(--ease-decelerate)',
          'accelerate': 'var(--ease-accelerate)',
        },

          'fast': 'var(--duration-fast)',
          'std':  'var(--duration-std)',
          'slow': 'var(--duration-slow)',
        },
        boxShadow: {
          'sm':  'var(--shadow-sm)',
          'md':  'var(--shadow-md)',
          'lg':  'var(--shadow-lg)',
          'xl':  'var(--shadow-xl)',
        },
      }
    }
  };


  /* =========================================================
     🌑 DARK MODE TOGGLE — motor de tema
     Uso: window.ThemeManager.toggle()
          window.ThemeManager.set('dark')
          window.ThemeManager.set('light')
          window.ThemeManager.getCurrent() → 'light' | 'dark'
     ========================================================= */
  window.ThemeManager = (() => {
    const KEY = 'nexoapp_theme';
    const ROOT = document.documentElement;

    const apply = (theme) => {
      ROOT.setAttribute('data-theme', theme);
      localStorage.setItem(KEY, theme);
      // Dispara evento global para componentes Vue reagirem se necessário
      window.dispatchEvent(new CustomEvent('themechange', { detail: { theme } }));
    };

    const getCurrent = () => ROOT.getAttribute('data-theme') || 'light';

    const toggle = () => apply(getCurrent() === 'dark' ? 'light' : 'dark');

    const init = () => {
      const saved = localStorage.getItem(KEY);
      // Respeita preferência salva, senão usa preferência do sistema
      if (saved) {
        apply(saved);
      } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
        apply('dark');
      } else {
        apply('light');
      }
    };

    return { init, toggle, set: apply, getCurrent };
  })();

  // Inicializa imediatamente para evitar flash de tema errado (FOUC)
  window.ThemeManager.init();
</script>
