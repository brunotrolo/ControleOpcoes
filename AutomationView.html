<template id="automation-view-template">
  <div style="max-width:95%;margin:0 auto;padding-bottom:4rem;padding-top:1.5rem;display:flex;flex-direction:column;gap:2rem;">

    <!-- HEADER -->
    <div class="premium-card" style="padding:1.5rem 2rem;display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:1.5rem;">
      <div style="display:flex;align-items:center;gap:1.25rem;">
        <div style="padding:0.75rem;background:var(--brand-indigo-light);color:var(--brand-indigo);border-radius:var(--radius-lg);border:1px solid var(--brand-indigo-muted);flex-shrink:0;">
          <i data-lucide="zap" style="width:24px;height:24px;display:block;"></i>
        </div>
        <div>
          <h2 class="t-title" style="color:var(--text-primary);">Atualizar Cockpit</h2>
          <p class="t-label-sm" style="color:var(--text-muted);text-transform:uppercase;letter-spacing:0.2em;margin-top:0.2rem;">Sincroniza, Calcula e Notifica em Cascata</p>
        </div>
      </div>
      <button @click="run('executarFluxoSequencial')"
        class="automation-run-btn"
        style="display:flex;align-items:center;gap:0.75rem;background:var(--surface-base);border:1px solid var(--border-default);padding:0.75rem 1.5rem;border-radius:var(--radius-full);cursor:pointer;box-shadow:var(--shadow-sm);"
        onmouseover="this.style.background='var(--surface-overlay)';this.style.transform='translateY(-1px)'"
        onmouseout="this.style.background='var(--surface-base)';this.style.transform='none'">
        <span class="t-label-sm" style="font-weight:700;text-transform:uppercase;letter-spacing:0.15em;color:var(--text-tertiary);">Iniciar Rotina Completa</span>
        <div style="width:1.5rem;height:1.5rem;border-radius:var(--radius-full);background:var(--surface-overlay);display:flex;align-items:center;justify-content:center;border:1px solid var(--border-default);">
          <i data-lucide="play" style="width:12px;height:12px;display:block;color:var(--text-tertiary);fill:var(--text-tertiary);"></i>
        </div>
      </button>
    </div>

    <!-- GRID DE AÇÕES -->
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1.5rem;">

      <!-- Sincronização Manual -->
      <div class="premium-card" style="padding:0.5rem;">
        <div style="padding:1rem;display:flex;flex-direction:column;height:100%;">
          <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:1.25rem;padding-bottom:0.75rem;border-bottom:1px solid var(--border-subtle);">
            <i data-lucide="database" style="width:18px;height:18px;color:var(--text-muted);flex-shrink:0;display:block;"></i>
            <h3 class="t-label-sm" style="font-weight:700;text-transform:uppercase;letter-spacing:0.18em;color:var(--text-tertiary);">Sincronização Manual</h3>
          </div>
          <div style="display:flex;flex-direction:column;gap:0.5rem;flex:1;">
            <button @click="run('AtualizarNecton_Menu')" class="automation-item-btn">Atualizar Portfólio</button>
            <button @click="run('AtualizarDadosAtivos_Menu')" class="automation-item-btn">Sincronizar Ativos</button>
            <button @click="run('AtualizarHistorico_Menu')" class="automation-item-btn">Sincronizar Históricos Ativos</button>
            <button @click="run('AtualizarDetalhes_Menu')" class="automation-item-btn">Sincronizar Detalhes</button>
            <button @click="run('AtualizarGregasAPI_Menu')" class="automation-item-btn">Calcular Gregas (API)</button>
            <button @click="run('CalcularGregasNativo_Menu')" class="automation-item-btn">Calcular Gregas (Nativo)</button>
          </div>
        </div>
      </div>

      <!-- Estruturação de Trades -->
      <div class="premium-card" style="padding:0.5rem;">
        <div style="padding:1rem;display:flex;flex-direction:column;height:100%;">
          <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:1.25rem;padding-bottom:0.75rem;border-bottom:1px solid var(--border-subtle);">
            <i data-lucide="crosshair" style="width:18px;height:18px;color:var(--text-muted);flex-shrink:0;display:block;"></i>
            <h3 class="t-label-sm" style="font-weight:700;text-transform:uppercase;letter-spacing:0.18em;color:var(--text-tertiary);">Estruturação de Trades</h3>
          </div>
          <div style="display:flex;flex-direction:column;gap:0.5rem;flex:1;">
            <button @click="run('AtualizarScanner_Menu')" class="automation-item-btn">Seleção de Opções</button>
            <button @click="run('orq_GerarShortStrangles')" class="automation-item-btn">Gerar Short Strangles</button>
            <button @click="run('executarPipelinePreditivo')" class="automation-item-btn">Calcular Análise Preditiva</button>
          </div>
        </div>
      </div>

      <!-- Estratégia & IA -->
      <div class="premium-card" style="padding:0.5rem;">
        <div style="padding:1rem;display:flex;flex-direction:column;height:100%;">
          <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:1.25rem;padding-bottom:0.75rem;border-bottom:1px solid var(--border-subtle);">
            <i data-lucide="cpu" style="width:18px;height:18px;color:var(--text-muted);flex-shrink:0;display:block;"></i>
            <h3 class="t-label-sm" style="font-weight:700;text-transform:uppercase;letter-spacing:0.18em;color:var(--text-tertiary);">Estratégia & IA</h3>
          </div>
          <div style="display:flex;flex-direction:column;gap:0.5rem;flex:1;">
            <button @click="run('TendenciaDadosAtivos_Menu')" class="automation-item-btn">Análise de Tendência</button>
            <button @click="run('executarRotinaDiaria')" class="automation-item-btn">Consultoria Portfólio</button>
            <button @click="run('AtualizarScanner_Menu')" class="automation-item-btn">Gerar Scanner (E-mail)</button>
          </div>
        </div>
      </div>

    </div>

    <!-- LOG CONSOLE -->
    <div style="margin-top:1rem;">
      <h3 class="t-label-sm" style="font-weight:700;text-transform:uppercase;letter-spacing:0.25em;color:var(--text-muted);margin-bottom:1rem;padding-bottom:0.5rem;border-bottom:1px solid var(--border-subtle);">
        Monitoramento em Tempo Real
      </h3>
      <log-console :logs="logs" style="width:100%;" @refresh="$emit('refresh')"></log-console>
    </div>

    <!-- OVERLAY DE EXECUÇÃO -->
    <div v-if="running"
      style="position:fixed;inset:0;background:rgba(var(--surface-base-rgb,255,255,255),0.7);backdrop-filter:blur(6px);z-index:100;display:flex;align-items:center;justify-content:center;">
      <div class="premium-card" style="padding:2.5rem;text-align:center;max-width:22rem;width:100%;">

        <div v-if="!finished">
          <div style="font-size:3rem;display:block;margin-bottom:1.5rem;animation:auto-spin 1.2s linear infinite;display:inline-block;">⚙️</div>
          <h4 class="t-subtitle" style="color:var(--text-primary);margin-bottom:0.75rem;">Processando Rotina</h4>
          <p class="t-body" style="color:var(--text-tertiary);line-height:1.6;">
            A automação está sendo executada no Google Sheets.<br>Aguarde um momento...
          </p>
        </div>

        <div v-else>
          <div style="font-size:3rem;display:inline-block;margin-bottom:1.5rem;animation:auto-bounce 0.6s ease infinite alternate;">✅</div>
          <h4 class="t-subtitle" style="color:var(--brand-emerald);margin-bottom:0.75rem;">Concluído!</h4>
          <p class="t-body" style="color:var(--text-tertiary);line-height:1.6;">A rotina foi finalizada com sucesso.</p>
        </div>

      </div>
    </div>

  </div>
</template>

<style>
  @keyframes auto-spin   { to { transform: rotate(360deg); } }
  @keyframes auto-bounce { from { transform: translateY(0); } to { transform: translateY(-6px); } }

  .automation-item-btn {
    text-align: left;
    padding: 0.6rem 1rem;
    background: var(--surface-base);
    border: 1px solid var(--border-default);
    border-radius: var(--radius-md);
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--text-tertiary);
    cursor: pointer;
    transition: color var(--duration-fast), border-color var(--duration-fast), background var(--duration-fast);
    width: 100%;
  }
  .automation-item-btn:hover {
    color: var(--brand-indigo);
    border-color: var(--brand-indigo-muted);
    background: var(--brand-indigo-light);
  }
</style>

<script>
window.AutomationView = {
  template: '#automation-view-template',
  props: ['logs'],
  data() {
    return { 
      running: false,
      finished: false
    };
  },
  mounted() {
    if (typeof lucide !== 'undefined') {
      lucide.createIcons();
    }
  },
  methods: {
    run(functionName) {
      const self = this;
      self.running = true;
      self.finished = false;
      
      google.script.run
        .withSuccessHandler((res) => {
          self.finished = true;
          this.$emit('refresh'); 
          setTimeout(() => {
            self.running = false;
            self.finished = false;
          }, 3000); 
        })
        .withFailureHandler((err) => {
          self.running = false;
          self.finished = false;
          alert("❌ Erro: " + err);
        })
        [functionName](); 
    }
  }
};
</script>
