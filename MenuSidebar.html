<template id="menu-sidebar-template">

  <!-- =====================================================================
       DESKTOP SIDEBAR
       Micro frontend autossuficiente. Recebe: menu, currentView, isCollapsed,
       isMobile via props do AppCore.
       ===================================================================== -->
  <aside
    v-if="!isMobile"
    :class="[
      'desktop-sidebar flex flex-col h-screen shrink-0 transition-all duration-[350ms] ease-[cubic-bezier(0.2,0,0,1)]',
      isCollapsed ? 'w-[68px]' : 'w-[240px]'
    ]"
    :style="{ background: 'var(--surface-base)', borderRight: '1px solid var(--border-subtle)' }"
  >
    <!-- Cabeçalho / Logo -->
    <div class="flex items-center h-16 px-4 shrink-0" :style="{ borderBottom: '1px solid var(--border-subtle)' }">
      <div class="flex items-center gap-3 overflow-hidden">
        <!-- Ícone do app — sempre visível -->
        <div class="w-9 h-9 rounded-[var(--radius-md)] flex items-center justify-center shrink-0 shadow-sm"
             style="background: var(--brand-indigo);">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 3h7v7H3zM14 3h7v7h-7zM3 14h7v7H3zM17.5 14l4 7h-8l4-7z" fill="white" fill-opacity="0.9"/>
          </svg>
        </div>
        <!-- Nome — oculto quando collapsed -->
        <transition name="sidebar-label">
          <div v-show="!isCollapsed" class="flex flex-col leading-none overflow-hidden">
            <span style="font-family: 'Syne', sans-serif; font-weight: 800; font-size: 15px; color: var(--text-primary); letter-spacing: -0.03em; white-space: nowrap;">
              NexoApp
            </span>
            <span style="font-size: 10px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; white-space: nowrap;">
              Portfólio · Opções
            </span>
          </div>
        </transition>
      </div>
      <!-- Botão de colapsar -->
      <button
        @click="$emit('toggle-sidebar')"
        class="ml-auto shrink-0 w-7 h-7 rounded-[var(--radius-xs)] flex items-center justify-center transition-all duration-[150ms]"
        style="color: var(--text-muted);"
        :style="isCollapsed ? 'margin-left: 0' : ''"
        onmouseover="this.style.background='var(--surface-overlay)'; this.style.color='var(--text-primary)'"
        onmouseout="this.style.background='transparent'; this.style.color='var(--text-muted)'"
        :title="isCollapsed ? 'Expandir menu' : 'Recolher menu'"
      >
        <i :data-lucide="isCollapsed ? 'panel-left-open' : 'panel-left-close'" class="w-4 h-4"></i>
      </button>
    </div>

    <!-- Itens de navegação -->
    <nav class="flex-1 overflow-y-auto overflow-x-hidden py-3 px-2 space-y-0.5">
      <button
        v-for="item in menu"
        :key="item.id"
        @click="$emit('navigate', item.id)"
        :title="isCollapsed ? item.label : ''"
        :class="[
          'w-full flex items-center gap-3 rounded-[var(--radius-md)] transition-all duration-[150ms] group relative',
          isCollapsed ? 'justify-center px-0 py-2.5 h-10' : 'px-3 py-2.5',
          currentView === item.id ? 'nav-item-active' : 'nav-item-idle'
        ]"
      >
        <!-- Indicador de ativo -->
        <span
          v-if="currentView === item.id"
          class="absolute left-0 top-1/2 -translate-y-1/2 w-[3px] h-5 rounded-r-full"
          style="background: var(--brand-indigo);"
        ></span>

        <!-- Ícone -->
        <i
          :data-lucide="item.icon"
          class="w-[18px] h-[18px] shrink-0 transition-transform duration-[150ms]"
          :class="currentView === item.id ? 'scale-110' : 'group-hover:scale-105'"
        ></i>

        <!-- Label — oculto quando collapsed -->
        <transition name="sidebar-label">
          <span
            v-show="!isCollapsed"
            class="text-[13px] font-semibold tracking-[-0.01em] whitespace-nowrap overflow-hidden"
          >
            {{ item.label }}
          </span>
        </transition>

        <!-- Tooltip quando collapsed -->
        <div
          v-if="isCollapsed"
          class="absolute left-full ml-3 px-2.5 py-1.5 rounded-[var(--radius-sm)] text-xs font-semibold whitespace-nowrap pointer-events-none
                 opacity-0 group-hover:opacity-100 transition-opacity duration-150 z-50 shadow-md"
          style="background: var(--text-primary); color: var(--surface-base);"
        >
          {{ item.label }}
        </div>
      </button>
    </nav>

    <!-- Rodapé: Dark mode toggle + sync info -->
    <div class="shrink-0 px-2 pb-4 pt-2 space-y-1" :style="{ borderTop: '1px solid var(--border-subtle)' }">

      <!-- Toggle Dark Mode -->
      <button
        @click="toggleTema"
        :title="isDark ? 'Modo Claro' : 'Modo Escuro'"
        :class="[
          'w-full flex items-center gap-3 rounded-[var(--radius-md)] px-3 py-2.5 transition-all duration-[150ms] group',
          isCollapsed ? 'justify-center px-0' : ''
        ]"
        style="color: var(--text-muted);"
        onmouseover="this.style.background='var(--surface-overlay)'; this.style.color='var(--text-secondary)'"
        onmouseout="this.style.background='transparent'; this.style.color='var(--text-muted)'"
      >
        <i :data-lucide="isDark ? 'sun' : 'moon'" class="w-[18px] h-[18px] shrink-0"></i>
        <transition name="sidebar-label">
          <span v-show="!isCollapsed" class="text-[13px] font-semibold tracking-[-0.01em] whitespace-nowrap">
            {{ isDark ? 'Modo Claro' : 'Modo Escuro' }}
          </span>
        </transition>
      </button>

      <!-- Última sincronização -->
      <transition name="sidebar-label">
        <div v-show="!isCollapsed && lastSync" class="px-3 py-1.5">
          <p style="font-size: 10px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.06em; text-transform: uppercase;">
            Sincronizado
          </p>
          <p style="font-size: 11px; font-weight: 600; color: var(--text-tertiary); font-family: 'JetBrains Mono', monospace;">
            {{ lastSync }}
          </p>
        </div>
      </transition>

    </div>
  </aside>


  <!-- =====================================================================
       MOBILE BOTTOM BAR
       Exibida apenas em mobile. 5 ítens máximo — os mais relevantes.
       ===================================================================== -->
  <nav
    v-if="isMobile"
    class="mobile-bottom-bar"
    style="background: var(--surface-base); border-top: 1px solid var(--border-subtle);"
  >
    <button
      v-for="item in mobileMenu"
      :key="item.id"
      @click="$emit('navigate', item.id)"
      :class="[
        'flex-1 flex flex-col items-center justify-center gap-2 py-4 transition-all duration-[150ms] relative',
        currentView === item.id ? 'mobile-nav-active' : 'mobile-nav-idle'
      ]"
    >
      <!-- Pill indicador de ativo -->
      <span
        v-if="currentView === item.id"
        class="absolute top-0 left-1/2 -translate-x-1/2 w-10 h-[3px] rounded-b-full"
        style="background: var(--brand-indigo);"
      ></span>

      <i :data-lucide="item.icon" class="w-9 h-9 shrink-0"></i>
      <span style="font-size: 12px; font-weight: 700; letter-spacing: 0.04em;">
        {{ item.shortLabel || item.label }}
      </span>
    </button>

    <!-- Toggle tema — visível diretamente na bottom bar -->
    <button
      @click="toggleTema"
      class="flex-1 flex flex-col items-center justify-center gap-2 py-4 transition-all duration-[150ms] mobile-nav-idle"
    >
      <i :data-lucide="isDark ? 'sun' : 'moon'" class="w-9 h-9 shrink-0"></i>
      <span style="font-size: 12px; font-weight: 700; letter-spacing: 0.04em;">
        {{ isDark ? 'Claro' : 'Escuro' }}
      </span>
    </button>

    <!-- Botão "Mais" para itens fora do menu mobile -->
    <button
      @click="toggleMobileDrawer"
      :class="[
        'flex-1 flex flex-col items-center justify-center gap-2 py-4 transition-all duration-[150ms]',
        drawerAberto ? 'mobile-nav-active' : 'mobile-nav-idle'
      ]"
    >
      <i data-lucide="grid-3x3" class="w-9 h-9 shrink-0"></i>
      <span style="font-size: 12px; font-weight: 700; letter-spacing: 0.04em;">Mais</span>
    </button>
  </nav>


  <!-- =====================================================================
       MOBILE DRAWER — itens secundários
       ===================================================================== -->
  <transition name="drawer">
    <div
      v-if="isMobile && drawerAberto"
      class="fixed inset-0 z-[9998]"
      @click.self="fecharDrawer"
    >
      <!-- Overlay -->
      <div class="absolute inset-0" style="background: rgba(0,0,0,0.4); backdrop-filter: blur(4px);"></div>

      <!-- Painel do drawer -->
      <div
        class="absolute bottom-0 left-0 right-0 rounded-t-[var(--radius-xl)] overflow-hidden"
        style="background: var(--surface-base); border-top: 1px solid var(--border-default); padding-bottom: calc(120px + env(safe-area-inset-bottom, 0px));"
      >
        <!-- Handle -->
        <div class="flex justify-center pt-3 pb-1">
          <div class="w-10 h-1 rounded-full" style="background: var(--border-strong);"></div>
        </div>

        <!-- Título -->
        <div class="px-6 py-3" style="border-bottom: 1px solid var(--border-subtle);">
          <p style="font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 800; color: var(--text-primary); letter-spacing: -0.02em;">
            Menu Completo
          </p>
        </div>

        <!-- Grid de itens secundários -->
        <div class="grid grid-cols-3 gap-3 p-5">
          <button
            v-for="item in drawerMenu"
            :key="item.id"
            @click="navegarDrawer(item.id)"
            :class="[
              'flex flex-col items-center gap-2.5 p-4 rounded-[var(--radius-lg)] transition-all duration-[150ms]',
              currentView === item.id ? 'drawer-item-active' : 'drawer-item-idle'
            ]"
          >
            <i :data-lucide="item.icon" class="w-10 h-10"></i>
            <span style="font-size: 13px; font-weight: 700; text-align: center; line-height: 1.3;">
              {{ item.label }}
            </span>
          </button>
        </div>
      </div>
    </div>
  </transition>

</template>


<style>
  /* --- Itens de navegação desktop --- */
  .nav-item-active {
    background: var(--brand-indigo-light);
    color: var(--brand-indigo);
  }
  .nav-item-idle {
    background: transparent;
    color: var(--text-tertiary);
  }
  .nav-item-idle:hover {
    background: var(--surface-overlay);
    color: var(--text-primary);
  }

  /* --- Itens de navegação mobile bottom bar --- */
  .mobile-nav-active {
    color: var(--brand-indigo);
  }
  .mobile-nav-idle {
    color: var(--text-muted);
  }
  .mobile-nav-idle:hover {
    color: var(--text-secondary);
  }

  /* --- Itens do drawer mobile --- */
  .drawer-item-active {
    background: var(--brand-indigo-light);
    color: var(--brand-indigo);
  }
  .drawer-item-idle {
    background: var(--surface-overlay);
    color: var(--text-secondary);
  }
  .drawer-item-idle:hover {
    background: var(--surface-sunken);
    color: var(--text-primary);
  }

  /* --- Transição label sidebar (collapse/expand) --- */
  .sidebar-label-enter-active { transition: opacity 200ms ease, max-width 300ms cubic-bezier(0.2,0,0,1); }
  .sidebar-label-leave-active { transition: opacity 100ms ease, max-width 250ms cubic-bezier(0.3,0,1,1); }
  .sidebar-label-enter-from, .sidebar-label-leave-to { opacity: 0; max-width: 0; }
  .sidebar-label-enter-to, .sidebar-label-leave-from { opacity: 1; max-width: 200px; }

  /* --- Transição drawer mobile --- */
  .drawer-enter-active { transition: opacity var(--duration-std) var(--ease-decelerate); }
  .drawer-leave-active { transition: opacity var(--duration-fast) var(--ease-accelerate); }
  .drawer-enter-from, .drawer-leave-to { opacity: 0; }
  .drawer-enter-active > div:last-child { transition: transform var(--duration-std) var(--ease-decelerate); }
  .drawer-leave-active > div:last-child { transition: transform var(--duration-fast) var(--ease-accelerate); }
  .drawer-enter-from > div:last-child, .drawer-leave-to > div:last-child { transform: translateY(100%); }
</style>


<script>
window.MenuSidebar = {
  template: '#menu-sidebar-template',

  props: {
    menu:        { type: Array,   default: () => [] },
    currentView: { type: String,  default: 'cockpit' },
    isCollapsed: { type: Boolean, default: true },
    isMobile:    { type: Boolean, default: false },
    lastSync:    { type: String,  default: '' }
  },

  emits: ['navigate', 'toggle-sidebar'],

  data() {
    return {
      isDark: false,
      drawerAberto: false,

      // Itens fixos na bottom bar mobile — os 4 mais usados
      mobileMenuIds: ['cockpit', 'consultoria', 'automacao', 'comparador'],
    };
  },

  computed: {
    // Menu principal da bottom bar (4 itens fixos)
    mobileMenu() {
      return this.menu
        .filter(item => this.mobileMenuIds.includes(item.id))
        .map(item => ({
          ...item,
          shortLabel: this.shortLabels[item.id] || item.label
        }));
    },

    // Itens restantes vão para o drawer
    drawerMenu() {
      return this.menu.filter(item => !this.mobileMenuIds.includes(item.id));
    },

    // Labels curtos para a bottom bar
    shortLabels() {
      return {
        'cockpit':       'Home',
        'consultoria':   'Consultor',
        'automacao':     'Automação',
        'comparador':    'Comparar',
        'dados-ativos':  'Ativos',
        'scanner':       'Scanner',
        'necton-import': 'Importar',
        'bancodedados':  'Dados',
        'config':        'Config'
      };
    }
  },

  mounted() {
    // Lê o tema atual do ThemeManager
    if (window.ThemeManager) {
      this.isDark = window.ThemeManager.getCurrent() === 'dark';
    }

    // Reage a mudanças de tema externas (ex: outro componente chamando toggle)
    window.addEventListener('themechange', (e) => {
      this.isDark = e.detail.theme === 'dark';
      this.$nextTick(() => { if (window.lucide) lucide.createIcons(); });
    });

    this.$nextTick(() => { if (window.lucide) lucide.createIcons(); });
  },

  watch: {
    isCollapsed() {
      this.$nextTick(() => { if (window.lucide) lucide.createIcons(); });
    },
    currentView() {
      this.$nextTick(() => { if (window.lucide) lucide.createIcons(); });
    }
  },

  methods: {
    toggleTema() {
      if (window.ThemeManager) {
        window.ThemeManager.toggle();
        this.isDark = window.ThemeManager.getCurrent() === 'dark';
        this.$nextTick(() => { if (window.lucide) lucide.createIcons(); });
      }
    },

    toggleMobileDrawer() {
      this.drawerAberto = !this.drawerAberto;
      this.$nextTick(() => { if (window.lucide) lucide.createIcons(); });
    },

    fecharDrawer() {
      this.drawerAberto = false;
    },

    navegarDrawer(viewId) {
      this.$emit('navigate', viewId);
      this.fecharDrawer();
    }
  }
};
</script>
