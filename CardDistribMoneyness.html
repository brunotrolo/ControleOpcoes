<template id="card-distrib-moneyness-template">

  <!-- ══════════════════════════════════════════
       MOBILE
       ══════════════════════════════════════════ -->
  <div
    v-if="isMobile"
    class="w-full rounded-[var(--radius-xl)] pt-6 px-6 pb-8 flex flex-col h-full relative overflow-hidden"
    style="background: var(--surface-base); border: 1px solid var(--border-subtle); box-shadow: var(--shadow-sm);"
  >

    <!-- Barra de progresso inferior -->
    <div class="absolute bottom-0 left-0 w-full h-6 flex z-20" style="font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 700; color: white;">
      <div :style="{ width: (displayStats.otmPct || 0) + '%' }"
           class="h-full transition-all duration-1000 flex items-center justify-center overflow-hidden"
           style="background: var(--brand-emerald);">
        <span v-if="displayStats.otmPct > 0">{{ displayStats.otmPct }}%</span>
      </div>
      <div :style="{ width: (displayStats.atmPct || 0) + '%' }"
           class="h-full transition-all duration-1000 flex items-center justify-center overflow-hidden"
           style="background: var(--brand-amber);">
        <span v-if="displayStats.atmPct > 0" style="color: var(--brand-amber-dark, #78350f);">{{ displayStats.atmPct }}%</span>
      </div>
      <div :style="{ width: (displayStats.itmPct || 0) + '%' }"
           class="h-full transition-all duration-1000 flex items-center justify-center overflow-hidden"
           style="background: var(--brand-rose);">
        <span v-if="displayStats.itmPct > 0">{{ displayStats.itmPct }}%</span>
      </div>
    </div>

    <!-- Conteúdo -->
    <div class="flex flex-col h-full relative z-10">

      <!-- Cabeçalho -->
      <div class="flex flex-col mb-4">
        <h3 style="font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800;
                   color: var(--text-primary); letter-spacing: -0.02em; text-transform: uppercase;">
          Exposição
        </h3>
        <div class="flex items-center mt-2 gap-2">
          <span style="font-size: 10px; font-weight: 700; color: var(--text-muted);
                       text-transform: uppercase; letter-spacing: 0.16em;">Moneyness</span>
          <template v-if="!isLoading && displayStats.total > 0">
            <span class="w-2 h-2 rounded-full" :style="statusProtecao.dotStyle"></span>
            <span style="font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;"
                  :style="statusProtecao.textStyle">
              {{ statusProtecao.labelClean }}
            </span>
          </template>
        </div>
      </div>

      <!-- Skeleton -->
      <div v-if="isLoading" class="flex-1 flex flex-col justify-center gap-5 animate-pulse mt-2">
        <div class="flex justify-around items-end w-full">
          <div v-for="i in 3" :key="i" class="flex flex-col items-center gap-3">
            <div class="h-4 rounded w-12" style="background: var(--surface-overlay);"></div>
            <div class="h-16 rounded-[var(--radius-md)] w-16" style="background: var(--surface-sunken);"></div>
          </div>
        </div>
      </div>

      <!-- Números hero -->
      <template v-else>
        <div class="flex flex-col flex-1 justify-center">
          <div class="flex justify-between px-1 mb-4" style="font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;">
            <span style="color: var(--brand-emerald);">Segurança (OTM)</span>
            <span style="color: var(--brand-rose);">Risco (ITM)</span>
          </div>
          <div class="flex items-center justify-around px-1 mt-2">
            <div v-for="type in ['otm', 'atm', 'itm']" :key="type" class="flex flex-col items-center w-1/3">
              <span style="font-size: 10px; font-weight: 700; color: var(--text-muted);
                           text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 4px;">
                {{ getBoxLabel(type) }}
              </span>
              <span style="font-family: 'JetBrains Mono', monospace; font-size: 64px; font-weight: 700;
                           letter-spacing: -0.05em; line-height: 1;"
                    :style="getHeroStyle(type)">
                {{ displayStats[type] || 0 }}
              </span>
            </div>
          </div>
        </div>
      </template>

    </div>
  </div>

  <!-- ══════════════════════════════════════════
       DESKTOP
       ══════════════════════════════════════════ -->
  <div
    v-else
    class="w-full rounded-[var(--radius-xl)] p-5 flex flex-col h-full transition-all duration-[var(--duration-std)]"
    style="background: var(--surface-base); border: 1px solid var(--border-subtle);
           box-shadow: var(--shadow-sm);"
    onmouseover="this.style.boxShadow='var(--shadow-md)'"
    onmouseout="this.style.boxShadow='var(--shadow-sm)'"
  >

    <!-- Cabeçalho -->
    <div class="flex justify-between items-start mb-6">
      <div>
        <h3 class="t-subtitle" style="color: var(--text-primary);">Exposição</h3>
        <p class="t-label mt-1" style="color: var(--text-muted);">Por Moneyness</p>
      </div>
    </div>

    <!-- Skeleton -->
    <div v-if="isLoading" class="animate-pulse space-y-5">
      <div class="h-5 rounded-[var(--radius-full)] w-full" style="background: var(--surface-overlay);"></div>
      <div class="h-4 rounded w-1/2" style="background: var(--surface-sunken);"></div>
      <div class="grid grid-cols-3 gap-2">
        <div v-for="i in 3" :key="i" class="h-20 rounded-[var(--radius-lg)]" style="background: var(--surface-sunken); border: 1px solid var(--border-subtle);"></div>
      </div>
    </div>

    <template v-else>

      <!-- Barra de progresso -->
      <div class="relative mb-4">
        <div class="flex justify-between px-1 mb-2" style="font-size: 9px; font-weight: 700;
                    text-transform: uppercase; letter-spacing: 0.12em;">
          <span style="color: var(--brand-emerald);">Segurança (OTM)</span>
          <span style="color: var(--brand-rose);">Risco (ITM)</span>
        </div>
        <div
          class="w-full h-5 rounded-[var(--radius-full)] overflow-hidden flex p-1"
          style="background: var(--surface-sunken); border: 1px solid var(--border-subtle);"
        >
          <div :style="{ width: (displayStats.otmPct || 0) + '%' }"
               class="h-full rounded-l-full transition-all duration-1000"
               style="background: var(--brand-emerald);"></div>
          <div :style="{ width: (displayStats.atmPct || 0) + '%' }"
               class="h-full transition-all duration-1000"
               style="background: var(--brand-amber);"></div>
          <div :style="{ width: (displayStats.itmPct || 0) + '%' }"
               class="h-full rounded-r-full transition-all duration-1000"
               style="background: var(--brand-rose);"></div>
        </div>

        <!-- Badges de status -->
        <div class="flex items-center mt-3 gap-2">
          <span
            class="px-2 py-1 rounded-[var(--radius-sm)]"
            style="font-size: 8px; font-weight: 700; letter-spacing: 0.08em;
                   text-transform: uppercase; border: 1px solid;"
            :style="statusProtecao.badgeStyle"
          >
            {{ statusProtecao.label }}
          </span>
          <span
            v-if="displayStats.poeMedio"
            class="px-2 py-1 rounded-[var(--radius-sm)]"
            style="font-size: 8px; font-weight: 600; color: var(--text-secondary);
                   background: var(--surface-overlay); border: 1px solid var(--border-subtle);"
          >
            POE Médio: {{ displayStats.poeMedio }}
          </span>
        </div>
      </div>

      <!-- Cards OTM / ATM / ITM -->
      <div class="grid grid-cols-3 gap-2 mt-auto">
        <div
          v-for="type in ['otm', 'atm', 'itm']"
          :key="type"
          class="p-3 rounded-[var(--radius-lg)] flex flex-col items-center justify-center"
          style="border: 1px solid;"
          :style="getBoxStyle(type)"
        >
          <span style="font-size: 8px; font-weight: 700; text-transform: uppercase;
                       letter-spacing: 0.1em; opacity: 0.7; margin-bottom: 4px;">
            {{ getBoxLabel(type) }}
          </span>
          <div class="flex items-baseline gap-1">
            <span style="font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 700;">
              {{ displayStats[type] || 0 }}
            </span>
            <span style="font-size: 8px; font-weight: 600; opacity: 0.6;">POS</span>
          </div>
          <span style="font-family: 'JetBrains Mono', monospace; font-size: 10px;
                       font-weight: 700; margin-top: 2px;">
            {{ displayStats[type + 'Pct'] || 0 }}%
          </span>
        </div>
      </div>

    </template>
  </div>

</template>

<script>
window.CardDistribMoneyness = {
  props: {
    statsPreCalculados: Object,
    isLoading:          { type: Boolean, default: false },
    isMobile:           { type: Boolean, default: false }
  },
  template: '#card-distrib-moneyness-template',

  computed: {
    displayStats() {
      if (!this.statsPreCalculados?.moneynessStats) {
        return { otm: 0, atm: 0, itm: 0, otmPct: 0, atmPct: 0, itmPct: 0, total: 0, poeMedio: '0%' };
      }
      return this.statsPreCalculados.moneynessStats;
    },

    statusProtecao() {
      const stats = this.displayStats;
      if (!stats || stats.total === 0) return {
        label: 'AGUARDANDO', labelClean: 'Aguardando',
        dotStyle:  'background: var(--text-muted);',
        textStyle: 'color: var(--text-muted);',
        badgeStyle:'color: var(--text-muted); background: var(--surface-overlay); border-color: var(--border-subtle);'
      };

      const key = stats.statusKey || 'ALERTA';
      const map = {
        BLINDADO: {
          label: 'PORTFÓLIO BLINDADO', labelClean: 'Protegido',
          dotStyle:   'background: var(--brand-emerald);',
          textStyle:  'color: var(--brand-emerald);',
          badgeStyle: 'color: var(--brand-emerald); background: var(--brand-emerald-light); border-color: var(--brand-emerald-muted);'
        },
        CONTROLADO: {
          label: 'RISCO CONTROLADO', labelClean: 'Risco Controlado',
          dotStyle:   'background: var(--brand-indigo);',
          textStyle:  'color: var(--brand-indigo);',
          badgeStyle: 'color: var(--brand-indigo); background: var(--brand-indigo-light); border-color: var(--brand-indigo-muted);'
        },
        ALERTA: {
          label: 'ALERTA DE EXERCÍCIO', labelClean: 'Atenção ao Risco',
          dotStyle:   'background: var(--brand-rose);',
          textStyle:  'color: var(--brand-rose);',
          badgeStyle: 'color: var(--brand-rose); background: var(--brand-rose-light); border-color: var(--brand-rose-muted);',
          pulse: true
        }
      };
      return map[key] || map['ALERTA'];
    }
  },

  methods: {
    getBoxLabel(type) {
      return { otm: 'Seguro', atm: 'Alerta', itm: 'Risco' }[type];
    },
    getBoxStyle(type) {
      const map = {
        otm: 'color: var(--brand-emerald); background: var(--brand-emerald-light); border-color: var(--brand-emerald-muted);',
        atm: 'color: var(--brand-amber); background: var(--brand-amber-light); border-color: var(--brand-amber-muted);',
        itm: 'color: var(--brand-rose);   background: var(--brand-rose-light);   border-color: var(--brand-rose-muted);'
      };
      return map[type];
    },
    getHeroStyle(type) {
      const map = {
        otm: 'color: var(--brand-emerald);',
        atm: 'color: var(--brand-amber);',
        itm: 'color: var(--brand-rose);'
      };
      return map[type];
    }
  }
};
</script>
