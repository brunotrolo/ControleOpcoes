<template id="ticker-tape-template">

  <!-- Skeleton de loading -->
  <div
    v-if="isLoading"
    :class="isMobile ? 'h-24 px-6' : 'h-12 px-4'"
    class="w-full border rounded-[var(--radius-full)] overflow-hidden flex items-center animate-pulse gap-6"
    style="background: var(--surface-base); border-color: var(--border-subtle);"
  >
    <div v-for="i in 6" :key="'skel-tick-'+i" class="flex items-center gap-3 shrink-0 opacity-40">
      <div
        :class="isMobile ? 'h-8 w-16' : 'h-4 w-12'"
        class="rounded"
        style="background: var(--surface-overlay);"
      ></div>
      <div
        class="h-5 w-20 rounded-[var(--radius-sm)]"
        style="background: var(--brand-emerald-light);"
      ></div>
    </div>
  </div>

  <!-- Fita animada -->
  <div
    v-else-if="ativos && ativos.length > 0"
    :class="isMobile ? 'h-24' : 'h-12'"
    class="w-full rounded-[var(--radius-full)] overflow-hidden flex items-center relative group transition-all duration-[var(--duration-std)]"
    style="background: var(--surface-base); border: 1px solid var(--border-subtle); box-shadow: var(--shadow-sm);"
  >
    <!-- Gradientes de fade nas bordas -->
    <div
      :class="isMobile ? 'w-8' : 'w-16'"
      class="absolute left-0 top-0 bottom-0 z-10 pointer-events-none"
      style="background: linear-gradient(to right, var(--surface-base), transparent);"
    ></div>
    <div
      :class="isMobile ? 'w-8' : 'w-16'"
      class="absolute right-0 top-0 bottom-0 z-10 pointer-events-none"
      style="background: linear-gradient(to left, var(--surface-base), transparent);"
    ></div>

    <!-- Conteúdo animado -->
    <div class="flex whitespace-nowrap animate-ticker group-hover:[animation-play-state:paused] w-max">

      <div class="flex items-center" v-for="n in 4" :key="n">

        <div
          v-for="(ativo, idx) in ativos"
          :key="n + '-' + idx"
          :class="isMobile ? 'px-8 gap-5' : 'px-8'"
          class="flex items-center transition-colors duration-[var(--duration-fast)] cursor-default"
          style="border-right: 1px solid var(--border-subtle);"
          onmouseover="this.style.background='var(--surface-overlay)'"
          onmouseout="this.style.background='transparent'"
        >
          <!-- Ticker -->
          <span
            :style="isMobile ? 'font-size: 20px' : 'font-size: 12px'"
            style="font-family: 'Syne', sans-serif; font-weight: 700;
                   color: var(--text-primary); letter-spacing: 0.06em;"
          >
            {{ ativo.tickerAtivo || '---' }}
          </span>

          <!-- Preço -->
          <span
            :class="isMobile ? 'ml-4 px-4 py-1.5' : 'ml-3 px-2 py-0.5'"
            :style="isMobile ? 'font-size: 18px' : 'font-size: 11px'"
            class="rounded-[var(--radius-full)]"
            style="font-family: 'JetBrains Mono', monospace; font-weight: 700;
                   color: var(--brand-emerald); background: var(--brand-emerald-light);
                   box-shadow: var(--shadow-sm);"
          >
            {{ Tradutor.formatarMoeda(ativo.spotPrice || 0) }}
          </span>

        </div>

      </div>
    </div>
  </div>

</template>

<style>
  @keyframes ticker {
    0%   { transform: translate3d(0, 0, 0); }
    100% { transform: translate3d(-50%, 0, 0); }
  }
  .animate-ticker {
    animation: ticker 35s linear infinite;
  }
</style>

<script>
window.TickerTape = {
  template: '#ticker-tape-template',
  props: {
    ativos:    { type: Array,   default: () => [] },
    isMobile:  { type: Boolean, default: false },
    isLoading: { type: Boolean, default: false }
  },
  data() {
    return { Tradutor: window.Tradutor };
  }
};
</script>
