<template id="comparativo-view-template">
  <div style="max-width: 95%; margin: 1.5rem auto 4rem; display: flex; flex-direction: column; gap: 2rem;">

    <!-- ══ HEADER ══ -->
    <div class="premium-card"
         style="padding: 1.5rem 2rem; display: flex; flex-wrap: wrap; justify-content: space-between;
                align-items: center; gap: 1.5rem; position: relative; z-index: 30;">
      <div style="display: flex; align-items: center; gap: 1.25rem;">
        <div style="padding: 0.75rem; background: var(--brand-indigo-light); color: var(--brand-indigo);
                    border-radius: var(--radius-lg); border: 1px solid var(--brand-indigo-muted);">
          <i data-lucide="swords" style="width: 1.5rem; height: 1.5rem;"></i>
        </div>
        <div>
          <h2 class="t-title" style="color: var(--text-primary); letter-spacing: -0.02em;">Comparador de PUT</h2>
          <div style="display: flex; align-items: center; gap: 0.5rem; margin-top: 0.375rem;">
            <span style="width: 0.5rem; height: 0.5rem; border-radius: 50%;
                         background: var(--brand-emerald); display: inline-block;
                         animation: comp-pulse 2s ease-in-out infinite;"></span>
            <p class="t-label-sm" style="color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.25em;">
              Simulação de Estresse e Payoff
            </p>
          </div>
        </div>
      </div>

      <!-- Controles -->
      <div style="display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap;
                  background: var(--surface-overlay); padding: 0.375rem 0.75rem;
                  border-radius: var(--radius-xl); border: 1px solid var(--border-subtle);">
        <label class="t-label-sm" style="color: var(--text-muted); text-transform: uppercase;
                                         letter-spacing: 0.16em; margin-left: 0.25rem;">Cenário:</label>
        <select v-model.number="simulacaoQueda" @change="processarComparacao"
                style="background: var(--surface-base); color: var(--text-primary); font-size: 12px;
                       font-weight: 700; border: 1px solid var(--border-default); border-radius: var(--radius-md);
                       padding: 0.5rem 1rem; outline: none; min-width: 160px; cursor: pointer;
                       font-family: 'DM Sans', sans-serif; appearance: none;"
                onfocus="this.style.borderColor='var(--brand-indigo)'"
                onblur="this.style.borderColor='var(--border-default)'">
          <option :value="0">0% - Realista</option>
          <option :value="5">-5% - Queda Técnica</option>
          <option :value="10">-10% - Estresse Forte</option>
          <option :value="20">-20% - Cenário Crash</option>
        </select>

        <div style="width: 1px; height: 1.5rem; background: var(--border-subtle);"></div>

        <div style="display: flex; align-items: center; background: var(--surface-base);
                    border: 1px solid var(--border-default); border-radius: var(--radius-md);
                    padding: 0.5rem 0.75rem; gap: 0.5rem;">
          <i data-lucide="arrow-down-up" style="width: 0.875rem; height: 0.875rem; color: var(--text-muted);"></i>
          <select v-model="ordenarPor" @change="ordenarArena"
                  style="font-size: 10px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase;
                         letter-spacing: 0.1em; outline: none; background: transparent; cursor: pointer;
                         appearance: none; min-width: 140px; font-family: 'DM Sans', sans-serif;">
            <option value="padrao">Ordem Padrão</option>
            <option value="lucro">💰 Maior Lucro %</option>
            <option value="seguranca">🛡️ Maior Segurança</option>
            <option value="premio">💵 Maior Prêmio</option>
          </select>
        </div>

        <div style="width: 1px; height: 1.5rem; background: var(--border-subtle);"></div>

        <button @click="limparArena"
                style="padding: 0.5rem 0.75rem; background: var(--surface-base); border: 1px solid var(--border-default);
                       color: var(--text-muted); border-radius: var(--radius-md); cursor: pointer;"
                title="Limpar Arena"
                onmouseover="this.style.color='var(--brand-rose)'; this.style.borderColor='var(--brand-rose-muted)'"
                onmouseout="this.style.color='var(--text-muted)'; this.style.borderColor='var(--border-default)'">
          <i data-lucide="eraser" style="width: 1rem; height: 1rem;"></i>
        </button>

        <button @click="adicionarCard" class="btn-action btn-action-primary"
                style="padding: 0.5rem 1.25rem; border-radius: var(--radius-md);">
          <i data-lucide="plus" style="width: 1rem; height: 1rem;"></i>
          <span style="margin-left: 0.25rem; font-size: 10px; font-weight: 700;
                       text-transform: uppercase; letter-spacing: 0.12em;">Adicionar</span>
        </button>
      </div>
    </div>

    <!-- ══ ARENA ══ -->
    <div style="display: flex; flex-direction: column;">
      <div style="display: flex; flex-wrap: nowrap; overflow-x: auto; gap: 1.5rem;
                  align-items: flex-start; padding: 0.5rem 0.5rem 1.5rem; margin: 0 -0.5rem;
                  position: relative; z-index: 10;" class="log-scrollbar">

        <!-- Skeleton -->
        <template v-if="isLoading && cards.length === 0">
          <div v-for="n in 3" :key="'skel-comp-'+n"
               style="width: 320px; height: 500px; border-radius: var(--radius-xl); flex-shrink: 0;
                      background: var(--surface-base); border: 1px solid var(--border-subtle);
                      animation: comp-pulse 1.5s ease-in-out infinite;"></div>
        </template>

        <!-- Cards de opção -->
        <div v-for="(card, index) in cards" :key="card.id"
             style="width: 320px; flex-shrink: 0; border-radius: var(--radius-xl); box-shadow: var(--shadow-sm);
                    display: flex; flex-direction: column; overflow: hidden; position: relative;
                    transition: box-shadow 0.3s, border-color 0.3s;"
             :style="getCardBorderStyle(card)"
             onmouseover="this.style.boxShadow='var(--shadow-md)'"
             onmouseout="this.style.boxShadow='var(--shadow-sm)'">

          <!-- Badge de destaque -->
          <div v-if="mostrarResultados && rankingRentabilidade.id === card.id && rankingSeguranca.id === card.id"
               style="background: linear-gradient(to right, var(--brand-emerald), var(--brand-indigo));
                      color: #fff; font-size: 9px; font-weight: 700; text-transform: uppercase;
                      padding: 0.375rem; text-align: center; letter-spacing: 0.12em;">
            🏆 MAIOR LUCRO E 🛡️ MAIS SEGURA
          </div>
          <div v-else-if="mostrarResultados && rankingRentabilidade.id === card.id"
               style="background: var(--brand-emerald); color: #fff; font-size: 9px; font-weight: 700;
                      text-transform: uppercase; padding: 0.375rem; text-align: center; letter-spacing: 0.12em;">
            🏆 OPÇÃO MAIS RENTÁVEL
          </div>
          <div v-else-if="mostrarResultados && rankingSeguranca.id === card.id"
               style="background: var(--brand-indigo); color: #fff; font-size: 9px; font-weight: 700;
                      text-transform: uppercase; padding: 0.375rem; text-align: center; letter-spacing: 0.12em;">
            🛡️ OPÇÃO MAIS SEGURA
          </div>

          <!-- Botão remover -->
          <button @click.stop="removerCard(card.id)" v-if="cards.length > 2"
                  class="comp-delete-btn"
                  style="position: absolute; top: 0.5rem; right: 0.5rem; z-index: 40;
                         padding: 0.25rem; background: var(--surface-base); color: var(--text-muted);
                         border-radius: var(--radius-sm); border: 1px solid var(--border-subtle);
                         cursor: pointer; opacity: 0; transition: opacity 0.2s;"
                  onmouseover="this.style.background='var(--brand-rose-light)'; this.style.color='var(--brand-rose)'"
                  onmouseout="this.style.background='var(--surface-base)'; this.style.color='var(--text-muted)'">
            <i data-lucide="x" style="width: 0.875rem; height: 0.875rem;"></i>
          </button>

          <!-- Input do ticker -->
          <div style="padding: 1rem; background: var(--surface-overlay);
                      border-bottom: 1px solid var(--border-subtle); display: flex; flex-direction: column; gap: 0.75rem;">
            <div style="display: flex; flex-direction: column; gap: 0.25rem;">
              <label class="t-label-sm" style="color: var(--brand-indigo); text-transform: uppercase;
                                               letter-spacing: 0.16em; margin-left: 0.25rem;">Código do Ativo</label>
              <div style="position: relative;">
                <input v-model="card.ticker" @change="buscarDadosAPI(card)" @keyup.enter="buscarDadosAPI(card)" type="text"
                       placeholder="EX: PETRP280"
                       style="width: 100%; background: var(--surface-base); border: 1px solid var(--border-default);
                              font-family: 'JetBrains Mono', monospace; font-size: 1.5rem; font-weight: 700;
                              border-radius: var(--radius-md); padding: 0.5rem 0.75rem; text-transform: uppercase;
                              color: var(--text-primary); outline: none; transition: border-color 0.2s;"
                       onfocus="this.style.borderColor='var(--brand-indigo)'"
                       onblur="this.style.borderColor='var(--border-default)'">
                <div v-if="card.loading"
                     style="position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%);
                            width: 1rem; height: 1rem; border-radius: 50%;
                            border: 2px solid var(--brand-indigo-muted); border-top-color: var(--brand-indigo);
                            animation: comp-spin 0.7s linear infinite;"></div>
              </div>
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center;
                        padding: 0.375rem 0.625rem; background: var(--surface-base);
                        border: 1px solid var(--border-subtle); border-radius: var(--radius-sm);">
              <span class="t-label-sm" style="color: var(--text-muted); text-transform: uppercase;">Vencimento</span>
              <span class="font-mono-data" style="font-size: 1rem; font-weight: 700; color: var(--brand-indigo);">
                {{ card.api.isValid ? card.api.dte + ' d' : '---' }}
              </span>
            </div>
          </div>

          <!-- Corpo do card -->
          <div style="padding: 1rem; flex: 1; display: flex; flex-direction: column; gap: 1rem;
                      background: var(--surface-base);">

            <!-- Empty state / erro -->
            <div v-if="!card.api.isValid && !card.loading"
                 style="padding: 2.5rem 1rem; display: flex; flex-direction: column; align-items: center; gap: 0.5rem;">
              <template v-if="card.error">
                <i data-lucide="alert-circle" style="width: 1.75rem; height: 1.75rem; color: var(--brand-rose); margin-bottom: 0.25rem;"></i>
                <p class="t-label-sm" style="color: var(--brand-rose); text-transform: uppercase;
                                             text-align: center; line-height: 1.5; font-size: 9px;">{{ card.error }}</p>
              </template>
              <template v-else>
                <i data-lucide="search" style="width: 2rem; height: 2rem; color: var(--text-muted); opacity: 0.4; margin-bottom: 0.25rem;"></i>
                <p class="t-label-sm" style="color: var(--text-muted); text-transform: uppercase;
                                             text-align: center; line-height: 1.4; opacity: 0.4;">Aguardando<br>Dados</p>
              </template>
            </div>

            <!-- Dados da opção -->
            <div v-else-if="card.api.isValid" style="display: flex; flex-direction: column; gap: 0.75rem;">
              <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem;">
                <div style="padding: 0.5rem; background: var(--surface-overlay); border-radius: var(--radius-md);
                             border: 1px solid var(--border-subtle); text-align: center;">
                  <span class="t-label-sm" style="color: var(--text-muted); text-transform: uppercase;
                                                   display: block; margin-bottom: 0.25rem;">Spot</span>
                  <span class="font-mono-data" style="font-size: 15px; font-weight: 700; line-height: 1;"
                        :style="simulacaoQueda > 0 ? 'color: var(--text-muted); text-decoration: line-through;' : 'color: var(--text-primary);'">
                    {{ formatMoney(card.api.spotPrice) }}
                  </span>
                </div>
                <div style="padding: 0.5rem; background: var(--surface-overlay); border-radius: var(--radius-md);
                             border: 1px solid var(--border-subtle); text-align: center;">
                  <span class="t-label-sm" style="color: var(--text-muted); text-transform: uppercase;
                                                   display: block; margin-bottom: 0.25rem;">Strike</span>
                  <span class="font-mono-data" style="font-size: 15px; font-weight: 700; color: var(--text-primary); line-height: 1;">
                    {{ formatMoney(card.api.strike) }}
                  </span>
                </div>
              </div>

              <div style="display: flex; justify-content: space-between; align-items: center;
                           padding: 0.5rem 0.75rem; background: var(--surface-overlay);
                           border: 1px solid var(--border-subtle); border-radius: var(--radius-md);">
                <span class="t-label-sm" style="color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em;">
                  Margem de Segurança
                </span>
                <span class="font-mono-data" style="font-size: 13px; font-weight: 700; color: var(--brand-indigo);">
                  {{ getDistanciaBreakEven(card) }}
                </span>
              </div>

              <!-- Prêmio com ajuste -->
              <div style="display: flex; flex-direction: column; gap: 0.25rem; padding: 0.625rem 0.75rem;
                           background: var(--brand-indigo-light); border: 1px solid var(--brand-indigo-muted);
                           border-radius: var(--radius-md);">
                <span class="t-label-sm" style="color: var(--brand-indigo); text-transform: uppercase;
                                                 letter-spacing: 0.1em; text-align: center;">Prêmio</span>
                <div style="display: flex; align-items: center; justify-content: space-between;">
                  <button @click="ajustarPremio(card, -0.01)"
                          style="width: 1.75rem; height: 1.75rem; display: flex; align-items: center;
                                 justify-content: center; border-radius: var(--radius-sm);
                                 background: var(--surface-base); border: 1px solid var(--brand-indigo-muted);
                                 color: var(--brand-indigo); cursor: pointer; font-size: 1rem; font-weight: 700;">−</button>
                  <span class="font-mono-data" style="font-size: 1.5rem; font-weight: 700; color: var(--brand-indigo);">
                    {{ formatMoney(card.api.premioAtual).replace('R$', '') }}
                  </span>
                  <button @click="ajustarPremio(card, 0.01)"
                          style="width: 1.75rem; height: 1.75rem; display: flex; align-items: center;
                                 justify-content: center; border-radius: var(--radius-sm);
                                 background: var(--surface-base); border: 1px solid var(--brand-indigo-muted);
                                 color: var(--brand-indigo); cursor: pointer; font-size: 1rem; font-weight: 700;">+</button>
                </div>
              </div>

              <!-- Lucro % -->
              <div style="display: flex; justify-content: space-between; align-items: center;
                           padding: 0.625rem 0.75rem; background: var(--brand-emerald-light);
                           border: 1px solid var(--brand-emerald-muted); border-radius: var(--radius-md);">
                <span class="t-label-sm" style="color: var(--brand-emerald); text-transform: uppercase; font-weight: 700;">Lucro %</span>
                <span class="font-mono-data" style="font-size: 1.125rem; font-weight: 700; color: var(--brand-emerald); line-height: 1;">
                  {{ formatPct(calcLucroPct(card)) }}
                </span>
              </div>
            </div>
          </div>

          <!-- Footer do card -->
          <div style="padding: 1rem; background: var(--surface-overlay);
                      border-top: 1px solid var(--border-subtle); display: flex; flex-direction: column; gap: 1rem;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
              <span class="t-label-sm" style="color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em;">Lotes (100+)</span>
              <div style="display: flex; align-items: center; background: var(--surface-base);
                           border-radius: var(--radius-md); border: 1px solid var(--border-default);
                           padding: 0.25rem; box-shadow: var(--shadow-sm);">
                <button @click="ajustarQtd(card, -100)"
                        style="width: 1.75rem; height: 1.75rem; display: flex; align-items: center; justify-content: center;
                               color: var(--text-muted); cursor: pointer; border: none; background: transparent;
                               font-size: 1.25rem; font-weight: 700; border-radius: var(--radius-sm);"
                        onmouseover="this.style.color='var(--brand-indigo)'"
                        onmouseout="this.style.color='var(--text-muted)'">−</button>
                <input v-model.number="card.qtd" type="number"
                       style="width: 4rem; text-align: center; font-family: 'JetBrains Mono', monospace;
                              font-size: 14px; font-weight: 700; color: var(--text-primary); outline: none;
                              background: transparent; border: none; line-height: 1;">
                <button @click="ajustarQtd(card, 100)"
                        style="width: 1.75rem; height: 1.75rem; display: flex; align-items: center; justify-content: center;
                               color: var(--text-muted); cursor: pointer; border: none; background: transparent;
                               font-size: 1.25rem; font-weight: 700; border-radius: var(--radius-sm);"
                        onmouseover="this.style.color='var(--brand-indigo)'"
                        onmouseout="this.style.color='var(--text-muted)'">+</button>
              </div>
            </div>

            <div style="display: flex; flex-direction: column; gap: 0.5rem;
                         border-top: 1px solid var(--border-subtle); padding-top: 1rem;">
              <div style="display: flex; justify-content: space-between; align-items: center;">
                <span class="t-label-sm" style="color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em;">Notional</span>
                <span class="font-mono-data" style="font-size: 14px; font-weight: 700; color: var(--text-secondary);">
                  {{ card.api.isValid ? formatMoney(calcNotional(card)) : 'R$ 0,00' }}
                </span>
              </div>
              <div style="display: flex; justify-content: space-between; align-items: center;">
                <span class="t-label-sm" style="color: var(--brand-emerald); text-transform: uppercase;
                                                 letter-spacing: 0.1em; font-weight: 700;">Crédito</span>
                <span class="font-mono-data" style="font-size: 1.5rem; font-weight: 700; color: var(--brand-emerald); line-height: 1;">
                  {{ card.api.isValid ? formatMoney(calcPremioTotal(card)) : 'R$ 0,00' }}
                </span>
              </div>
            </div>
          </div>

        </div>
      </div>

      <!-- ══ BASKET AGREGADO ══ -->
      <div v-if="agregadoBasket"
           class="premium-card"
           style="padding: 1rem 1.5rem; display: flex; flex-wrap: wrap; align-items: center;
                  justify-content: space-between; gap: 1.5rem; margin-top: -0.5rem;
                  position: relative; overflow: hidden; z-index: 20;">
        <div style="position: absolute; left: -2.5rem; top: -2.5rem; width: 8rem; height: 8rem;
                    background: var(--brand-indigo-light); border-radius: 50%; filter: blur(30px);
                    opacity: 0.6; pointer-events: none;"></div>

        <div style="display: flex; flex-wrap: wrap; align-items: center; gap: 1.5rem; position: relative; z-index: 1;">
          <div style="display: flex; align-items: center; gap: 0.5rem; padding-right: 0.5rem;">
            <div style="width: 2rem; height: 2rem; background: var(--brand-indigo-light); border-radius: var(--radius-md);
                         display: flex; align-items: center; justify-content: center; border: 1px solid var(--brand-indigo-muted);">
              <i data-lucide="calculator" style="width: 1rem; height: 1rem; color: var(--brand-indigo);"></i>
            </div>
            <div>
              <span class="t-label-sm" style="color: var(--text-primary); text-transform: uppercase;
                                               letter-spacing: 0.12em; display: block;">Cesta</span>
              <span style="font-size: 8px; font-weight: 700; color: var(--text-muted); text-transform: uppercase;">
                {{ agregadoBasket.qtdCards }} opções
              </span>
            </div>
          </div>

          <div style="width: 1px; height: 2rem; background: var(--border-subtle);"></div>

          <div v-for="(item, i) in basketItems" :key="i" style="display: flex; align-items: center; gap: 1.5rem;">
            <div>
              <span style="display: block; font-size: 8px; font-weight: 700; color: var(--text-muted);
                            text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 0.125rem;">
                {{ item.label }}
              </span>
              <div style="display: flex; align-items: baseline; gap: 0.375rem;">
                <span class="font-mono-data" style="font-size: 14px; font-weight: 700; color: var(--text-primary);"
                      :style="item.color ? `color: ${item.color}` : ''">
                  {{ item.value }}
                </span>
                <span v-if="item.sub" class="font-mono-data"
                      style="font-size: 12px; font-weight: 600; color: var(--text-muted);">{{ item.sub }}</span>
              </div>
            </div>
            <div style="width: 1px; height: 2rem; background: var(--border-subtle);"></div>
          </div>
        </div>

        <div style="position: relative; z-index: 1; flex-shrink: 0;">
          <button @click="processarComparacao"
                  style="padding: 0.875rem 2rem; background: var(--surface-base); color: var(--text-secondary);
                         border: 1px solid var(--border-default); border-radius: var(--radius-lg);
                         font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.25em;
                         cursor: pointer; display: flex; align-items: center; gap: 0.75rem;
                         transition: all 0.3s; box-shadow: var(--shadow-sm);"
                  onmouseover="this.style.color='var(--brand-indigo)'; this.style.borderColor='var(--brand-indigo-muted)'; this.style.background='var(--brand-indigo-light)'; this.style.boxShadow='var(--shadow-md)'"
                  onmouseout="this.style.color='var(--text-secondary)'; this.style.borderColor='var(--border-default)'; this.style.background='var(--surface-base)'; this.style.boxShadow='var(--shadow-sm)'">
            Iniciar Batalha
          </button>
        </div>
      </div>
    </div>

    <!-- ══ RESULTADOS ══ -->
    <div v-if="mostrarResultados"
         style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
                gap: 2rem; padding-bottom: 8rem; margin-top: 1rem;">

      <!-- Rentabilidade -->
      <div class="premium-card"
           style="padding: 2.5rem; border-color: var(--brand-emerald-muted);
                  background: var(--surface-base); position: relative; overflow: hidden;">
        <div style="position: absolute; right: -1.5rem; top: -1.5rem; font-size: 6rem; font-weight: 800;
                    font-style: italic; color: var(--brand-emerald); opacity: 0.06;
                    pointer-events: none; font-family: 'Syne', sans-serif; line-height: 1;">ROC</div>
        <span style="padding: 0.375rem 1rem; background: var(--brand-emerald-light); color: var(--brand-emerald);
                      border-radius: var(--radius-md); font-size: 9px; font-weight: 700; text-transform: uppercase;
                      letter-spacing: 0.12em; margin-bottom: 1.5rem; display: inline-block;
                      border: 1px solid var(--brand-emerald-muted);">
          Eficiência Financeira
        </span>
        <div style="display: flex; align-items: baseline; gap: 1rem; margin-bottom: 0.5rem;">
          <h3 class="font-mono-data" style="font-size: 3rem; font-weight: 700; color: var(--text-primary); letter-spacing: -0.04em;">
            {{ rankingRentabilidade.ticker }}
          </h3>
          <span class="font-mono-data" style="font-size: 1.25rem; font-weight: 700; color: var(--brand-emerald);">
            {{ formatPct(rankingRentabilidade.anualizado) }} a.a.
          </span>
        </div>
        <p class="t-label-sm" style="color: var(--brand-emerald); opacity: 0.7; text-transform: uppercase;
                                     letter-spacing: 0.25em; margin-bottom: 2rem;">
          Onde seu dinheiro rende mais por dia
        </p>
        <div style="background: var(--surface-overlay); border-radius: var(--radius-lg); padding: 2rem;
                     border: 1px solid var(--brand-emerald-muted);">
          <h4 class="t-label" style="color: var(--text-primary); text-transform: uppercase; margin-bottom: 1rem;
                                     text-decoration: underline; text-underline-offset: 4px;">Veredito de Alocação</h4>
          <p class="t-body" style="color: var(--text-secondary); line-height: 1.7;">
            Esta é a opção vencedora para quem busca <strong style="color: var(--text-primary);">renda mensal pura</strong>.
            O sistema calculou que ela devolve <strong style="color: var(--text-primary);">{{ formatMoney(rankingRentabilidade.premioPorMil) }}</strong>
            de prêmio para cada R$ 1.000,00 em garantia. É o cavalo mais rápido para gerar caixa.

      <!-- Segurança -->
      <div class="premium-card"
           style="padding: 2.5rem; border-color: var(--brand-indigo-muted);
                  background: var(--surface-base); position: relative; overflow: hidden;">
        <div style="position: absolute; right: -1.5rem; top: -1.5rem; font-size: 6rem; font-weight: 800;
                    font-style: italic; color: var(--brand-indigo); opacity: 0.06;
                    pointer-events: none; font-family: 'Syne', sans-serif; line-height: 1;">SAFE</div>
        <span style="padding: 0.375rem 1rem; background: var(--brand-indigo-light); color: var(--brand-indigo);
                      border-radius: var(--radius-md); font-size: 9px; font-weight: 700; text-transform: uppercase;
                      letter-spacing: 0.12em; margin-bottom: 1.5rem; display: inline-block;
                      border: 1px solid var(--brand-indigo-muted);">
          Proteção Patrimonial
        </span>
        <div style="display: flex; align-items: baseline; gap: 1rem; margin-bottom: 0.5rem;">
          <h3 class="font-mono-data" style="font-size: 3rem; font-weight: 700; color: var(--text-primary); letter-spacing: -0.04em;">
            {{ rankingSeguranca.ticker }}
          </h3>
          <span class="font-mono-data" style="font-size: 1.25rem; font-weight: 700; color: var(--brand-indigo);">
            {{ formatPct(rankingSeguranca.margemQueda) }} de folga
          </span>
        </div>
        <p class="t-label-sm" style="color: var(--brand-indigo); opacity: 0.7; text-transform: uppercase;
                                     letter-spacing: 0.25em; margin-bottom: 2rem;">
          Menor risco de ser exercido
        </p>
        <div style="background: var(--surface-overlay); border-radius: var(--radius-lg); padding: 2rem;
                     border: 1px solid var(--brand-indigo-muted);">
          <h4 class="t-label" style="color: var(--text-primary); text-transform: uppercase; margin-bottom: 1rem;
                                     text-decoration: underline; text-underline-offset: 4px;">Veredito de Risco</h4>
          <p class="t-body" style="color: var(--text-secondary); line-height: 1.7;">
            No cenário simulado de <strong style="color: var(--text-primary);">{{ simulacaoQueda }}% de queda</strong>,
            esta PUT provou ser a mais resiliente. O ativo precisaria cair mais do que
            <strong style="color: var(--text-primary);">{{ formatPct(rankingSeguranca.margemQueda) }}</strong>
            <em>além</em> do cenário simulado para o exercício ocorrer. Break-even em
            <strong style="color: var(--text-primary);">{{ formatMoney(rankingSeguranca.breakeven) }}</strong>.
          </p>
        </div>
      </div>

    </div>
  </div>
</template>

<style>
  .comp-card:hover .comp-delete-btn { opacity: 1 !important; }
  /* hover via JS onmouseover nos cards individuais */
  div:hover > .comp-delete-btn { opacity: 1 !important; }

  @keyframes comp-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  @keyframes comp-spin  { to { transform: rotate(360deg); } }
</style>

<script>
window.ComparativoView = {
  template: '#comparativo-view-template',
  props: ['isMobile', 'isLoading'],
  data() {
    return {
      cardCounter: 2,
      cards: [],
      simulacaoQueda: 0,
      ordenarPor: 'padrao',
      mostrarResultados: false,
      rankingRentabilidade: {},
      rankingSeguranca: {}
    };
  },

  computed: {
    agregadoBasket() {
      const validos = this.cards.filter(c => c.api.isValid);
      if (validos.length < 2) return null;
      let somaPremio = 0, somaLucro = 0, somaLotes = 0, somaNotional = 0, somaCredito = 0;
      validos.forEach(c => {
        somaPremio   += parseFloat(c.api.premioAtual || 0);
        somaLucro    += this.calcLucroPct(c);
        somaLotes    += parseInt(c.qtd || 0);
        somaNotional += this.calcNotional(c);
        somaCredito  += this.calcPremioTotal(c);
      });
      const n = validos.length;
      return { qtdCards: n, somaPremioUnitario: somaPremio, mediaPremioUnitario: somaPremio / n,
               mediaLucroPct: somaLucro / n, somaLotes, somaNotional, somaCredito, mediaCredito: somaCredito / n };
    },

    // Items do basket para v-for no template (evita repetição de HTML)
    basketItems() {
      if (!this.agregadoBasket) return [];
      const b = this.agregadoBasket;
      return [
        { label: 'Lotes (Soma)',    value: b.somaLotes },
        { label: 'Prêmio Unit.',    value: this.formatMoney(b.somaPremioUnitario),
          sub: 'méd: ' + this.formatMoney(b.mediaPremioUnitario) },
        { label: 'Lucro (Média)',   value: this.formatPct(b.mediaLucroPct), color: 'var(--brand-emerald)' },
        { label: 'Notional (Soma)', value: this.formatMoney(b.somaNotional) },
        { label: 'Crédito Recebido', value: this.formatMoney(b.somaCredito), color: 'var(--brand-emerald)',
          sub: 'méd: ' + this.formatMoney(b.mediaCredito) }
      ];
    }
  },

  created() { this.carregarCache(); },

  watch: {
    cards: {
      handler() {
        this.salvarCache();
        this.$nextTick(() => { if (window.lucide) lucide.createIcons(); });
      },
      deep: true
    }
  },

  methods: {
    // Border style como função — sem classes Tailwind hardcoded com cores
    getCardBorderStyle(card) {
      if (!this.mostrarResultados)
        return 'background: var(--surface-base); border: 1px solid var(--border-default);';
      const isRent = this.rankingRentabilidade.id === card.id;
      const isSafe = this.rankingSeguranca.id === card.id;
      if (isRent && isSafe) return 'background: var(--surface-base); border: 2px solid var(--brand-emerald); box-shadow: 0 0 0 4px var(--brand-emerald-muted);';
      if (isRent)           return 'background: var(--surface-base); border: 2px solid var(--brand-emerald);';
      if (isSafe)           return 'background: var(--surface-base); border: 2px solid var(--brand-indigo);';
      return 'background: var(--surface-base); border: 1px solid var(--border-default);';
    },

    limparArena() {
      localStorage.removeItem('arena_put_cache');
      this.cards = [this.criarCardVazio(1), this.criarCardVazio(2)];
      this.cardCounter = 2; this.mostrarResultados = false;
      this.simulacaoQueda = 0; this.ordenarPor = 'padrao';
      this.$nextTick(() => lucide.createIcons());
    },
    salvarCache() {
      localStorage.setItem('arena_put_cache', JSON.stringify(
        { cards: this.cards, cardCounter: this.cardCounter, simulacaoQueda: this.simulacaoQueda }
      ));
    },
    carregarCache() {
      const cache = localStorage.getItem('arena_put_cache');
      if (cache) {
        const p = JSON.parse(cache);
        this.cards = p.cards; this.cardCounter = p.cardCounter; this.simulacaoQueda = p.simulacaoQueda || 0;
        if (this.cards.some(c => c.api.isValid)) this.processarComparacao();
      } else {
        this.cards = [this.criarCardVazio(1), this.criarCardVazio(2)];
      }
      this.$nextTick(() => lucide.createIcons());
    },
    criarCardVazio(id) {
      return { id, ticker: '', qtd: 100, loading: false, error: '',
               api: { spotPrice: 0, strike: 0, premioAtual: 0, dte: 0, trades: 0, isValid: false } };
    },
    adicionarCard() {
      this.cardCounter++;
      this.cards.push(this.criarCardVazio(this.cardCounter));
      this.mostrarResultados = false; this.ordenarPor = 'padrao';
      this.$nextTick(() => {
        lucide.createIcons();
        const c = this.$el.querySelector('[style*="overflow-x: auto"]');
        if (c) c.scrollTo({ left: c.scrollWidth, behavior: 'smooth' });
      });
    },
    removerCard(id) {
      if (this.cards.length > 2) {
        this.cards = this.cards.filter(c => c.id !== id);
        this.mostrarResultados = false;
        this.$nextTick(() => lucide.createIcons());
      }
    },
    ordenarArena() {
      if (this.ordenarPor === 'padrao') { this.cards.sort((a, b) => a.id - b.id); return; }
      this.cards.sort((a, b) => {
        if (a.api.isValid && !b.api.isValid) return -1;
        if (!a.api.isValid && b.api.isValid) return 1;
        if (this.ordenarPor === 'lucro')     return this.calcLucroPct(b) - this.calcLucroPct(a);
        if (this.ordenarPor === 'seguranca') return this.getDistanciaNumerica(b) - this.getDistanciaNumerica(a);
        if (this.ordenarPor === 'premio')    return (b.api.premioAtual || 0) - (a.api.premioAtual || 0);
        return 0;
      });
    },
    ajustarPremio(card, delta) {
      card.api.premioAtual = Math.max(0.01, parseFloat((parseFloat(card.api.premioAtual || 0) + delta).toFixed(2)));
      this.mostrarResultados = false;
    },
    ajustarQtd(card, valor) { card.qtd = Math.max(100, card.qtd + valor); this.mostrarResultados = false; },
    buscarDadosAPI(card) {
      if (!card.ticker || card.ticker.length < 4) return;
      card.loading = true; card.error = ''; card.api.isValid = false; this.mostrarResultados = false;
      google.script.run
        .withSuccessHandler((res) => {
          card.loading = false;
          if (res && res.success) {
            card.api = { ...res.data, isValid: true };
            this.ordenarArena();
          } else {
            card.error = (res && res.error) || 'Ativo não encontrado.';
          }
          this.$nextTick(() => lucide.createIcons());
        })
        .withFailureHandler((err) => {
          card.loading = false;
          card.error = String(err.message || err);
          this.$nextTick(() => lucide.createIcons());
        })
        .apiIntegracaoOpLab(card.ticker);
    },
    calcPremioTotal(c)   { return (c.api.premioAtual || 0) * (c.qtd || 0); },
    calcNotional(c)      { return (c.api.strike || 0) * (c.qtd || 0); },
    calcLucroPct(c)      { return c.api.strike ? (c.api.premioAtual / c.api.strike) * 100 : 0; },
    formatMoney(val)     { return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(val || 0); },
    formatPct(val)       { return (val || 0).toFixed(2).replace('.', ',') + '%'; },
    getDistanciaNumerica(c) {
      if (!c.api.strike) return -999;
      const be = c.api.strike - c.api.premioAtual;
      return ((c.api.spotPrice - be) / c.api.spotPrice) * 100;
    },
    getDistanciaBreakEven(c) {
      const d = this.getDistanciaNumerica(c);
      return d === -999 ? '---' : (d > 0 ? `+${d.toFixed(1)}%` : `${d.toFixed(1)}% risco`);
    },
    processarComparacao() {
      const v = this.cards.filter(c => c.api.isValid && c.api.premioAtual > 0);
      if (v.length < 2) return;
      const analise = v.map(c => {
        const premioTotal   = this.calcPremioTotal(c);
        const notional      = this.calcNotional(c);
        const rocBruto      = (premioTotal / notional) * 100;
        const anualizado    = c.api.dte > 0 ? (rocBruto / c.api.dte) * 252 : rocBruto;
        const breakeven     = c.api.strike - c.api.premioAtual;
        const premioPorMil  = (premioTotal / notional) * 1000;
        const spotSimulado  = c.api.spotPrice * (1 - this.simulacaoQueda / 100);
        const margemQueda   = spotSimulado > 0 ? ((spotSimulado - breakeven) / spotSimulado) * 100 : 0;
        return { id: c.id, ticker: c.ticker.toUpperCase(), rocBruto, anualizado, breakeven, margemQueda, premioPorMil, dte: c.api.dte, spot: spotSimulado };
      });
      this.rankingRentabilidade = [...analise].sort((a, b) => b.anualizado - a.anualizado)[0];
      this.rankingSeguranca     = [...analise].sort((a, b) => b.margemQueda - a.margemQueda)[0];
      this.mostrarResultados = true;
      if (this.ordenarPor === 'padrao') { this.ordenarPor = 'lucro'; this.ordenarArena(); }
      this.$nextTick(() => lucide.createIcons());
    }
  }
};
</script>
