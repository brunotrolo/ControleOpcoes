<template id="gestao-ativos-sidebar-template">
  <transition name="gasidebar-slide">
    <div v-if="isOpen"
         style="position: fixed; right: 0; top: 0; height: 100%; width: 100%; max-width: 640px;
                background: var(--surface-overlay); border-left: 1px solid var(--border-default);
                box-shadow: -40px 0 80px rgba(0,0,0,0.12); z-index: 10000;
                display: flex; flex-direction: column; font-family: 'DM Sans', sans-serif;">

      <!-- ══ HEADER ══ -->
      <div style="padding: 2rem 2.5rem; border-bottom: 1px solid var(--border-subtle);
                  background: var(--surface-base); display: flex; justify-content: space-between;
                  align-items: center; flex-shrink: 0; box-shadow: var(--shadow-sm); position: relative; z-index: 10;">

        <div style="display: flex; align-items: center; gap: 1.25rem;">
          <div style="width: 4rem; height: 4rem; background: var(--surface-base);
                      border-radius: var(--radius-lg); display: flex; align-items: center;
                      justify-content: center; box-shadow: var(--shadow-md);
                      border: 1px solid var(--border-subtle);">
            <span style="font-family: 'Syne', sans-serif; font-size: 1.25rem; font-weight: 800;
                         color: var(--brand-indigo); letter-spacing: -0.04em;">
              {{ ativo.tickerAtivo || 'N/A' }}
            </span>
          </div>
          <div>
            <h3 style="font-family: 'Syne', sans-serif; font-size: 1.75rem; font-weight: 800;
                       color: var(--text-primary); line-height: 1; letter-spacing: -0.03em;">Dossiê Preditivo</h3>
            <p class="t-label-sm" style="color: var(--text-muted); text-transform: uppercase;
                                         letter-spacing: 0.2em; margin-top: 0.5rem;">
              {{ ativo.nomeEmpresa || '---' }} • {{ ativo.setor || 'N/A' }}
            </p>
          </div>
        </div>

        <div style="display: flex; flex-direction: column; align-items: flex-end; gap: 0.75rem;">
          <button @click="$emit('close')"
                  style="padding: 0.625rem; background: var(--surface-overlay); border: 1px solid var(--border-default);
                         border-radius: var(--radius-full); color: var(--text-muted); cursor: pointer;"
                  onmouseover="this.style.background='var(--surface-sunken)'; this.style.color='var(--text-primary)'"
                  onmouseout="this.style.background='var(--surface-overlay)'; this.style.color='var(--text-muted)'">
            <i data-lucide="x" style="width: 1.25rem; height: 1.25rem;"></i>
          </button>
          <div style="text-align: right;" title="Preço atual da ação no mercado.">
            <span style="display: block; font-size: 9px; font-weight: 700; color: var(--text-muted);
                         text-transform: uppercase; letter-spacing: 0.16em;
                         text-decoration: underline; text-decoration-style: dotted; text-underline-offset: 4px;">
              Spot Atual
            </span>
            <span class="font-mono-data" style="font-size: 1.25rem; font-weight: 700; color: var(--text-primary);">
              {{ Tradutor.formatarMoeda(ativo.spotPrice) }}
            </span>
          </div>
        </div>
      </div>

      <!-- ══ CORPO (scrollável) ══ -->
      <div style="flex: 1; overflow-y: auto; padding: 2.5rem; display: flex; flex-direction: column; gap: 2rem;
                  background: var(--surface-overlay);">

        <!-- Veredito IA -->
        <section style="position: relative; background: var(--surface-base); border-radius: var(--radius-xl);
                         padding: 2rem; box-shadow: var(--shadow-sm); border: 1px solid var(--brand-indigo-muted);
                         overflow: hidden;">
          <div style="position: absolute; right: -2.5rem; top: -2.5rem; width: 10rem; height: 10rem;
                      background: var(--brand-indigo-light); border-radius: 50%; filter: blur(40px); opacity: 0.6;
                      pointer-events: none;"></div>
          <div style="position: relative; z-index: 1;">
            <div style="display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.25rem;">
              <div style="padding: 0.5rem; background: var(--brand-indigo-light); border-radius: var(--radius-md);
                           border: 1px solid var(--brand-indigo-muted); color: var(--brand-indigo);">
                <i data-lucide="brain-circuit" style="width: 1.25rem; height: 1.25rem;"></i>
              </div>
              <h4 class="t-label" style="color: var(--text-primary); text-transform: uppercase; letter-spacing: 0.2em;">
                Veredito da IA ({{ dias }}d)
              </h4>
            </div>
            <p class="t-body" style="color: var(--text-secondary); border-left: 4px solid var(--brand-indigo);
                                     padding-left: 1.25rem; line-height: 1.7;">
              <strong style="color: var(--text-primary);">Direção Projetada:</strong>
              {{ gerarSinteseIA(ativo, dias) }}
            </p>
          </div>
        </section>

        <!-- Score + Fundamentalista (2 colunas) -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">

          <!-- Score de Confluência -->
          <section style="background: var(--surface-base); border-radius: var(--radius-xl); padding: 2rem;
                           box-shadow: var(--shadow-sm); border: 1px solid var(--border-default);
                           display: flex; flex-direction: column; align-items: center; text-align: center;">
            <div style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1.5rem;"
                 title="Nota de 0 a 10. Acima de 7 = Forte tendência de Alta. Abaixo de 4 = Forte tendência de Queda.">
              <i data-lucide="target" style="width: 1rem; height: 1rem; color: var(--brand-indigo);"></i>
              <h4 class="t-label-sm" style="color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.2em;
                                            text-decoration: underline; text-decoration-style: dotted; text-underline-offset: 4px;">
                Score de Confluência
              </h4>
            </div>
            <span class="font-mono-data"
                  style="font-size: 3.5rem; font-weight: 700; letter-spacing: -0.05em; line-height: 1; margin-bottom: 0.5rem;"
                  :style="getScoreStyle(ativo.score)">
              {{ ativo.score ? parseFloat(ativo.score).toFixed(2) : '0.00' }}
            </span>
            <div style="width: 100%; background: var(--surface-overlay); padding: 0.75rem;
                         border-radius: var(--radius-lg); border: 1px solid var(--border-subtle); margin-top: 1.5rem;"
                 title="O que está influenciando mais o preço agora.">
              <span class="t-label-sm" style="color: var(--brand-indigo); text-transform: uppercase; letter-spacing: 0.16em;">
                {{ ativo.fatorDominante || 'Aguardando' }}
              </span>
              <span style="display: block; font-size: 9px; font-weight: 700; color: var(--text-muted);
                            text-transform: uppercase; margin-top: 0.375rem;
                            text-decoration: underline; text-decoration-style: dotted; text-underline-offset: 4px;">
                Força Principal
              </span>
            </div>
          </section>

          <!-- Análise Fundamentalista -->
          <section style="background: var(--surface-base); border-radius: var(--radius-xl); padding: 2rem;
                           box-shadow: var(--shadow-sm); border: 1px solid var(--border-default);
                           display: flex; flex-direction: column; justify-content: space-between;">
            <div style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1.5rem;"
                 title="O valor real da empresa baseado no patrimônio e nos lucros que ela gera.">
              <i data-lucide="landmark" style="width: 1rem; height: 1rem; color: var(--brand-emerald);"></i>
              <h4 class="t-label-sm" style="color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.2em;
                                            text-decoration: underline; text-decoration-style: dotted; text-underline-offset: 4px;">
                Análise Fundamentalista
              </h4>
            </div>
            <div style="display: flex; flex-direction: column; gap: 1.5rem; flex: 1; justify-content: center;">
              <div title="O preço máximo que esta ação deveria custar. Abaixo disso está barata.">
                <span style="display: block; font-size: 10px; font-weight: 700; color: var(--text-muted);
                              text-transform: uppercase; margin-bottom: 0.5rem;
                              text-decoration: underline; text-decoration-style: dotted; text-underline-offset: 4px;">
                  Preço Justo (Graham)
                </span>
                <span class="font-mono-data" style="font-size: 2rem; font-weight: 700; color: var(--text-primary);
                                                     letter-spacing: -0.04em;">
                  {{ Tradutor.formatarMoeda(ativo.graham || 0) }}
                </span>
              </div>
              <div style="padding: 0.75rem; border-radius: var(--radius-lg); display: flex;
                           align-items: center; justify-content: space-between;"
                   :style="getMargemSeguranca(ativo) >= 0
                     ? 'background: var(--brand-emerald-light); border: 1px solid var(--brand-emerald-muted);'
                     : 'background: var(--brand-rose-light);    border: 1px solid var(--brand-rose-muted);'"
                   title="Potencial de lucro (%) se a ação subir ao Preço Justo.">
                <div>
                  <span style="display: block; font-size: 9px; font-weight: 700; color: var(--text-muted);
                                text-transform: uppercase; text-decoration: underline;
                                text-decoration-style: dotted; text-underline-offset: 4px;">Potencial (Upside)</span>
                  <span class="font-mono-data" style="font-size: 1.25rem; font-weight: 700; margin-top: 0.25rem; display: block;"
                        :style="getMargemSeguranca(ativo) >= 0 ? 'color: var(--brand-emerald)' : 'color: var(--brand-rose)'">
                    {{ getMargemSeguranca(ativo) > 0 ? '+' : '' }}{{ getMargemSeguranca(ativo).toFixed(1) }}%
                  </span>
                </div>
                <div style="width: 2.5rem; height: 2.5rem; background: var(--surface-base); border-radius: 50%;
                             display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-sm);"
                     :style="getMargemSeguranca(ativo) >= 0
                       ? 'border: 1px solid var(--brand-emerald-muted); color: var(--brand-emerald);'
                       : 'border: 1px solid var(--brand-rose-muted);    color: var(--brand-rose);'">
                  <i :data-lucide="getMargemSeguranca(ativo) >= 0 ? 'trending-up' : 'trending-down'"
                     style="width: 1.25rem; height: 1.25rem;"></i>
                </div>
              </div>
            </div>
          </section>
        </div>

        <!-- Range Estatístico -->
        <section style="background: var(--surface-base); border-radius: var(--radius-xl); padding: 2rem;
                         box-shadow: var(--shadow-sm); border: 1px solid var(--border-default);">
          <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 2.5rem;">
            <div title="A 'zona segura' onde a matemática diz que o preço deve ficar nos próximos dias.">
              <div style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.25rem;">
                <i data-lucide="activity" style="width: 1rem; height: 1rem; color: var(--brand-indigo);"></i>
                <h4 class="t-label-sm" style="color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.2em;
                                              text-decoration: underline; text-decoration-style: dotted; text-underline-offset: 4px;">
                  Range de Operação ({{ dias }} dias)
                </h4>
              </div>
              <span style="font-family: 'Syne', sans-serif; font-size: 1.25rem; font-weight: 800;
                            color: var(--text-primary); letter-spacing: -0.02em;">Limites Estatísticos</span>
            </div>
            <span style="padding: 0.375rem 1rem; background: var(--brand-indigo-light); color: var(--brand-indigo);
                          font-size: 10px; font-weight: 700; border-radius: var(--radius-md);
                          border: 1px solid var(--brand-indigo-muted); text-transform: uppercase; letter-spacing: 0.16em;"
                  title="Grau de certeza matemática do cálculo.">
              Probabilidade: 68%
            </span>
          </div>

          <!-- Barra de range -->
          <div style="position: relative; padding-top: 2rem; padding-bottom: 4rem;">
            <div style="height: 1.5rem; width: 100%; background: var(--surface-sunken);
                         border-radius: var(--radius-full); position: relative;
                         border: 1px solid var(--border-subtle);">
              <!-- Zona de range -->
              <div style="position: absolute; inset-y: 0; left: 10%; right: 10%;
                           background: var(--brand-indigo-muted); border-radius: var(--radius-full);
                           border: 1px solid var(--brand-indigo-light);"></div>

              <!-- Bolinha de spot -->
              <div :style="{ left: getSpotPos(ativo) + '%' }"
                   style="position: absolute; top: 50%; transform: translate(-50%, -50%);
                           display: flex; flex-direction: column; align-items: center; z-index: 20;
                           transition: left 1s ease-out;"
                   class="gasidebar-spot-group">
                <div style="width: 1px; height: 2.5rem; background: var(--text-primary);
                             border-radius: 2px; position: absolute; top: -0.5rem;"></div>
                <div style="width: 1.25rem; height: 1.25rem; background: var(--surface-base);
                             border: 3px solid var(--text-primary); border-radius: 50%;
                             box-shadow: var(--shadow-md); position: relative; z-index: 1; cursor: crosshair;
                             transition: transform 0.2s;"
                     onmouseover="this.style.transform='scale(1.3)'"
                     onmouseout="this.style.transform='scale(1)'">
                </div>
                <div class="gasidebar-spot-tooltip"
                     style="position: absolute; top: 2.25rem; background: var(--text-primary); color: var(--surface-base);
                             font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700;
                             padding: 0.375rem 0.75rem; border-radius: var(--radius-md);
                             box-shadow: var(--shadow-lg); white-space: nowrap; z-index: 30;
                             opacity: 0; transition: opacity 0.2s; pointer-events: none;">
                  SPOT: {{ Tradutor.formatarMoeda(ativo.spotPrice) }}
                </div>
              </div>
            </div>

            <!-- Labels de piso e teto -->
            <div style="position: absolute; top: 5rem; left: 0; text-align: left;"
                 title="O valor mínimo projetado.">
              <span style="display: block; font-size: 10px; font-weight: 700; color: var(--text-muted);
                            text-transform: uppercase; letter-spacing: 0.16em; margin-bottom: 0.375rem;
                            text-decoration: underline; text-decoration-style: dotted; text-underline-offset: 4px;">
                Piso Mínimo
              </span>
              <span class="font-mono-data" style="font-size: 1.1rem; font-weight: 700; color: var(--brand-rose);
                                                   background: var(--brand-rose-light); padding: 0.25rem 0.75rem;
                                                   border-radius: var(--radius-md); border: 1px solid var(--brand-rose-muted);">
                {{ Tradutor.formatarMoeda(ativo.spotMin) }}
              </span>
            </div>
            <div style="position: absolute; top: 5rem; right: 0; text-align: right;"
                 title="O valor máximo projetado.">
              <span style="display: block; font-size: 10px; font-weight: 700; color: var(--text-muted);
                            text-transform: uppercase; letter-spacing: 0.16em; margin-bottom: 0.375rem;
                            text-decoration: underline; text-decoration-style: dotted; text-underline-offset: 4px;">
                Teto Máximo
              </span>
              <span class="font-mono-data" style="font-size: 1.1rem; font-weight: 700; color: var(--brand-emerald);
                                                   background: var(--brand-emerald-light); padding: 0.25rem 0.75rem;
                                                   border-radius: var(--radius-md); border: 1px solid var(--brand-emerald-muted);">
                {{ Tradutor.formatarMoeda(ativo.spotMax) }}
              </span>
            </div>
          </div>

          <!-- Vetor Direcional -->
          <div style="margin-top: 1rem; border-top: 1px solid var(--border-subtle); padding-top: 2rem;">
            <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 0.75rem;">
              <span style="font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase;
                            letter-spacing: 0.16em; text-decoration: underline;
                            text-decoration-style: dotted; text-underline-offset: 4px;"
                    title="A chance matemática de terminar os dias em alta ou em baixa.">Vetor Direcional</span>
              <div style="display: flex; gap: 1rem; font-family: 'JetBrains Mono', monospace;
                           font-size: 12px; font-weight: 700; text-transform: uppercase;">
                <span style="color: var(--brand-emerald);">Alta: {{ (parseFloat(ativo.probAlta || 0) * 100).toFixed(0) }}%</span>
                <span style="color: var(--brand-rose);">Baixa: {{ (parseFloat(ativo.probBaixa || 0) * 100).toFixed(0) }}%</span>
              </div>
            </div>
            <div style="height: 0.75rem; width: 100%; background: var(--surface-sunken);
                         border-radius: var(--radius-full); overflow: hidden; display: flex;">
              <div style="height: 100%; background: var(--brand-emerald); transition: width 1s ease;"
                   :style="{ width: (parseFloat(ativo.probAlta || 0) * 100) + '%' }"></div>
              <div style="height: 100%; background: var(--brand-rose); transition: width 1s ease;"
                   :style="{ width: (parseFloat(ativo.probBaixa || 0) * 100) + '%' }"></div>
            </div>
          </div>
        </section>

      </div>

      <!-- ══ FOOTER ══ -->
      <div style="padding: 1.5rem 2.5rem; border-top: 1px solid var(--border-subtle);
                  background: var(--surface-base); flex-shrink: 0;">
        <button @click="$emit('close')"
                style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 0.75rem;
                       background: var(--surface-base); color: var(--text-secondary);
                       border: 1px solid var(--border-default); border-radius: var(--radius-lg);
                       height: 3.5rem; font-size: 13px; font-weight: 700; letter-spacing: 0.05em;
                       cursor: pointer; transition: all 0.2s;"
                onmouseover="this.style.background='var(--brand-indigo-light)'; this.style.color='var(--brand-indigo)'; this.style.borderColor='var(--brand-indigo-muted)'"
                onmouseout="this.style.background='var(--surface-base)'; this.style.color='var(--text-secondary)'; this.style.borderColor='var(--border-default)'">
          <i data-lucide="check-circle-2" style="width: 1.5rem; height: 1.5rem;"></i>
          <span>Finalizar Leitura Preditiva</span>
        </button>
      </div>

    </div>
  </transition>
</template>

<style>
  .gasidebar-slide-enter-active,
  .gasidebar-slide-leave-active { transition: transform 0.35s cubic-bezier(0.4,0,0.2,1); }
  .gasidebar-slide-enter-from,
  .gasidebar-slide-leave-to     { transform: translateX(100%); }

  .gasidebar-spot-group:hover .gasidebar-spot-tooltip { opacity: 1 !important; }
</style>

<script>
window.GestaoAtivosSidebar = {
  template: '#gestao-ativos-sidebar-template',
  props: {
    isOpen: Boolean,
    ativo:  { type: Object, default: () => ({}) },
    dias:   Number
  },
  data() { return { Tradutor: window.Tradutor }; },

  methods: {
    getSpotPos(a) {
      const min = parseFloat(a.spotMin) || 0;
      const max = parseFloat(a.spotMax) || 0;
      const cur = parseFloat(a.spotPrice) || 0;
      if (max - min <= 0 || cur === 0) return 50;
      return Math.min(Math.max(((cur - min) / (max - min)) * 100, 0), 100);
    },

    getMargemSeguranca(a) {
      return (parseFloat(a.margemSeguranca) || 0) * 100;
    },

    getScoreStyle(s) {
      const score = parseFloat(s) || 0;
      if (score >= 7) return 'color: var(--brand-emerald);';
      if (score >= 5) return 'color: var(--brand-amber);';
      return 'color: var(--brand-rose);';
    },

    gerarSinteseIA(ativo, dias) {
      if (!ativo || ativo.score === undefined)
        return 'Sincronizando dados com o servidor preditivo...';

      const score    = parseFloat(ativo.score);
      const probAlta = (parseFloat(ativo.probAlta) || 0) * 100;
      const margem   = this.getMargemSeguranca(ativo);
      const fator    = ativo.fatorDominante || 'Desconhecido';

      let analise = `Análise projetada para ${dias} dias: `;

      if      (score >= 7)   analise += 'O ativo exibe forte tendência de ALTA. ';
      else if (score >= 5)   analise += 'Viés LIGEIRAMENTE POSITIVO, mas exige cautela. ';
      else if (score <= 3.5) analise += 'ALERTA: Risco elevado de queda severa. ';
      else                   analise += 'Trajetória INDEFINIDA (Lateralização Provável). ';

      analise += `A força propulsora principal identificada é a [${fator}]. `;

      if (margem > 10)
        analise += `Note que a margem de segurança de ${margem.toFixed(1)}% reforça a atratividade do ativo frente ao valor intrínseco de Graham.`;
      else if (margem < -5)
        analise += 'Atenção: Ativo negociado acima do Preço Justo de Graham. Possível distorção de mercado.';
      else
        analise += `Matematicamente, a chance do preço fechar acima de ${this.Tradutor.formatarMoeda(ativo.spotPrice)} é de ${probAlta.toFixed(0)}%.`;

      return analise;
    }
  },

  updated() {
    if (this.isOpen && typeof lucide !== 'undefined')
      this.$nextTick(() => lucide.createIcons());
  }
};
</script>
