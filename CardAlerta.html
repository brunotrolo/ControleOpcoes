<template id="card-alerta-template">
  <div style="display:flex;flex-direction:column;gap:0;width:100%;border-radius:var(--radius-xl);overflow:hidden;border:1px solid var(--border-subtle);box-shadow:var(--shadow-sm);background:var(--surface-base);">

    <!-- ── CABEÇALHO ── -->
    <div style="display:flex;align-items:center;justify-content:space-between;padding:1rem 1.5rem;border-bottom:1px solid var(--border-subtle);background:var(--surface-base);">
      <span style="font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:0.15em;color:var(--text-muted);">Alertas</span>
      <div style="display:flex;gap:0.5rem;align-items:center;">
        <span v-if="alertasCriticos > 0"
          style="font-size:0.8rem;font-weight:700;padding:3px 10px;border-radius:99px;background:var(--brand-rose-light);color:var(--brand-rose);border:1px solid var(--brand-rose-muted);">
          {{ alertasCriticos }} CRÍTICO
        </span>
        <span v-if="alertasAtencao > 0"
          style="font-size:0.8rem;font-weight:700;padding:3px 10px;border-radius:99px;background:var(--brand-amber-light);color:var(--brand-amber);border:1px solid var(--brand-amber-muted);">
          {{ alertasAtencao }} ATENÇÃO
        </span>
      </div>
    </div>

    <!-- ── SKELETON ── -->
    <div v-if="isLoading" style="padding:1rem;display:flex;flex-direction:column;gap:0.75rem;">
      <div v-for="n in 3" :key="n"
        style="height:120px;background:var(--surface-overlay);border-radius:var(--radius-xl);animation:alerta-pulse 1.5s ease infinite;"></div>
    </div>

    <!-- ── VAZIO ── -->
    <div v-else-if="operacoesOrdenadas.length === 0"
      style="padding:4rem;text-align:center;color:var(--text-muted);">
      <div style="font-size:2.5rem;margin-bottom:0.75rem;opacity:0.4;">📭</div>
      <p style="font-size:0.85rem;font-weight:700;text-transform:uppercase;letter-spacing:0.15em;">Nenhuma posição ativa</p>
    </div>

    <!-- ── GRUPOS COLAPSÁVEIS ── -->
    <div v-else style="display:flex;flex-direction:column;">
      <div v-for="(grupo, gi) in gruposOrdenados" :key="gi">

        <!-- Header do grupo — colapsável -->
        <div
          @click="toggleGrupo(gi)"
          style="display:flex;justify-content:space-between;align-items:center;padding:1.25rem 1.5rem;cursor:pointer;position:sticky;top:0;z-index:10;backdrop-filter:blur(12px);border-bottom:1px solid var(--border-subtle);"
          :style="grupo.urgente ? 'background:var(--brand-rose-light);' : 'background:var(--surface-base);'"
        >
          <!-- Esquerda: seta + label + contagem -->
          <div style="display:flex;align-items:center;gap:0.875rem;">
            <span
              style="font-size:0.75rem;transition:transform 0.2s;"
              :style="[gruposAbertos[gi] !== false ? 'transform:rotate(90deg);' : '', grupo.urgente ? 'color:var(--brand-rose);' : 'color:var(--brand-indigo);']">▶</span>
            <div style="display:flex;flex-direction:column;gap:3px;">
              <span style="font-size:1rem;font-weight:800;text-transform:uppercase;letter-spacing:0.06em;"
                :style="grupo.urgente ? 'color:var(--brand-rose);' : 'color:var(--text-primary);'">
                {{ grupo.label }}
              </span>
              <span style="font-size:0.8rem;font-weight:600;padding:2px 8px;border-radius:var(--radius-sm);background:var(--surface-overlay);color:var(--text-muted);width:fit-content;">
                {{ grupo.ops.length }} posições
              </span>
            </div>
          </div>

          <!-- Direita: subtotal P/L + nocional -->
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px;">
            <span class="font-mono-data" style="font-size:1.25rem;font-weight:700;letter-spacing:-0.03em;"
              :style="subtotalPL(grupo.ops) >= 0 ? 'color:var(--brand-emerald);' : 'color:var(--brand-rose);'">
              {{ fmtCurrency(subtotalPL(grupo.ops)) }}
            </span>
            <span class="font-mono-data" style="font-size:0.85rem;font-weight:600;color:var(--text-muted);">
              Noc. {{ fmtCurrencyK(subtotalNocional(grupo.ops)) }}
            </span>
          </div>
        </div>

        <!-- Cards das posições -->
        <div v-if="gruposAbertos[gi] !== false"
          style="background:var(--surface-sunken);padding:0.75rem 1rem 1rem;display:flex;flex-direction:column;gap:0.75rem;">

          <div v-for="op in grupo.ops" :key="op.simboloOpcao"
            :style="getSeverityBg(op)"
            style="border-radius:var(--radius-xl);border:1px solid var(--border-subtle);box-shadow:var(--shadow-sm);overflow:hidden;">

            <!-- Barra lateral colorida + conteúdo -->
            <div style="display:grid;grid-template-columns:5px 1fr;height:100%;">
              <div :style="getSeverityBar(op)" style="width:5px;min-height:100%;"></div>

              <div style="padding:1.25rem 1.125rem;display:flex;flex-direction:column;gap:0.875rem;">

                <!-- Topo: ticker + % lucro garantido -->
                <div style="display:flex;justify-content:space-between;align-items:flex-start;">
                  <!-- Esquerda: ticker, badge, símbolo + DTE/Venc/Qtd -->
                  <div style="display:flex;flex-direction:column;gap:6px;">
                    <div style="display:flex;align-items:center;gap:0.625rem;flex-wrap:wrap;">
                      <span style="font-size:1.75rem;font-weight:800;color:var(--text-primary);letter-spacing:-0.04em;">{{ op.tickerAtivo }}</span>
                      <span :style="getMoneynessStyle(op.moneynessCode)"
                        style="font-size:0.9rem;font-weight:700;padding:3px 10px;border-radius:99px;border:1.5px solid;">
                        {{ op.moneynessCode || '—' }}
                      </span>
                    </div>
                    <!-- Símbolo da opção -->
                    <span class="font-mono-data" style="font-size:0.9rem;font-weight:700;color:var(--text-muted);letter-spacing:0.06em;text-transform:uppercase;">
                      {{ op.simboloOpcao }}
                    </span>
                    <!-- Linha de metadados configurável -->
                    <div style="display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;margin-top:2px;">
                      <template v-for="(meta, mi) in configMetaAtivos" :key="meta.key">
                        <span v-if="mi > 0" style="color:var(--border-strong);font-size:0.75rem;">·</span>
                        <span class="font-mono-data" style="font-size:0.9rem;font-weight:600;color:var(--text-muted);">
                          <span v-if="meta.prefix" style="color:var(--text-muted);">{{ meta.prefix }} </span>{{ formatDetalhe(meta.key, op) }}<span v-if="meta.suffix"> {{ meta.suffix }}</span>
                        </span>
                      </template>
                    </div>
                  </div>

                  <!-- Direita: % lucro garantido + PL_VALUE -->
                  <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
                    <span class="font-mono-data"
                      :style="op.lucroPct >= 90 ? 'color:var(--brand-emerald);' : op.lucroPct >= 75 ? 'color:var(--brand-amber);' : op.lucroPct >= 0 ? 'color:var(--text-secondary);' : 'color:var(--brand-rose);'"
                      style="font-size:2.25rem;font-weight:700;line-height:1;letter-spacing:-0.04em;">
                      {{ op.lucroPct !== null ? op.lucroPct.toFixed(1) + '%' : '—' }}
                    </span>
                    <span style="font-size:0.75rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.1em;">lucro garantido</span>
                    <div style="display:flex;align-items:baseline;gap:0.375rem;margin-top:2px;">
                      <span style="font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);">PL atual</span>
                      <span class="font-mono-data"
                        :style="parseFloat(op.plTotalValor || op.PL_VALUE || 0) >= 0 ? 'color:var(--brand-emerald);' : 'color:var(--brand-rose);'"
                        style="font-size:1.1rem;font-weight:700;">
                        {{ fmtCurrency(parseFloat(op.plTotalValor || op.PL_VALUE || 0)) }}
                      </span>
                    </div>
                  </div>
                </div>

                <!-- Grade de métricas configuráveis -->
                <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:0.625rem;padding-top:0.75rem;border-top:2px solid var(--surface-sunken);">
                  <div v-for="campo in camposDetalhesAtivos" :key="campo.key"
                    style="display:flex;flex-direction:column;gap:3px;">
                    <span style="font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);">{{ campo.label }}</span>
                    <span class="font-mono-data" style="font-size:1rem;font-weight:700;color:var(--text-secondary);">{{ formatDetalhe(campo.key, op) }}</span>
                  </div>
                </div>

              </div>
            </div>

          </div>
        </div>

      </div>
    </div>

    <!-- ── RODAPÉ STATUS ── -->
    <div v-if="!isLoading && operacoesOrdenadas.length > 0"
      style="padding:0.875rem 1.5rem;border-top:2px solid var(--border-default);display:flex;align-items:center;gap:0.625rem;background:var(--surface-base);">
      <div v-if="temLucroAlto" style="display:flex;align-items:center;gap:0.5rem;">
        <div style="width:8px;height:8px;border-radius:50%;background:var(--brand-emerald);flex-shrink:0;"></div>
        <span style="font-size:1rem;font-weight:700;color:var(--brand-emerald);">
          {{ posicoes90pct.length > 0
            ? posicoes90pct.length + ' posição(ões) acima de 90% — RECOMPRAR AGORA'
            : posicoes75pct.length + ' posição(ões) acima de 75% — ATENÇÃO' }}
        </span>
      </div>
      <div v-else style="display:flex;align-items:center;gap:0.5rem;">
        <div style="width:8px;height:8px;border-radius:50%;background:var(--brand-amber);flex-shrink:0;"></div>
        <span style="font-size:1rem;color:var(--text-muted);">Nenhuma posição atingiu 75% de lucro garantido</span>
      </div>
    </div>

    <!-- ── ANÁLISE ── -->
    <div style="padding:1.25rem 1.5rem;border-top:1px solid var(--border-subtle);background:var(--surface-base);">
      <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.875rem;">
        <div style="width:7px;height:7px;border-radius:50%;background:var(--brand-indigo);flex-shrink:0;"></div>
        <span style="font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:0.15em;color:var(--text-muted);">Análise do portfólio</span>
      </div>
      <p style="font-size:1rem;line-height:1.9;color:var(--text-secondary);margin:0;" v-html="analiseHtml"></p>
    </div>

  </div>
</template>

<style>
  @keyframes alerta-pulse { 0%,100% { opacity:1; } 50% { opacity:0.45; } }
  .alerta-hl-rose    { color:var(--brand-rose);   font-weight:700; }
  .alerta-hl-amber   { color:var(--brand-amber);  font-weight:700; }
  .alerta-hl-emerald { color:var(--brand-emerald);font-weight:700; }
  .alerta-hl-indigo  { color:var(--brand-indigo); font-weight:700; }
</style>

<script>
window.CardAlerta = {
  template: '#card-alerta-template',

  props: {
    statsPreCalculados: { type: Object,  default: () => ({}) },
    isMobile:           { type: Boolean, default: false },
    isLoading:          { type: Boolean, default: false },

    configKpis: {
      type: Array,
      default: () => [
        { key: 'nocional',          label: 'Nocional',      active: true,  order: 1,  type: 'currency'   },
        { key: 'plTotalValor',      label: 'P&L Sessão',    active: true,  order: 2,  type: 'currency'   },
        { key: 'ganhoMaximo',       label: 'Ganho Máx.',    active: true,  order: 3,  type: 'currency'   },
        { key: 'premioMedio',       label: 'Prêmio Médio',  active: true,  order: 4,  type: 'currency'   },
        { key: 'premioAtual',       label: 'Prêmio Atual',  active: true,  order: 5,  type: 'currency'   },
        { key: 'plTotalPct',        label: 'Rentabilidade', active: true,  order: 6,  type: 'percentage' },
        { key: 'totalOps',          label: 'Operações',     active: false, order: 7,  type: 'number'     },
        { key: 'perdaMaxima',       label: 'Risco Máx.',    active: false, order: 8,  type: 'currency'   },
        { key: 'potencialLucroPct', label: 'Pot. Lucro',    active: false, order: 9,  type: 'percentage' },
        { key: 'delta',             label: 'Delta Net',     active: false, order: 10, type: 'number'     },
        { key: 'gamma',             label: 'Gamma Net',     active: false, order: 11, type: 'number'     },
        { key: 'vega',              label: 'Vega Net',      active: false, order: 12, type: 'number'     },
        { key: 'theta',             label: 'Theta Diário',  active: false, order: 13, type: 'currency'   },
        { key: 'rho',               label: 'Rho',           active: false, order: 14, type: 'number'     },
      ]
    },

    configDetalhes: {
      type: Array,
      default: () => [

        // --- 1. Primeira Linha ---
        { key: 'strike',            label: 'Strike',     active: true,  order: 1,  type: 'currency'   },
        { key: 'spotPrice',         label: 'Spot',       active: true,  order: 2,  type: 'currency'   },
        { key: 'distanciaR$',       label: 'Dist. R$',   active: true,  order: 3,  type: 'distancia_r'   },
        { key: 'distanciaPct',      label: 'Dist. %',    active: true,  order: 4,  type: 'distancia_pct' },

        // --- 2. Segunda Linha ---
        { key: 'premioMedio',       label: 'PM',         active: true,  order: 5,  type: 'currency'   },
        { key: 'premioAtual',       label: 'PA',         active: true,  order: 6,  type: 'currency'   },
        { key: 'ganhoMaximo',       label: 'Ganho Máx.', active: true,  order: 7,  type: 'currency'   },
        { key: 'potencialLucroPct', label: 'Pot. Lucro', active: true,  order: 8,  type: 'percentage' },

        // --- 3. Backlog ---
        { key: 'plTotalPct',        label: 'Rentab.',    active: false, order: 7,  type: 'percentage' },
        { key: 'breakEven',         label: 'Break-Even', active: false, order: 7,  type: 'currency'   },
        { key: 'dteCorridos',       label: 'DTE',        active: false, order: 3,  type: 'numero'     },
        { key: 'nocional',          label: 'Noc.',       active: false, order: 4,  type: 'currency'   },
        { key: 'tradeId',           label: 'Trade',      active: false, order: 10, type: 'texto'      },
        { key: 'estrategiaId',      label: 'Estratégia', active: false, order: 11, type: 'texto'      },
        { key: 'status',            label: 'Status',     active: false, order: 12, type: 'texto'      },
        { key: 'dataTrade',         label: 'Abertura',   active: false, order: 20, type: 'texto'      },
        { key: 'dataVencimento',    label: 'Vencimento', active: false, order: 22, type: 'texto'      },
        { key: 'dteUteis',          label: 'DTE úteis',  active: false, order: 25, type: 'numero'     },
        { key: 'simboloOpcao',      label: 'Ticker Op.', active: false, order: 30, type: 'texto'      },
        { key: 'tickerAtivo',       label: 'Ativo',      active: false, order: 31, type: 'texto'      },
        { key: 'nomeEmpresa',       label: 'Empresa',    active: false, order: 32, type: 'texto'      },
        { key: 'setor',             label: 'Setor',      active: false, order: 33, type: 'texto'      },
        { key: 'direcaoTrade',      label: 'Direção',    active: false, order: 34, type: 'texto'      },
        { key: 'tipoOpcao',         label: 'Tipo',       active: false, order: 35, type: 'texto'      },
        { key: 'quantidade',        label: 'Qtd',        active: false, order: 36, type: 'numero'     },
        { key: 'moneynessCode',     label: 'Moneyness',  active: false, order: 40, type: 'texto'      },
        { key: 'perdaMaxima',       label: 'Risco Máx.', active: false, order: 45, type: 'currency'   },
        { key: 'plTotalValor',      label: 'P/L',        active: false, order: 48, type: 'currency'   },
        { key: 'ivAtual',           label: 'IV',         active: false, order: 60, type: 'percentage' },
        { key: 'ivRank',            label: 'IV Rank',    active: false, order: 61, type: 'percentage' },
        { key: 'variacao',          label: 'Variação',   active: false, order: 62, type: 'percentage' },
        { key: 'moneynessRatio',    label: 'Moneyness%', active: false, order: 63, type: 'percentage' },
        { key: 'volatilidadeImpl',  label: 'Vol. Impl.', active: false, order: 65, type: 'percentage' },
        { key: 'poe',               label: 'POE',        active: false, order: 66, type: 'percentage' },
        { key: 'delta',             label: 'Delta',      active: false, order: 70, type: 'number'     },
        { key: 'gamma',             label: 'Gamma',      active: false, order: 71, type: 'number'     },
        { key: 'vega',              label: 'Vega',       active: false, order: 72, type: 'number'     },
        { key: 'theta',             label: 'Theta',      active: false, order: 73, type: 'currency'   },
        { key: 'rho',               label: 'Rho',        active: false, order: 74, type: 'number'     },
        { key: 'directionFlag',     label: 'Dir. Flag',  active: false, order: 80, type: 'texto'      },
        { key: 'controlFlag',       label: 'Ctrl. Flag', active: false, order: 81, type: 'texto'      },
      ]
    },

    configMeta: {
      type: Array,
      default: () => [
        // --- Ativos por padrão ---
        { key: 'dteCorridos',       label: 'DTE',        active: true,  order: 1,  suffix: null,  prefix: null    },
        { key: 'dataVencimento',    label: 'Vencimento', active: true,  order: 2,  suffix: null,  prefix: null    },
        { key: 'quantidade',        label: 'Qtd',        active: true,  order: 3,  suffix: ' qtd', prefix: null    },
        { key: 'nocional',          label: 'Noc.',       active: true,  order: 4,  suffix: null,  prefix: 'Noc. '  },
        { key: 'breakEven',         label: 'Break-Even', active: true,  order: 5,  suffix: null,  prefix: 'Break-E. '    },

        // --- Backlog ---
        { key: 'strike',            label: 'Strike',     active: false, order: 5,  suffix: null,  prefix: 'K'     },
        { key: 'spotPrice',         label: 'Spot',       active: false, order: 6,  suffix: null,  prefix: 'Spot'  },
        { key: 'dteUteis',          label: 'DTE úteis',  active: false, order: 7,  suffix: 'du',  prefix: null    },
        { key: 'premioMedio',       label: 'PM',         active: false, order: 8,  suffix: null,  prefix: 'PM'    },
        { key: 'premioAtual',       label: 'PA',         active: false, order: 9,  suffix: null,  prefix: 'PA'    },
        { key: 'ganhoMaximo',       label: 'Ganho Máx.', active: false, order: 10, suffix: null,  prefix: 'Máx.'  },
        { key: 'potencialLucroPct', label: 'Pot. Lucro', active: false, order: 11, suffix: null,  prefix: 'Pot.'  },
        { key: 'distanciaR$',       label: 'Dist. R$',   active: false, order: 12, suffix: null,  prefix: 'Dist.' },
        { key: 'distanciaPct',      label: 'Dist. %',    active: false, order: 13, suffix: null,  prefix: 'Dist.' },
        { key: 'plTotalPct',        label: 'Rentab.',    active: false, order: 14, suffix: null,  prefix: 'P/L'   },
        { key: 'plTotalValor',      label: 'P/L R$',     active: false, order: 15, suffix: null,  prefix: 'P/L'   },
        { key: 'perdaMaxima',       label: 'Risco Máx.', active: false, order: 17, suffix: null,  prefix: 'Risco' },
        { key: 'moneynessCode',     label: 'Moneyness',  active: false, order: 18, suffix: null,  prefix: null    },
        { key: 'moneynessRatio',    label: 'Moneyness%', active: false, order: 19, suffix: null,  prefix: null    },
        { key: 'poe',               label: 'POE',        active: false, order: 20, suffix: null,  prefix: 'POE'   },
        { key: 'volatilidadeImpl',  label: 'Vol. Impl.', active: false, order: 21, suffix: null,  prefix: 'IV'    },
        { key: 'ivAtual',           label: 'IV',         active: false, order: 22, suffix: null,  prefix: 'IV'    },
        { key: 'ivRank',            label: 'IV Rank',    active: false, order: 23, suffix: null,  prefix: 'IVR'   },
        { key: 'variacao',          label: 'Variação',   active: false, order: 24, suffix: null,  prefix: 'Var.'  },
        { key: 'delta',             label: 'Delta',      active: false, order: 25, suffix: null,  prefix: 'Δ'     },
        { key: 'gamma',             label: 'Gamma',      active: false, order: 26, suffix: null,  prefix: 'Γ'     },
        { key: 'vega',              label: 'Vega',       active: false, order: 27, suffix: null,  prefix: 'V'     },
        { key: 'theta',             label: 'Theta',      active: false, order: 28, suffix: null,  prefix: 'Θ'     },
        { key: 'rho',               label: 'Rho',        active: false, order: 29, suffix: null,  prefix: 'ρ'     },
        { key: 'dataTrade',         label: 'Abertura',   active: false, order: 30, suffix: null,  prefix: null    },
        { key: 'estrategiaId',      label: 'Estratégia', active: false, order: 31, suffix: null,  prefix: null    },
        { key: 'tradeId',           label: 'Trade ID',   active: false, order: 32, suffix: null,  prefix: '#'     },
        { key: 'direcaoTrade',      label: 'Direção',    active: false, order: 33, suffix: null,  prefix: null    },
        { key: 'tipoOpcao',         label: 'Tipo',       active: false, order: 34, suffix: null,  prefix: null    },
        { key: 'nomeEmpresa',       label: 'Empresa',    active: false, order: 35, suffix: null,  prefix: null    },
        { key: 'setor',             label: 'Setor',      active: false, order: 36, suffix: null,  prefix: null    },
        { key: 'directionFlag',     label: 'Dir. Flag',  active: false, order: 37, suffix: null,  prefix: null    },
        { key: 'controlFlag',       label: 'Ctrl. Flag', active: false, order: 38, suffix: null,  prefix: null    },
      ]
    },

    dteUrgente: { type: Number, default: 14 },
  },

  data() {
    return { gruposAbertos: {} };
  },

  computed: {
    operacoes() {
      // lucroPct, distanciaR$ e distanciaPct já vêm calculados pelo Agregador._enriquecerDados
      return (this.statsPreCalculados?.listaAtivas || []);
    },

    operacoesOrdenadas() {
      return [...this.operacoes].sort((a, b) => {
        const dteA = parseFloat(a.dteCorridos || a.DTE_CALENDAR || 999);
        const dteB = parseFloat(b.dteCorridos || b.DTE_CALENDAR || 999);
        if (dteA !== dteB) return dteA - dteB;
        return (a.lucroPct ?? -9999) - (b.lucroPct ?? -9999);
      });
    },

    gruposOrdenados() {
      const urgente = this.operacoesOrdenadas.filter(op =>
        parseFloat(op.dteCorridos || op.DTE_CALENDAR || 999) <= this.dteUrgente);
      const normal  = this.operacoesOrdenadas.filter(op =>
        parseFloat(op.dteCorridos || op.DTE_CALENDAR || 999) > this.dteUrgente);
      const grupos = [];
      if (urgente.length) grupos.push({ label: `Vencimento ≤${this.dteUrgente}d — Iminente`, urgente: true,  ops: urgente });
      if (normal.length)  grupos.push({ label: `Monitorando`,                                  urgente: false, ops: normal  });
      return grupos;
    },

    totalAtivas()     { return this.operacoes.length; },
    alertasCriticos() {
      return this.operacoes.filter(op =>
        (op.lucroPct ?? 0) < -100 ||
        (parseFloat(op.dteCorridos || 999) <= this.dteUrgente &&
         String(op.moneynessCode || '').toUpperCase().includes('ITM'))
      ).length;
    },
    alertasAtencao()  { return this.operacoes.filter(op => (op.lucroPct ?? 0) >= 75 && (op.lucroPct ?? 0) < 90).length; },
    posicoes90pct()   { return this.operacoes.filter(op => (op.lucroPct ?? 0) >= 90); },
    posicoes75pct()   { return this.operacoes.filter(op => (op.lucroPct ?? 0) >= 75 && (op.lucroPct ?? 0) < 90); },
    temLucroAlto()    { return this.posicoes90pct.length > 0 || this.posicoes75pct.length > 0; },

    kpisAtivos() {
      return [...this.configKpis]
        .filter(k => k.active)
        .sort((a, b) => a.order - b.order)
        .map(k => ({
          ...k,
          colorFn: (k.key === 'plTotalValor' || k.key === 'plTotalPct')
            ? (v) => parseFloat(v) >= 0 ? 'color:var(--brand-emerald);' : 'color:var(--brand-rose);'
            : null
        }));
    },

    camposDetalhesAtivos() {
      return [...this.configDetalhes].filter(c => c.active).sort((a, b) => a.order - b.order);
    },

    configMetaAtivos() {
      return [...this.configMeta].filter(c => c.active).sort((a, b) => a.order - b.order);
    },

    resumoGlobal() { return this.statsPreCalculados?.resumoGlobal || {}; },

    analiseHtml() {
      const ops  = this.operacoes;
      const rg   = this.resumoGlobal;
      const hl   = (txt, cor) => `<span class="alerta-hl-${cor}">${txt}</span>`;

      if (!ops.length) return 'Nenhuma posição ativa no momento. Atualize os dados para visualizar o portfólio.';

      const total    = ops.length;
      const pl       = parseFloat(rg.plTotalValor || 0);
      const negativas= ops.filter(o => (o.lucroPct ?? 0) < 0).length;
      const itmOps   = ops.filter(o => String(o.moneynessCode || '').toUpperCase().includes('ITM'));
      const urgentes = ops.filter(o => parseFloat(o.dteCorridos || o.DTE_CALENDAR || 999) <= this.dteUrgente);
      const alto90   = this.posicoes90pct;
      const alto75   = this.posicoes75pct;

      const tickersUrgentesItm = [...new Set(
        urgentes.filter(o => String(o.moneynessCode || '').toUpperCase().includes('ITM'))
                .map(o => o.tickerAtivo)
      )];

      let partes = [];

      if (pl < 0) {
        const pctNeg = Math.round(negativas / total * 100);
        partes.push(
          `Portfólio com resultado ${hl('negativo de R$' + Math.abs(pl).toLocaleString('pt-BR', {minimumFractionDigits:2}), 'rose')}. ` +
          `${hl(negativas + ' de ' + total + ' posições', 'rose')} estão em prejuízo (${pctNeg}%).`
        );
      } else {
        partes.push(`Portfólio com resultado ${hl('positivo de R$' + pl.toLocaleString('pt-BR', {minimumFractionDigits:2}), 'emerald')}.`);
      }

      if (urgentes.length > 0) {
        let trecho = `${hl(urgentes.length + ' posição(ões)', 'rose')} vencem em até ${hl(this.dteUrgente + ' dias', 'rose')}`;
        if (tickersUrgentesItm.length > 0) {
          const spotEx = urgentes.find(o => String(o.moneynessCode || '').toUpperCase().includes('ITM'));
          const strikes = urgentes
            .filter(o => o.tickerAtivo === tickersUrgentesItm[0] && String(o.moneynessCode || '').toUpperCase().includes('ITM'))
            .map(o => `R$${parseFloat(o.strike || 0).toFixed(2)}`).join(', ');
          trecho += ` — ${hl(tickersUrgentesItm.join(', '), 'rose')} ${hl('ITM', 'rose')}: risco de exercício iminente`;
          if (spotEx) {
            trecho += ` (spot ${hl('R$' + parseFloat(spotEx.spotPrice || spotEx.SPOT || 0).toFixed(2), 'rose')} × strikes ${hl(strikes, 'amber')})`;
          }
        }
        partes.push(trecho + '.');
      }

      if (alto90.length > 0) {
        const nomes = alto90.map(o => o.simboloOpcao).join(', ');
        partes.push(
          `${hl(alto90.length + ' posição(ões)', 'emerald')} acima de ${hl('90% de lucro garantido', 'emerald')} (${hl(nomes, 'emerald')}) — ` +
          `${hl('considere recomprar agora', 'emerald')} para garantir o resultado.`
        );
      } else if (alto75.length > 0) {
        const nomes = alto75.map(o => o.simboloOpcao).join(', ');
        partes.push(
          `${hl(alto75.length + ' posição(ões)', 'amber')} entre ${hl('75% e 90% de lucro', 'amber')} (${hl(nomes, 'amber')}) — mantenha em alerta para recompra.`
        );
      } else {
        partes.push(`Nenhuma posição atingiu o limiar de lucro para recompra ${hl('(75%)', 'amber')}.`);
      }

      const itmNaoUrgentes = itmOps.filter(o => parseFloat(o.dteCorridos || o.DTE_CALENDAR || 999) > this.dteUrgente);
      if (itmNaoUrgentes.length > 0) {
        const tickers = [...new Set(itmNaoUrgentes.map(o => o.tickerAtivo))].join(', ');
        partes.push(
          `${hl(itmNaoUrgentes.length + ' posição(ões) ITM', 'amber')} com vencimento mais longo (${hl(tickers, 'amber')}) — monitore a evolução do spot antes de agir.`
        );
      }

      return partes.join(' ');
    }
  },

  methods: {
    toggleGrupo(gi) {
      this.gruposAbertos[gi] = this.gruposAbertos[gi] === false ? true : false;
    },

    subtotalPL(ops) {
      return ops.reduce((s, o) => s + parseFloat(o.plTotalValor || o.PL_VALUE || 0), 0);
    },

    subtotalNocional(ops) {
      return ops.reduce((s, o) => s + parseFloat(o.nocional || 0), 0);
    },

    fmtCurrency(n) {
      if (n === null || n === undefined) return '—';
      const abs = Math.abs(n);
      const prefix = n < 0 ? '-R$' : 'R$';
      if (abs >= 1000000) return prefix + (abs / 1000000).toFixed(1) + 'M';
      if (abs >= 1000)    return prefix + (abs / 1000).toFixed(1) + 'k';
      return prefix + abs.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    },

    fmtCurrencyK(n) {
      if (!n) return '—';
      const abs = Math.abs(n);
      const prefix = n < 0 ? '-R$' : 'R$';
      if (abs >= 1000000) return prefix + (abs / 1000000).toFixed(1) + 'M';
      if (abs >= 1000)    return prefix + (abs / 1000).toFixed(1) + 'k';
      return prefix + Math.round(abs).toLocaleString('pt-BR');
    },

    getKpiValue(key) {
      const rg = this.resumoGlobal;
      if (key === 'nocional')     return rg.nocional     ?? this.operacoes.reduce((s, o) => s + parseFloat(o.nocional || 0), 0);
      if (key === 'plTotalValor') return rg.plTotalValor ?? this.operacoes.reduce((s, o) => s + parseFloat(o.plTotalValor || o.PL_VALUE || 0), 0);
      if (key === 'ganhoMaximo')  return rg.ganhoMaximo  ?? this.operacoes.reduce((s, o) => s + parseFloat(o.ganhoMaximo || o.MAX_GAIN || 0), 0);
      if (key === 'premioMedio')  return rg.premioMedio  ?? null;
      if (key === 'premioAtual')  return rg.premioAtual  ?? null;
      if (key === 'plTotalPct')   return rg.plTotalPct   ?? null;
      if (key === 'totalOps')     return this.totalAtivas;
      return rg[key] ?? null;
    },

    formatKpi(key, val) {
      if (val === null || val === undefined) return '—';
      const n = parseFloat(val);
      if (isNaN(n)) return '—';
      const tipo = this.configKpis.find(k => k.key === key)?.type || 'number';
      if (tipo === 'currency') {
        const abs = Math.abs(n);
        const prefix = n < 0 ? '-R$' : 'R$';
        if (abs >= 1000000) return prefix + (abs / 1000000).toFixed(1) + 'M';
        if (abs >= 1000)    return prefix + (abs / 1000).toFixed(1) + 'k';
        return prefix + abs.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      }
      if (tipo === 'percentage') return (n * (Math.abs(n) <= 1 ? 100 : 1)).toFixed(1) + '%';
      return n.toLocaleString('pt-BR');
    },

    formatDetalhe(key, op) {
      const aliases = {
        quantidade:       ['quantidade', 'qtdOpcoes', 'QUANTITY'],
        ivAtual:          ['ivAtual', 'IV'],
        ivRank:           ['ivRank', 'ivRank1y', 'IV_RANK'],
        variacao:         ['variacao', 'variation', 'VARIATION'],
        moneynessRatio:   ['moneynessRatio', 'moneyness', 'MONEYNESS_RATIO'],
        volatilidadeImpl: ['volatilidadeImpl', 'ivCalc', 'IV_CALC'],
        poe:              ['poe', 'POE'],
        directionFlag:    ['directionFlag', 'DIRECTION_FLAG'],
        controlFlag:      ['controlFlag', 'CONTROL_FLAG'],
        potencialLucroPct:['potencialLucroPct', 'maxProfitPct', 'MAX_PROFIT_PCT'],
        perdaMaxima:      ['perdaMaxima', 'maxLoss', 'MAX_LOSS'],
        breakEven:        ['breakEven', 'BREAK_EVEN'],
        plTotalValor:     ['plTotalValor', 'plValue', 'PL_VALUE'],
        plTotalPct:       ['plTotalPct', 'plPct', 'PL_PCT'],
        ganhoMaximo:      ['ganhoMaximo', 'maxGain', 'MAX_GAIN'],
        dteUteis:         ['dteUteis', 'DTE'],
        dataVencimento:   ['dataVencimento', 'expiry', 'EXPIRY'],
        dataTrade:        ['dataTrade', 'tradeDate', 'TRADE_DATE'],
        nomeEmpresa:      ['nomeEmpresa', 'COMPANY_NAME'],
        estrategiaId:     ['estrategiaId', 'ID_STRATEGY'],
        tradeId:          ['tradeId', 'ID_TRADE'],
        direcaoTrade:     ['direcaoTrade', 'SIDE'],
        tipoOpcao:        ['tipoOpcao', 'OPTION_TYPE'],
      };

      let raw = op[key];
      if ((raw === null || raw === undefined) && aliases[key]) {
        for (const a of aliases[key]) {
          if (op[a] !== undefined && op[a] !== null) { raw = op[a]; break; }
        }
      }
      if (raw === null || raw === undefined) raw = op[key.toUpperCase()];
      if (raw === null || raw === undefined) return '—';

      const cfg = this.configDetalhes.find(c => c.key === key);
      const tipo = cfg?.type || 'texto';

      if (tipo === 'texto') {
        const s = String(raw);
        const dm = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
        if (dm) return `${dm[3]}/${dm[2]}/${dm[1]}`;
        // Date object stringificado (ex: "Fri Mar 20 2026...")
        const d = new Date(raw);
        if (!isNaN(d.getTime())) return d.toLocaleDateString('pt-BR');
        return s || '—';
      }

      const n = parseFloat(raw);
      if (isNaN(n)) return String(raw);

      if (tipo === 'currency') {
        const abs = Math.abs(n);
        const prefix = n < 0 ? '-R$' : 'R$';
        if (key === 'nocional' || key === 'perdaMaxima' || key === 'ganhoMaximo') {
          if (abs >= 1000) return prefix + (abs / 1000).toFixed(1) + 'k';
          return prefix + Math.round(abs).toLocaleString('pt-BR');
        }
        return prefix + n.toFixed(2);
      }

      if (tipo === 'percentage') {
        const pct = Math.abs(n) <= 1 ? n * 100 : n;
        return pct.toFixed(1) + '%';
      }

      if (tipo === 'numero') {
        if (key === 'dteCorridos' || key === 'dteUteis') return Math.round(n) + 'd';
        return n.toLocaleString('pt-BR');
      }

      if (tipo === 'distancia_r') {
        if (raw === null) return '—';
        return (raw >= 0 ? '+R$' : '-R$') + Math.abs(raw).toFixed(2);
      }

      if (tipo === 'distancia_pct') {
        if (raw === null) return '—';
        return (raw >= 0 ? '+' : '') + raw.toFixed(1) + '%';
      }

      return n.toFixed(4);
    },

    getSeverityBar(op) {
      const lp  = op.lucroPct ?? 0;
      const dte = parseFloat(op.dteCorridos || op.DTE_CALENDAR || 999);
      const itm = String(op.moneynessCode || '').toUpperCase().includes('ITM');
      if (lp >= 90) return 'background:var(--brand-emerald);';
      if (lp >= 75) return 'background:var(--brand-amber);';
      if (dte <= this.dteUrgente && itm) return 'background:var(--brand-rose);';
      if (lp < -100) return 'background:var(--brand-rose);';
      return 'background:var(--border-strong);';
    },

    getSeverityBg(op) {
      const lp  = op.lucroPct ?? 0;
      const dte = parseFloat(op.dteCorridos || op.DTE_CALENDAR || 999);
      const itm = String(op.moneynessCode || '').toUpperCase().includes('ITM');
      if (lp >= 90) return 'background:var(--brand-emerald-light);';
      if (lp >= 75) return 'background:var(--brand-amber-light);';
      if (dte <= this.dteUrgente && itm) return 'background:var(--brand-rose-light);';
      return 'background:var(--surface-base);';
    },

    getMoneynessStyle(code) {
      const c = String(code || '').toUpperCase();
      if (c.includes('ITM')) return 'background:var(--brand-rose-light);color:var(--brand-rose);border-color:var(--brand-rose-muted);';
      if (c.includes('ATM')) return 'background:var(--brand-amber-light);color:var(--brand-amber);border-color:var(--brand-amber-muted);';
      if (c.includes('OTM')) return 'background:var(--brand-emerald-light);color:var(--brand-emerald);border-color:var(--brand-emerald-muted);';
      return 'background:var(--surface-overlay);color:var(--text-muted);border-color:var(--border-default);';
    }
  }
};
</script>
