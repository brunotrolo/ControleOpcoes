<template id="card-alerta-template">
  <div style="display:flex;flex-direction:column;gap:1rem;width:100%;position:relative;z-index:1;">

    <!-- ── KPIs CONFIGURÁVEIS ── -->
    <div class="premium-card" style="overflow:hidden;width:100%;">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:1rem 1.5rem;border-bottom:1px solid var(--border-subtle);">
        <span style="font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:0.15em;color:var(--text-muted);">Resumo do portfólio</span>
        <span style="font-size:0.75rem;color:var(--text-muted);">{{ totalAtivas }} posições ativas</span>
      </div>

      <!-- Skeleton -->
      <div v-if="isLoading" style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:1px;background:var(--border-subtle);">
        <div v-for="n in 3" :key="n" style="background:var(--surface-base);padding:1.25rem 1.5rem;animation:alerta-pulse 1.5s ease infinite;">
          <div style="height:11px;background:var(--surface-overlay);border-radius:4px;width:55%;margin-bottom:10px;"></div>
          <div style="height:26px;background:var(--surface-overlay);border-radius:4px;width:75%;"></div>
        </div>
      </div>

      <!-- Desktop: grid 100% largura, até 10 campos; overflow em carrossel -->
      <div v-else-if="!isMobile">
        <div style="display:grid;gap:1px;background:var(--border-subtle);"
          :style="{ gridTemplateColumns: `repeat(${Math.min(kpisAtivos.length, 10)}, minmax(0, 1fr))` }">
          <div v-for="kpi in kpisAtivos.slice(0, 10)" :key="kpi.key"
            style="background:var(--surface-base);padding:1.5rem 1.75rem;">
            <div style="font-size:0.85rem;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--text-muted);margin-bottom:0.625rem;">{{ kpi.label }}</div>
            <div class="font-mono-data"
              :style="kpi.colorFn ? kpi.colorFn(getKpiValue(kpi.key)) : 'color:var(--text-primary);'"
              style="font-size:2.5rem;font-weight:700;">{{ formatKpi(kpi.key, getKpiValue(kpi.key)) }}</div>
          </div>
        </div>
        <div v-if="kpisAtivos.length > 10"
          style="overflow-x:auto;border-top:1px solid var(--border-subtle);">
          <div style="display:flex;gap:1px;background:var(--border-subtle);width:max-content;">
            <div v-for="kpi in kpisAtivos.slice(10)" :key="kpi.key"
              style="background:var(--surface-base);padding:1.5rem 1.75rem;min-width:180px;flex-shrink:0;">
              <div style="font-size:0.85rem;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--text-muted);margin-bottom:0.625rem;">{{ kpi.label }}</div>
              <div class="font-mono-data"
                :style="kpi.colorFn ? kpi.colorFn(getKpiValue(kpi.key)) : 'color:var(--text-primary);'"
                style="font-size:2.5rem;font-weight:700;">{{ formatKpi(kpi.key, getKpiValue(kpi.key)) }}</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Mobile: 3 fixos + carrossel a partir do 4º -->
      <div v-else style="display:flex;flex-direction:column;">
        <div style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:1px;background:var(--border-subtle);">
          <div v-for="kpi in kpisAtivos.slice(0, 3)" :key="kpi.key"
            style="background:var(--surface-base);padding:1.25rem 0.875rem;">
            <div style="font-size:0.8rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);margin-bottom:0.5rem;">{{ kpi.label }}</div>
            <div class="font-mono-data"
              :style="kpi.colorFn ? kpi.colorFn(getKpiValue(kpi.key)) : 'color:var(--text-primary);'"
              style="font-size:1.6rem;font-weight:700;">{{ formatKpi(kpi.key, getKpiValue(kpi.key)) }}</div>
          </div>
        </div>
        <div v-if="kpisAtivos.length > 3"
          style="overflow-x:auto;border-top:1px solid var(--border-subtle);-webkit-overflow-scrolling:touch;">
          <div style="display:flex;gap:1px;background:var(--border-subtle);width:max-content;">
            <div v-for="kpi in kpisAtivos.slice(3)" :key="kpi.key"
              style="background:var(--surface-base);padding:1.25rem 0.875rem;min-width:120px;">
              <div style="font-size:0.8rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);margin-bottom:0.5rem;">{{ kpi.label }}</div>
              <div class="font-mono-data"
                :style="kpi.colorFn ? kpi.colorFn(getKpiValue(kpi.key)) : 'color:var(--text-primary);'"
                style="font-size:1.6rem;font-weight:700;">{{ formatKpi(kpi.key, getKpiValue(kpi.key)) }}</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- ── LISTA DE ALERTAS ── -->
    <div class="premium-card" style="overflow:hidden;width:100%;">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:1rem 1.5rem;border-bottom:1px solid var(--border-subtle);">
        <span style="font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:0.15em;color:var(--text-muted);">Alertas — ordenado por urgência</span>
        <div style="display:flex;gap:0.5rem;">
          <span v-if="alertasCriticos > 0"
            style="font-size:0.85rem;font-weight:700;padding:4px 12px;border-radius:99px;background:var(--brand-rose-light);color:var(--brand-rose);border:1px solid var(--brand-rose-muted);">
            {{ alertasCriticos }} CRÍTICO
          </span>
          <span v-if="alertasAtencao > 0"
            style="font-size:0.85rem;font-weight:700;padding:4px 12px;border-radius:99px;background:var(--brand-amber-light);color:var(--brand-amber);border:1px solid var(--brand-amber-muted);">
            {{ alertasAtencao }} ATENÇÃO
          </span>
        </div>
      </div>

      <div v-if="isLoading" style="padding:0.75rem 1rem;display:flex;flex-direction:column;gap:0.5rem;">
        <div v-for="n in 4" :key="n"
          style="height:76px;background:var(--surface-overlay);border-radius:var(--radius-md);animation:alerta-pulse 1.5s ease infinite;"></div>
      </div>

      <div v-else-if="operacoesOrdenadas.length === 0"
        style="padding:4rem;text-align:center;color:var(--text-muted);">
        <div style="font-size:2.5rem;margin-bottom:0.75rem;opacity:0.4;">📭</div>
        <p style="font-size:0.85rem;font-weight:700;text-transform:uppercase;letter-spacing:0.15em;">Nenhuma posição ativa</p>
      </div>

      <div v-else style="padding:0.75rem;display:flex;flex-direction:column;gap:0.375rem;">
        <template v-for="(grupo, gi) in gruposOrdenados" :key="gi">
          <div style="padding:0.5rem 0.625rem 0.25rem;">
            <span
              :style="grupo.urgente ? 'color:var(--brand-rose);' : 'color:var(--text-muted);'"
              style="font-size:0.85rem;font-weight:700;text-transform:uppercase;letter-spacing:0.14em;">
              {{ grupo.label }}
            </span>
          </div>

          <div v-for="op in grupo.ops" :key="op.simboloOpcao"
            :style="getSeverityBg(op)"
            style="display:grid;grid-template-columns:4px 1fr auto;gap:0.875rem;align-items:center;padding:1.25rem;border-radius:var(--radius-md);border:1px solid var(--border-subtle);">

            <div :style="getSeverityBar(op)"
              style="width:4px;border-radius:2px;align-self:stretch;min-height:60px;"></div>

            <div style="display:flex;flex-direction:column;gap:6px;min-width:0;">
              <div style="display:flex;align-items:center;gap:0.625rem;flex-wrap:wrap;">
                <span style="font-size:1.4rem;font-weight:700;color:var(--text-primary);">{{ op.tickerAtivo }}</span>
                <span class="font-mono-data" style="font-size:1rem;color:var(--text-secondary);">{{ op.simboloOpcao }}</span>
                <span :style="getMoneynessStyle(op.moneynessCode)"
                  style="font-size:0.85rem;font-weight:700;padding:3px 10px;border-radius:99px;">
                  {{ op.moneynessCode || '—' }}
                </span>
              </div>
              <div style="display:flex;gap:1rem;flex-wrap:wrap;">
                <span v-for="campo in camposDetalhesAtivos" :key="campo.key"
                  style="font-size:1rem;color:var(--text-muted);">
                  {{ campo.label }}
                  <span class="font-mono-data" style="color:var(--text-secondary);font-weight:700;font-size:1.05rem;">{{ formatDetalhe(campo.key, op) }}</span>
                </span>
              </div>
            </div>

            <div style="text-align:right;flex-shrink:0;padding-left:0.5rem;">
              <div class="font-mono-data"
                :style="op.lucroPct >= 90 ? 'color:var(--brand-emerald);' : op.lucroPct >= 75 ? 'color:var(--brand-amber);' : op.lucroPct >= 0 ? 'color:var(--text-secondary);' : 'color:var(--brand-rose);'"
                style="font-size:1.85rem;font-weight:700;">
                {{ op.lucroPct !== null ? op.lucroPct.toFixed(1) + '%' : '—' }}
              </div>
              <div style="font-size:0.8rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.1em;margin-top:3px;">lucro garantido</div>
            </div>

          </div>
        </template>
      </div>

      <!-- Rodapé -->
      <div style="padding:0.875rem 1.5rem;border-top:1px solid var(--border-subtle);display:flex;align-items:center;gap:0.625rem;">
        <div v-if="temLucroAlto" style="display:flex;align-items:center;gap:0.5rem;">
          <div style="width:7px;height:7px;border-radius:50%;background:var(--brand-emerald);flex-shrink:0;"></div>
          <span style="font-size:1rem;font-weight:700;color:var(--brand-emerald);">
            {{ posicoes90pct.length > 0
              ? posicoes90pct.length + ' posição(ões) acima de 90% — RECOMPRAR AGORA'
              : posicoes75pct.length + ' posição(ões) acima de 75% — ATENÇÃO' }}
          </span>
        </div>
        <div v-else style="display:flex;align-items:center;gap:0.5rem;">
          <div style="width:7px;height:7px;border-radius:50%;background:var(--brand-amber);flex-shrink:0;"></div>
          <span style="font-size:1rem;color:var(--text-muted);">Nenhuma posição atingiu 75% de lucro garantido no momento</span>
        </div>
      </div>
    </div>

    <!-- ── ANÁLISE COM HIGHLIGHTS ── -->
    <div class="premium-card" style="padding:1.25rem 1.5rem;width:100%;">
      <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.875rem;">
        <div style="width:7px;height:7px;border-radius:50%;background:var(--brand-indigo);flex-shrink:0;"></div>
        <span style="font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:0.15em;color:var(--text-muted);">Análise do portfólio</span>
      </div>
      <p style="font-size:1.75rem;line-height:1.9;color:var(--text-secondary);margin:0;" v-html="analiseHtml"></p>
    </div>

  </div>
</template>

<style>
  @keyframes alerta-pulse { 0%,100% { opacity:1; } 50% { opacity:0.45; } }
  .alerta-hl-rose    { color:var(--brand-rose);   font-weight:700; }
  .alerta-hl-amber   { color:var(--brand-amber);  font-weight:700; }
  .alerta-hl-emerald { color:var(--brand-emerald);font-weight:700; }
  .alerta-hl-indigo  { color:var(--brand-indigo); font-weight:700; }
</style>

<script>
window.CardAlerta = {
  template: '#card-alerta-template',

  props: {
    statsPreCalculados: { type: Object,  default: () => ({}) },
    isMobile:           { type: Boolean, default: false },
    isLoading:          { type: Boolean, default: false },

    configKpis: {
      type: Array,
      default: () => [
        { key: 'nocional',     label: 'Notional',     active: true,  order: 1, type: 'currency'   },
        { key: 'plTotalValor', label: 'P&L atual',    active: true,  order: 2, type: 'currency'   },
        { key: 'ganhoMaximo',  label: 'Ganho máximo', active: true,  order: 3, type: 'currency'   },
        { key: 'premioMedio',  label: 'Prêmio médio', active: false, order: 4, type: 'currency'   },
        { key: 'premioAtual',  label: 'Prêmio atual', active: false, order: 5, type: 'currency'   },
        { key: 'plTotalPct',   label: 'P&L %',        active: false, order: 6, type: 'percentage' },
        { key: 'totalOps',     label: 'Operações',    active: false, order: 7, type: 'number'     },
      ]
    },

    configDetalhes: {
      type: Array,
      default: () => [
        { key: 'strike',     label: 'Strike', active: true,  order: 1 },
        { key: 'spotPrice',  label: 'Spot',   active: true,  order: 2 },
        { key: 'dteCorridos',label: 'DTE',    active: true,  order: 3 },
        { key: 'nocional',   label: 'Noc.',   active: true,  order: 4 },
        { key: 'premioMedio',label: 'PM',     active: false, order: 5 },
        { key: 'premioAtual',label: 'PA',     active: false, order: 6 },
      ]
    },

    dteUrgente: { type: Number, default: 14 },
  },

  computed: {
    operacoes() {
      const cockpit = this.statsPreCalculados?.cockpit || [];
      return cockpit.map(op => {
        const pm = parseFloat(op.premioMedio  || op.ENTRY_PRICE   || 0);
        const pa = parseFloat(op.premioAtual  || op.LAST_PREMIUM  || 0);
        const lucroPct = pm > 0 ? parseFloat(((pm - pa) / pm * 100).toFixed(1)) : null;
        return { ...op, lucroPct, premioMedio: pm, premioAtual: pa };
      }).filter(op => {
        const s = String(op.status || op.isAtiva || op.STATUS || '').trim().toUpperCase();
        return s === 'ATIVO' || s === 'ATIVA' || s === 'TRUE' || s === '1';
      });
    },

    operacoesOrdenadas() {
      return [...this.operacoes].sort((a, b) => {
        const dteA = parseFloat(a.dteCorridos || a.DTE_CALENDAR || 999);
        const dteB = parseFloat(b.dteCorridos || b.DTE_CALENDAR || 999);
        if (dteA !== dteB) return dteA - dteB;
        return (a.lucroPct ?? -9999) - (b.lucroPct ?? -9999);
      });
    },

    gruposOrdenados() {
      const urgente = this.operacoesOrdenadas.filter(op =>
        parseFloat(op.dteCorridos || op.DTE_CALENDAR || 999) <= this.dteUrgente);
      const normal  = this.operacoesOrdenadas.filter(op =>
        parseFloat(op.dteCorridos || op.DTE_CALENDAR || 999) > this.dteUrgente);
      const grupos = [];
      if (urgente.length) grupos.push({ label: `DTE ≤${this.dteUrgente} dias — vencimento iminente`, urgente: true,  ops: urgente });
      if (normal.length)  grupos.push({ label: `DTE >${this.dteUrgente} dias — monitoramento`,       urgente: false, ops: normal  });
      return grupos;
    },

    totalAtivas()     { return this.operacoes.length; },
    alertasCriticos() {
      return this.operacoes.filter(op =>
        (op.lucroPct ?? 0) < -100 ||
        (parseFloat(op.dteCorridos || 999) <= this.dteUrgente &&
         String(op.moneynessCode || '').toUpperCase().includes('ITM'))
      ).length;
    },
    alertasAtencao()  { return this.operacoes.filter(op => (op.lucroPct ?? 0) >= 75 && (op.lucroPct ?? 0) < 90).length; },
    posicoes90pct()   { return this.operacoes.filter(op => (op.lucroPct ?? 0) >= 90); },
    posicoes75pct()   { return this.operacoes.filter(op => (op.lucroPct ?? 0) >= 75 && (op.lucroPct ?? 0) < 90); },
    temLucroAlto()    { return this.posicoes90pct.length > 0 || this.posicoes75pct.length > 0; },

    kpisAtivos() {
      return [...this.configKpis]
        .filter(k => k.active)
        .sort((a, b) => a.order - b.order)
        .map(k => ({
          ...k,
          colorFn: (k.key === 'plTotalValor' || k.key === 'plTotalPct')
            ? (v) => parseFloat(v) >= 0 ? 'color:var(--brand-emerald);' : 'color:var(--brand-rose);'
            : null
        }));
    },

    camposDetalhesAtivos() {
      return [...this.configDetalhes].filter(c => c.active).sort((a, b) => a.order - b.order);
    },

    resumoGlobal() { return this.statsPreCalculados?.resumoGlobal || {}; },

    analiseHtml() {
      const ops  = this.operacoes;
      const rg   = this.resumoGlobal;
      const hl   = (txt, cor) => `<span class="alerta-hl-${cor}">${txt}</span>`;

      if (!ops.length) return 'Nenhuma posição ativa no momento. Atualize os dados para visualizar o portfólio.';

      const total    = ops.length;
      const pl       = parseFloat(rg.plTotalValor || 0);
      const negativas= ops.filter(o => (o.lucroPct ?? 0) < 0).length;
      const itmOps   = ops.filter(o => String(o.moneynessCode || '').toUpperCase().includes('ITM'));
      const urgentes = ops.filter(o => parseFloat(o.dteCorridos || o.DTE_CALENDAR || 999) <= this.dteUrgente);
      const alto90   = this.posicoes90pct;
      const alto75   = this.posicoes75pct;

      const tickersUrgentesItm = [...new Set(
        urgentes.filter(o => String(o.moneynessCode || '').toUpperCase().includes('ITM'))
                .map(o => o.tickerAtivo)
      )];

      let partes = [];

      if (pl < 0) {
        const pctNeg = Math.round(negativas / total * 100);
        partes.push(
          `Portfólio com resultado ${hl('negativo de R$' + Math.abs(pl).toLocaleString('pt-BR', {minimumFractionDigits:2}), 'rose')}. ` +
          `${hl(negativas + ' de ' + total + ' posições', 'rose')} estão em prejuízo (${pctNeg}%).`
        );
      } else {
        partes.push(`Portfólio com resultado ${hl('positivo de R$' + pl.toLocaleString('pt-BR', {minimumFractionDigits:2}), 'emerald')}.`);
      }

      if (urgentes.length > 0) {
        let trecho = `${hl(urgentes.length + ' posição(ões)', 'rose')} vencem em até ${hl(this.dteUrgente + ' dias', 'rose')}`;
        if (tickersUrgentesItm.length > 0) {
          const spotEx = urgentes.find(o => String(o.moneynessCode || '').toUpperCase().includes('ITM'));
          const strikes = urgentes
            .filter(o => o.tickerAtivo === tickersUrgentesItm[0] && String(o.moneynessCode || '').toUpperCase().includes('ITM'))
            .map(o => `R$${parseFloat(o.strike || 0).toFixed(2)}`).join(', ');
          trecho += ` — ${hl(tickersUrgentesItm.join(', '), 'rose')} ${hl('ITM', 'rose')}: risco de exercício iminente`;
          if (spotEx) {
            trecho += ` (spot ${hl('R$' + parseFloat(spotEx.spotPrice || spotEx.SPOT || 0).toFixed(2), 'rose')} × strikes ${hl(strikes, 'amber')})`;
          }
        }
        partes.push(trecho + '.');
      }

      if (alto90.length > 0) {
        const nomes = alto90.map(o => o.simboloOpcao).join(', ');
        partes.push(
          `${hl(alto90.length + ' posição(ões)', 'emerald')} acima de ${hl('90% de lucro garantido', 'emerald')} (${hl(nomes, 'emerald')}) — ` +
          `${hl('considere recomprar agora', 'emerald')} para garantir o resultado.`
        );
      } else if (alto75.length > 0) {
        const nomes = alto75.map(o => o.simboloOpcao).join(', ');
        partes.push(
          `${hl(alto75.length + ' posição(ões)', 'amber')} entre ${hl('75% e 90% de lucro', 'amber')} (${hl(nomes, 'amber')}) — mantenha em alerta para recompra.`
        );
      } else {
        partes.push(`Nenhuma posição atingiu o limiar de lucro para recompra ${hl('(75%)', 'amber')}.`);
      }

      const itmNaoUrgentes = itmOps.filter(o => parseFloat(o.dteCorridos || o.DTE_CALENDAR || 999) > this.dteUrgente);
      if (itmNaoUrgentes.length > 0) {
        const tickers = [...new Set(itmNaoUrgentes.map(o => o.tickerAtivo))].join(', ');
        partes.push(
          `${hl(itmNaoUrgentes.length + ' posição(ões) ITM', 'amber')} com vencimento mais longo (${hl(tickers, 'amber')}) — monitore a evolução do spot antes de agir.`
        );
      }

      return partes.join(' ');
    }
  },

  methods: {
    getKpiValue(key) {
      const rg = this.resumoGlobal;
      if (key === 'nocional')     return rg.nocional     ?? this.operacoes.reduce((s, o) => s + parseFloat(o.nocional || 0), 0);
      if (key === 'plTotalValor') return rg.plTotalValor ?? this.operacoes.reduce((s, o) => s + parseFloat(o.plTotalValor || o.PL_VALUE || 0), 0);
      if (key === 'ganhoMaximo')  return rg.ganhoMaximo  ?? this.operacoes.reduce((s, o) => s + parseFloat(o.ganhoMaximo || o.MAX_GAIN || 0), 0);
      if (key === 'premioMedio')  return rg.premioMedio  ?? null;
      if (key === 'premioAtual')  return rg.premioAtual  ?? null;
      if (key === 'plTotalPct')   return rg.plTotalPct   ?? null;
      if (key === 'totalOps')     return this.totalAtivas;
      return rg[key] ?? null;
    },

    formatKpi(key, val) {
      if (val === null || val === undefined) return '—';
      const n = parseFloat(val);
      if (isNaN(n)) return '—';
      const tipo = this.configKpis.find(k => k.key === key)?.type || 'number';
      if (tipo === 'currency') {
        const abs = Math.abs(n);
        const prefix = n < 0 ? '-R$' : 'R$';
        if (abs >= 1000000) return prefix + (abs / 1000000).toFixed(1) + 'M';
        if (abs >= 1000)    return prefix + (abs / 1000).toFixed(1) + 'k';
        return prefix + abs.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      }
      if (tipo === 'percentage') return (n * (Math.abs(n) <= 1 ? 100 : 1)).toFixed(1) + '%';
      return n.toLocaleString('pt-BR');
    },

    formatDetalhe(key, op) {
      const raw = op[key] ?? op[key.toUpperCase()] ?? null;
      if (raw === null || raw === undefined) return '—';
      const n = parseFloat(raw);
      if (isNaN(n)) return String(raw);
      if (key === 'strike' || key === 'spotPrice') return 'R$' + n.toFixed(2);
      if (key === 'nocional') return 'R$' + Math.round(n).toLocaleString('pt-BR');
      if (key === 'premioMedio' || key === 'premioAtual') return 'R$' + n.toFixed(2);
      if (key === 'dteCorridos') return Math.round(n) + 'd';
      return String(raw);
    },

    getSeverityBar(op) {
      const lp  = op.lucroPct ?? 0;
      const dte = parseFloat(op.dteCorridos || op.DTE_CALENDAR || 999);
      const itm = String(op.moneynessCode || '').toUpperCase().includes('ITM');
      if (lp >= 90) return 'background:var(--brand-emerald);';
      if (lp >= 75) return 'background:var(--brand-amber);';
      if (dte <= this.dteUrgente && itm) return 'background:var(--brand-rose);';
      if (lp < -100) return 'background:var(--brand-rose);';
      return 'background:var(--border-strong);';
    },

    getSeverityBg(op) {
      const lp  = op.lucroPct ?? 0;
      const dte = parseFloat(op.dteCorridos || op.DTE_CALENDAR || 999);
      const itm = String(op.moneynessCode || '').toUpperCase().includes('ITM');
      if (lp >= 90) return 'background:var(--brand-emerald-light);';
      if (lp >= 75) return 'background:var(--brand-amber-light);';
      if (dte <= this.dteUrgente && itm) return 'background:var(--brand-rose-light);';
      return 'background:var(--surface-base);';
    },

    getMoneynessStyle(code) {
      const c = String(code || '').toUpperCase();
      if (c.includes('ITM')) return 'background:var(--brand-rose-light);color:var(--brand-rose);border:1px solid var(--brand-rose-muted);';
      if (c.includes('ATM')) return 'background:var(--brand-amber-light);color:var(--brand-amber);border:1px solid var(--brand-amber-muted);';
      if (c.includes('OTM')) return 'background:var(--brand-emerald-light);color:var(--brand-emerald);border:1px solid var(--brand-emerald-muted);';
      return 'background:var(--surface-overlay);color:var(--text-muted);border:1px solid var(--border-default);';
    }
  }
};
</script>
